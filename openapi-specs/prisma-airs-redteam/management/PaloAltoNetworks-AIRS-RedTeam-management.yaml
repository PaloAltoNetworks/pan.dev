openapi: 3.0.0
info:
  title: Prisma Access Browser Management Console Public API
  version: 1.0.0
  description: "Red Teaming Management API - Configure and manage security groups\
    \ and rules for AI/ML model scanning. \xA9 2025 Palo Alto Networks, Inc This Open\
    \ API spec file was created on April 22, 2026. \xA9 2026 Palo Alto Networks, Inc.\
    \ Palo Alto Networks is a registered trademark of Palo Alto Networks. A list of\
    \ our trademarks can be found at [https://www.paloaltonetworks.com/company/trademarks.html](https://www.paloaltonetworks.com/company/trademarks.html).\
    \ All other marks mentioned herein may be trademarks of their respective companies."
servers:
- url: https://api.sase.paloaltonetworks.com/ai-red-teaming/mgmt-plane
security:
- bearerAuth: []
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ApiEndpointType:
      type: string
      enum:
      - PUBLIC
      - PRIVATE
      - NETWORK_BROKER
      title: ApiEndpointType
      description: API endpoint accessibility type.
    BaseResponseSchema:
      properties:
        message:
          type: string
          title: Message
          description: Response message
        status:
          type: integer
          title: Status
          description: HTTP status code
      type: object
      required:
      - message
      - status
      title: BaseResponseSchema
      description: Standard response schema for simple operations like create, update,
        delete.
    BasicAuthAuthConfig:
      properties:
        basic_auth_location:
          $ref: '#/components/schemas/BasicAuthLocation'
          description: 'Where credentials are sent: HEADER or PAYLOAD'
          default: HEADER
        basic_auth_header:
          anyOf:
          - additionalProperties:
              type: string
            type: object
          - type: 'null'
          title: Basic Auth Header
          description: 'Auth header as {name: value} dict (required when location=HEADER)'
          examples:
          - Authorization: Basic dXNlcjpwYXNz
      type: object
      title: BasicAuthAuthConfig
      description: "Basic Auth credentials \u2014 header or payload location."
    BasicAuthAuthConfigRedact:
      properties:
        basic_auth_location:
          $ref: '#/components/schemas/BasicAuthLocation'
          description: 'Where credentials are sent: HEADER or PAYLOAD'
          default: HEADER
        basic_auth_header:
          anyOf:
          - additionalProperties:
              type: string
            type: object
          - type: 'null'
          title: Basic Auth Header
          description: 'Auth header as {name: value} dict (required when location=HEADER)'
          examples:
          - Authorization: Basic dXNlcjpwYXNz
      type: string
      title: BasicAuthLocation
      description: Where Basic Auth credentials are sent.
      enum:
      - HEADER
      - PAYLOAD
    BedrockAccessConnectionParams:
      properties:
        access_id:
          type: string
          title: Access Id
          description: AWS access key ID
        access_secret:
          type: string
          title: Access Secret
          description: AWS secret access key
        session_token:
          anyOf:
          - type: string
          - type: 'null'
          title: Session Token
          description: AWS session token (optional)
        region:
          type: string
          title: Region
          description: AWS region
        model_id:
          type: string
          title: Model Id
          description: Bedrock model ID
      type: object
      required:
      - access_id
      - access_secret
      - region
      - model_id
      title: BedrockAccessConnectionParams
      description: AWS Bedrock access parameters stored in target_metadata.
    BedrockAccessConnectionRedactParams:
      properties:
        access_id:
          type: string
          format: password
          title: Access Id
          description: AWS access key ID
          writeOnly: true
        access_secret:
          type: string
          format: password
          title: Access Secret
          description: AWS secret access key
          writeOnly: true
        session_token:
          anyOf:
          - type: string
            format: password
            writeOnly: true
          - type: 'null'
          title: Session Token
          description: AWS session token (optional)
        region:
          type: string
          title: Region
          description: AWS region
        model_id:
          type: string
          title: Model Id
          description: Bedrock model ID
      type: object
      required:
      - access_id
      - access_secret
      - region
      - model_id
      title: BedrockAccessConnectionRedactParams
      description: AWS Bedrock access parameters stored in target_metadata.
    Body_upload_prompts_csv_v1_custom_attack_upload_custom_prompts_csv_post:
      properties:
        file:
          type: string
          format: binary
          title: File
          description: The CSV file containing custom prompts to upload.
      type: object
      required:
      - file
      title: Body_upload_prompts_csv_v1_custom_attack_upload_custom_prompts_csv_post
      description: Request body schema for uploading a CSV file of custom prompts.
    CountByNameSchema:
      properties:
        name:
          type: string
          title: Name
          description: Name of the item (e.g., target type, status)
        count:
          type: integer
          minimum: 0.0
          title: Count
          description: Count of items
      type: object
      required:
      - name
      - count
      title: CountByNameSchema
      description: 'Generic count schema with name field for extensible list structures.


        Used in dashboard and other endpoints to provide counts grouped by a name
        field.

        Frontend-friendly list format for easy iteration.

        '
    CustomPromptCreateRequestSchema:
      properties:
        prompt:
          type: string
          title: Prompt
          description: The prompt text
        goal:
          anyOf:
          - type: string
          - type: 'null'
          title: Goal
          description: Goal of the prompt (user-defined or AI-generated)
        properties:
          additionalProperties:
            type: string
          type: object
          title: Properties
          description: Property assignments (property_name -> property_value)
        prompt_set_id:
          type: string
          format: uuid
          title: Prompt Set Id
          description: The UUID of the prompt set
      additionalProperties: false
      type: object
      required:
      - prompt
      - prompt_set_id
      title: CustomPromptCreateRequestSchema
      description: Schema for creating a new custom prompt.
    CustomPromptListItemSchema:
      properties:
        uuid:
          type: string
          format: uuid
          title: Uuid
          description: Unique identifier
        prompt:
          type: string
          title: Prompt
          description: The prompt text
        goal:
          anyOf:
          - type: string
          - type: 'null'
          title: Goal
          description: Goal of the prompt
        user_defined_goal:
          type: boolean
          title: User Defined Goal
          description: Whether the goal was user-defined
        status:
          type: string
          title: Status
          description: Status of the prompt
        active:
          type: boolean
          title: Active
          description: Whether the prompt is active
        properties:
          additionalProperties:
            type: string
          type: object
          title: Properties
          description: Property assignments
        created_at:
          type: string
          format: date-time
          title: Created At
          description: Creation timestamp
        updated_at:
          type: string
          format: date-time
          title: Updated At
          description: Last update timestamp
      type: object
      required:
      - uuid
      - prompt
      - user_defined_goal
      - status
      - active
      - created_at
      - updated_at
      title: CustomPromptListItemSchema
      description: Schema for custom prompt items in list responses.
    CustomPromptListSchema:
      properties:
        pagination:
          $ref: '#/components/schemas/PaginationSchema'
        data:
          items:
            $ref: '#/components/schemas/CustomPromptListItemSchema'
          type: array
          title: Data
          description: List of custom prompts
      type: object
      required:
      - pagination
      title: CustomPromptListSchema
      description: Schema for custom prompt list responses.
    CustomPromptResponseSchema:
      properties:
        uuid:
          type: string
          format: uuid
          title: Uuid
          description: Unique identifier
        prompt:
          type: string
          title: Prompt
          description: The prompt text
        goal:
          anyOf:
          - type: string
          - type: 'null'
          title: Goal
          description: Goal of the prompt
        user_defined_goal:
          type: boolean
          title: User Defined Goal
          description: Whether the goal was user-defined
        detector_category:
          anyOf:
          - type: string
          - type: 'null'
          title: Detector Category
          description: Detector category
        severity:
          anyOf:
          - type: string
          - type: 'null'
          title: Severity
          description: Severity level
        status:
          type: string
          title: Status
          description: Status of the prompt
        active:
          type: boolean
          title: Active
          description: Whether the prompt is active
        extra_info:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          title: Extra Info
          description: Additional information
        prompt_set_id:
          type: string
          format: uuid
          title: Prompt Set Id
          description: The UUID of the prompt set this prompt belongs to
        properties:
          additionalProperties:
            type: string
          type: object
          title: Properties
          description: Property assignments
        property_assignments:
          items:
            $ref: '#/components/schemas/PropertyAssignmentSchema'
          type: array
          title: Property Assignments
          description: Detailed property assignments
        created_at:
          type: string
          format: date-time
          title: Created At
          description: Creation timestamp
        updated_at:
          type: string
          format: date-time
          title: Updated At
          description: Last update timestamp
      type: object
      required:
      - uuid
      - prompt
      - user_defined_goal
      - status
      - active
      - prompt_set_id
      - created_at
      - updated_at
      title: CustomPromptResponseSchema
      description: Schema for custom prompt responses.
    CustomPromptSetArchiveRequestSchema:
      properties:
        archive:
          type: boolean
          title: Archive
          description: True to archive, False to unarchive
      additionalProperties: false
      type: object
      required:
      - archive
      title: CustomPromptSetArchiveRequestSchema
      description: Schema for archiving/unarchiving prompt sets.
    CustomPromptSetCreateRequestSchema:
      properties:
        name:
          type: string
          maxLength: 255
          title: Name
          description: Name of the custom prompt set
        description:
          anyOf:
          - type: string
          - type: 'null'
          title: Description
          description: Description of the custom prompt set
          default: null
        property_names:
          items:
            type: string
          type: array
          maxItems: 2
          title: Property Names
          description: Property names for this prompt set (max 2)
      additionalProperties: false
      type: object
      required:
      - name
      title: CustomPromptSetCreateRequestSchema
      description: Schema for creating a new custom prompt set.
    CustomPromptSetListActiveSchema:
      properties:
        data:
          items:
            $ref: '#/components/schemas/CustomPromptSetReferenceSchema'
          type: array
          title: Data
          description: List of active custom prompt set references
      type: object
      title: CustomPromptSetListActiveSchema
      description: 'Schema for listing active custom prompt sets available for use.


        Used by data plane to discover available prompt sets for job creation.

        '
    CustomPromptSetListItemSchema:
      properties:
        uuid:
          type: string
          format: uuid
          title: Uuid
          description: Unique identifier
        name:
          type: string
          title: Name
          description: Name of the prompt set
        description:
          anyOf:
          - type: string
          - type: 'null'
          title: Description
          description: Description of the prompt set
          default: null
        active:
          type: boolean
          title: Active
          description: Whether the prompt set is active
        archive:
          type: boolean
          title: Archive
          description: Whether the prompt set is archived
        status:
          type: string
          title: Status
          description: Status of the prompt set
        stats:
          anyOf:
          - $ref: '#/components/schemas/PromptSetStatsSchema'
          - type: 'null'
          description: Statistics about the prompt set
        property_names:
          items:
            type: string
          type: array
          title: Property Names
          description: Property names
        created_by_user_id:
          anyOf:
          - type: string
            format: uuid
          - type: 'null'
          title: Created By User Id
          description: User ID who created the prompt set
        created_at:
          type: string
          format: date-time
          title: Created At
          description: Creation timestamp
        updated_at:
          type: string
          format: date-time
          title: Updated At
          description: Last update timestamp
      type: object
      required:
      - uuid
      - name
      - active
      - archive
      - status
      - created_at
      - updated_at
      title: CustomPromptSetListItemSchema
      description: Schema for custom prompt set items in list responses.
    CustomPromptSetListSchema:
      properties:
        pagination:
          $ref: '#/components/schemas/PaginationSchema'
        data:
          items:
            $ref: '#/components/schemas/CustomPromptSetListItemSchema'
          type: array
          title: Data
          description: List of custom prompt sets
      type: object
      required:
      - pagination
      title: CustomPromptSetListSchema
      description: Schema for custom prompt set list responses.
    CustomPromptSetReferenceSchema:
      properties:
        uuid:
          type: string
          format: uuid
          title: Uuid
          description: UUID of the custom prompt set
        name:
          type: string
          title: Name
          description: Name of the prompt set
        version:
          anyOf:
          - type: string
          - type: 'null'
          title: Version
          description: GCS generation number for snapshot versioning
        status:
          type: string
          title: Status
          description: Current status of the prompt set
        active:
          type: boolean
          title: Active
          description: Whether the prompt set is active
        tsg_id:
          type: string
          title: Tsg Id
          description: Tenant Security Group ID
        created_at:
          type: string
          format: date-time
          title: Created At
          description: Creation timestamp
        updated_at:
          type: string
          format: date-time
          title: Updated At
          description: Last update timestamp
      type: object
      required:
      - uuid
      - name
      - status
      - active
      - tsg_id
      - created_at
      - updated_at
      title: CustomPromptSetReferenceSchema
      description: 'Reference schema for custom prompt sets used by data plane.


        Contains minimal information needed for data plane to fetch

        configurations from GCS using the GCS-first pattern.

        '
    CustomPromptSetResponseSchema:
      properties:
        uuid:
          type: string
          format: uuid
          title: Uuid
          description: Unique identifier
        name:
          type: string
          title: Name
          description: Name of the prompt set
        description:
          anyOf:
          - type: string
          - type: 'null'
          title: Description
          description: Description of the prompt set
          default: null
        active:
          type: boolean
          title: Active
          description: Whether the prompt set is active
        archive:
          type: boolean
          title: Archive
          description: Whether the prompt set is archived
        status:
          type: string
          title: Status
          description: Status of the prompt set
        version:
          anyOf:
          - type: string
          - type: 'null'
          title: Version
          description: GCS generation number for snapshot versioning
        stats:
          anyOf:
          - $ref: '#/components/schemas/PromptSetStatsSchema'
          - type: 'null'
          description: Statistics about the prompt set
        extra_info:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          title: Extra Info
          description: Additional information
        property_names:
          items:
            type: string
          type: array
          title: Property Names
          description: Property names
        properties:
          items:
            $ref: '#/components/schemas/PropertyDefinitionSchema'
          type: array
          title: Properties
          description: Property definitions
        created_by_user_id:
          anyOf:
          - type: string
            format: uuid
          - type: 'null'
          title: Created By User Id
          description: User ID who created the prompt set
        updated_by_user_id:
          anyOf:
          - type: string
            format: uuid
          - type: 'null'
          title: Updated By User Id
          description: User ID who last updated the prompt set
        created_at:
          type: string
          format: date-time
          title: Created At
          description: Creation timestamp
        updated_at:
          type: string
          format: date-time
          title: Updated At
          description: Last update timestamp
      type: object
      required:
      - uuid
      - name
      - active
      - archive
      - status
      - created_at
      - updated_at
      title: CustomPromptSetResponseSchema
      description: Schema for custom prompt set responses.
    CustomPromptSetUpdateRequestSchema:
      properties:
        name:
          anyOf:
          - type: string
            maxLength: 255
          - type: 'null'
          title: Name
          description: Updated name
        description:
          anyOf:
          - type: string
          - type: 'null'
          title: Description
          description: Updated description
        archive:
          anyOf:
          - type: boolean
          - type: 'null'
          title: Archive
          description: Archive status
        property_names:
          anyOf:
          - items:
              type: string
            type: array
            maxItems: 2
          - type: 'null'
          title: Property Names
          description: Updated property names (max 2)
      additionalProperties: false
      type: object
      title: CustomPromptSetUpdateRequestSchema
      description: Schema for updating a custom prompt set.
    CustomPromptSetVersionInfoSchema:
      properties:
        uuid:
          type: string
          format: uuid
          title: Uuid
          description: UUID of the custom prompt set
        version:
          anyOf:
          - type: string
          - type: 'null'
          title: Version
          description: GCS generation number for this version
        status:
          type: string
          title: Status
          description: Status when this version was created
        stats:
          anyOf:
          - $ref: '#/components/schemas/PromptSetStatsSchema'
          - type: 'null'
          description: Prompt statistics when version was created
        snapshot_created_at:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Snapshot Created At
          description: When the snapshot was created
        is_latest:
          type: boolean
          title: Is Latest
          description: Whether this is the latest version
      type: object
      required:
      - uuid
      - status
      - is_latest
      title: CustomPromptSetVersionInfoSchema
      description: 'Version information for a custom prompt set snapshot.


        Provides metadata about a specific version without full configuration data.

        '
    CustomPromptUpdateRequestSchema:
      properties:
        prompt:
          anyOf:
          - type: string
          - type: 'null'
          title: Prompt
          description: Updated prompt text
        goal:
          anyOf:
          - type: string
          - type: 'null'
          title: Goal
          description: Updated goal
        properties:
          anyOf:
          - additionalProperties:
              type: string
            type: object
          - type: 'null'
          title: Properties
          description: Updated property assignments
      additionalProperties: false
      type: object
      title: CustomPromptUpdateRequestSchema
      description: Schema for updating a custom prompt.
    DashboardOverviewResponseSchema:
      properties:
        total_targets:
          type: integer
          minimum: 0.0
          title: Total Targets
          description: Total number of targets
        targets_by_type:
          items:
            $ref: '#/components/schemas/CountByNameSchema'
          type: array
          title: Targets By Type
          description: Target counts grouped by type (APPLICATION, AGENT, MODEL)
      type: object
      required:
      - total_targets
      title: DashboardOverviewResponseSchema
      description: 'Dashboard overview response with target counts.


        Endpoint: GET /api/v1/dashboard/overview

        Returns target counts by type in list format for easy frontend iteration.

        '
    DatabricksConnectionParams:
      properties:
        auth_type:
          $ref: '#/components/schemas/red_team_shared__schemas__databricks__AuthType'
          description: Auth type
        access_token:
          anyOf:
          - type: string
          - type: 'null'
          title: Access Token
          description: Databricks access token
        client_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Client Id
          description: Databricks client_id
        secret:
          anyOf:
          - type: string
          - type: 'null'
          title: Secret
          description: Databricks secret
        workspace_url:
          type: string
          title: Workspace Url
          description: Databricks workscpace_url
        model_name:
          type: string
          title: Model Name
          description: Databricks model name
      type: object
      required:
      - auth_type
      - workspace_url
      - model_name
      title: DatabricksConnectionParams
    DatabricksConnectionRedactParams:
      properties:
        auth_type:
          $ref: '#/components/schemas/red_team_shared__schemas__databricks__AuthType'
          description: Auth type
        access_token:
          anyOf:
          - type: string
            format: password
            writeOnly: true
          - type: 'null'
          title: Access Token
          description: Databricks access token
        client_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Client Id
          description: Databricks client_id
        secret:
          anyOf:
          - type: string
            format: password
            writeOnly: true
          - type: 'null'
          title: Secret
          description: Databricks secret
        workspace_url:
          type: string
          title: Workspace Url
          description: Databricks workscpace_url
        model_name:
          type: string
          title: Model Name
          description: Databricks model name
      type: object
      required:
      - auth_type
      - workspace_url
      - model_name
      title: DatabricksConnectionRedactParams
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
          description: List of validation errors describing what failed.
      type: object
      title: HTTPValidationError
      description: Standard HTTP 422 validation error response containing a list of
        field-level errors.
    HeadersAuthConfig:
      properties:
        auth_header:
          additionalProperties:
            type: string
          type: object
          title: Auth Header
          description: 'Auth header as {name: value} dict'
          examples:
          - Authorization: Bearer sk-xxxxxxxxxxxx
          - x-api-key: my-api-key
      type: object
      required:
      - auth_header
      title: HeadersAuthConfig
      description: Static header injection (API keys, bearer tokens).
    HeadersAuthConfigRedact:
      properties:
        auth_header:
          additionalProperties:
            type: string
          type: object
          title: Auth Header
          description: 'Auth header as {name: value} dict'
          examples:
          - Authorization: Bearer sk-xxxxxxxxxxxx
          - x-api-key: my-api-key
      type: object
      required:
      - auth_header
      title: HeadersAuthConfigRedact
    HuggingfaceConnectionParams:
      properties:
        api_key:
          type: string
          title: Api Key
          description: Huggingface API key for authentication
          examples:
          - sk-abxx
        model_name:
          type: string
          title: Model Name
          description: Huggingface model name for API requests
          examples:
          - gpt-4.1-nano
      type: object
      required:
      - api_key
      - model_name
      title: HuggingfaceConnectionParams
      description: Connection parameters specific to huggingface targets
    HuggingfaceConnectionRedactParams:
      properties:
        api_key:
          type: string
          format: password
          title: Api Key
          description: Huggingface API key for authentication
          writeOnly: true
          examples:
          - sk-abxx
        model_name:
          type: string
          title: Model Name
          description: Huggingface model name for API requests
          examples:
          - gpt-4.1-nano
      type: object
      required:
      - api_key
      - model_name
      title: HuggingfaceConnectionRedactParams
      description: Connection parameters specific to huggingface targets
    MSCopilotStudioAuthUrlRequestSchema:
      properties:
        client_id:
          type: string
          title: Client Id
          description: Azure App Registration Client ID
        client_secret:
          type: string
          title: Client Secret
          description: Azure App Registration Client Secret
        tenant_id:
          type: string
          title: Tenant Id
          description: Azure AD Tenant ID
        target_uuid:
          anyOf:
          - type: string
            format: uuid
          - type: 'null'
          title: Target Uuid
          description: Existing target UUID for resolving redacted client_secret on
            re-auth.
        token_json_uuid:
          anyOf:
          - type: string
            format: uuid
          - type: 'null'
          title: Token Json Uuid
          description: Existing token_json_uuid for re-auth. If omitted, a new UUID
            is generated.
      additionalProperties: false
      type: object
      required:
      - client_id
      - client_secret
      - tenant_id
      title: MSCopilotStudioAuthUrlRequestSchema
      description: 'Request body for generating MS Copilot Studio OAuth auth URL (POST
        /auth-url).


        If token_json_uuid is provided, reuses existing UUID (re-auth).

        If omitted, generates a new UUID (new target).

        '
    MSCopilotStudioAuthUrlResponseSchema:
      properties:
        auth_url:
          type: string
          title: Auth Url
          description: OAuth authorization URL for user login
        token_json_uuid:
          type: string
          format: uuid
          title: Token Json Uuid
          description: UUID referencing MSAL token cache in GSM
        state:
          type: string
          title: State
          description: MSAL-generated state for frontend session tracking (correlate
            auth callback with original request)
      type: object
      required:
      - auth_url
      - token_json_uuid
      - state
      title: MSCopilotStudioAuthUrlResponseSchema
      description: Response containing the generated OAuth auth URL.
    MSCopilotStudioConnectionParams:
      properties:
        client_id:
          type: string
          title: Client Id
          description: Azure App Registration Client ID
        client_secret:
          type: string
          title: Client Secret
          description: Azure App Registration Client Secret
        tenant_id:
