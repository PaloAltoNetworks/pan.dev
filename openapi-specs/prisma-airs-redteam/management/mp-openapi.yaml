openapi: 3.1.0
info:
  title: Prisma AIRS Red Teaming Management API
  description: 'Red Teaming Management API - Configure and manage security groups and rules for AI/ML model scanning. © 2025 Palo Alto Networks, Inc'
  version: 0.7.36
  termsOfService: https://www.paloaltonetworks.com/content/dam/pan/en_US/assets/pdf/legal/palo-alto-networks-end-user-license-agreement-eula.pdf
  license:
    name: MIT
    url: https://opensource.org/license/mit
  contact:
    email: support@paloaltonetworks.com
    name: Palo Alto Networks Technical Support
    url: https://support.paloaltonetworks.com
servers:
- url: https://api.sase.paloaltonetworks.com/ai-red-teaming/mgmt-plane
security:
  - bearerAuth: []

tags:
 - name: Adapters
   description: Operations for managing custom target adapters.
 - name: CustomAttack
   description: Operations for managing custom prompt sets, prompts, and properties.
 - name: Dashboard
   description: Operations for retrieving dashboard overview and statistics.
 - name: Languages
   description: List Languages
 - name: Target
   description: Operations for managing scan targets (create, update, delete, list).

paths:
  /v1/adapters:
    post:
      tags:
      - Adapters
      summary: Create a new adapter
      operationId: create_adapter_v1_adapters_post
      parameters:
      -
        name: validate
        in: query
        required: false
        schema:
          type: boolean
          description: 'Run static validation on the script. When false, the adapter is saved as DRAFT; when true it is validated and set ACTIVE.'
          default: true
          title: Validate
        description: 'Run static validation on the script. When false, the adapter is saved as DRAFT; when true it is validated and set ACTIVE.'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomTargetAdapterCreateRequestSchema'
      responses:
        201:
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomTargetAdapterSchema'
        422:
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    get:
      tags:
      - Adapters
      summary: List all adapters
      operationId: list_adapters_v1_adapters_get
      parameters:
      -
        name: skip
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          description: Number of records to skip
          default: 0
          title: Skip
        description: Number of records to skip
      -
        name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 100
          minimum: 1
          description: Maximum records to return
          default: 10
          title: Limit
        description: Maximum records to return
      -
        name: search
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Search adapter by name
          title: Search
        description: Search adapter by name
      -
        name: status
        in: query
        required: false
        schema:
          anyOf:
          - $ref: '#/components/schemas/CustomTargetAdapterStatus'
          - type: 'null'
          description: Filter adapters by status (DRAFT or ACTIVE)
          title: Status
        description: Filter adapters by status (DRAFT or ACTIVE)
      -
        name: include_target_count
        in: query
        required: false
        schema:
          type: boolean
          description: Include the number of targets referencing each adapter. Heavier query — only enable when needed.
          default: false
          title: Include Target Count
        description: Include the number of targets referencing each adapter. Heavier query — only enable when needed.
      responses:
        200:
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomTargetAdapterListSchema'
        422:
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/adapters/config:
    get:
      tags:
      - Adapters
      summary: Get adapter config defaults
      operationId: get_adapter_config_v1_adapters_config_get
      responses:
        200:
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomTargetAdapterConfigResponseSchema'
        401:
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/adapters/{adapter_uuid}:
    get:
      tags:
      - Adapters
      summary: Get adapter by UUID
      operationId: get_adapter_v1_adapters__adapter_uuid__get
      parameters:
      -
        name: adapter_uuid
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Adapter Uuid
      responses:
        200:
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomTargetAdapterSchema'
        422:
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    put:
      tags:
      - Adapters
      summary: Update an adapter
      operationId: update_adapter_v1_adapters__adapter_uuid__put
      parameters:
      -
        name: adapter_uuid
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Adapter Uuid
      -
        name: validate
        in: query
        required: false
        schema:
          type: boolean
          description: 'Run validation on the adapter. When false, the adapter is saved as DRAFT (save for later) without validation; when true it is validated and set ACTIVE.'
          default: true
          title: Validate
        description: 'Run validation on the adapter. When false, the adapter is saved as DRAFT (save for later) without validation; when true it is validated and set ACTIVE.'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomTargetAdapterUpdateRequestSchema'
      responses:
        200:
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomTargetAdapterSchema'
        422:
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - Adapters
      summary: Delete an adapter
      operationId: delete_adapter_v1_adapters__adapter_uuid__delete
      parameters:
      -
        name: adapter_uuid
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Adapter Uuid
      responses:
        204:
          description: Successful Response
        422:
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/adapters/validate:
    post:
      tags:
      - Adapters
      summary: Validate adapter script
      operationId: validate_adapter_v1_adapters_validate_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomTargetAdapterValidateRequestSchema'
        required: true
      responses:
        200:
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomTargetAdapterValidateResponseSchema'
        422:
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/target:
    post:
      tags:
      - Target
      summary: Create target
      description: Create a new scan target.
      operationId: create_target_v1_target_post
      parameters:
      -
        name: validate
        in: query
        required: false
        schema:
          type: boolean
          description: Whether to validate target configuration
          examples:
          - true
          title: Validate
        description: Whether to validate target configuration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TargetCreateRequestSchema'
      responses:
        201:
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TargetResponseSchema'
        422:
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    get:
      tags:
      - Target
      summary: List targets
      description: List all scan targets with pagination and filtering support.
      operationId: list_targets_v1_target_get
      parameters:
      -
        name: skip
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          description: Number of records to skip
          default: 0
          title: Skip
        description: Number of records to skip
      -
        name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 100
          minimum: 1
          description: Maximum records to return
          default: 10
          title: Limit
        description: Maximum records to return
      -
        name: target_type
        in: query
        required: false
        schema:
          anyOf:
          - $ref: '#/components/schemas/TargetType'
          - type: 'null'
          description: Filter by target type
          title: Target Type
        description: Filter by target type
      -
        name: status
        in: query
        required: false
        schema:
          anyOf:
          - $ref: '#/components/schemas/TargetStatusFilter'
          - type: 'null'
          description: Filter by target status or profiling status
          title: Status
        description: Filter by target status or profiling status
      -
        name: search
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Search target by name
          title: Search
        description: Search target by name
      -
        name: adapter_uuid
        in: query
        required: false
        schema:
          anyOf:
          -
            type: string
            format: uuid
          - type: 'null'
          description: Filter targets by the custom adapter they use
          title: Adapter Uuid
        description: Filter targets by the custom adapter they use
      responses:
        200:
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TargetListSchema'
        422:
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/target/{target_uuid}:
    get:
      tags:
      - Target
      summary: Get target details
      description: Retrieve a specific target by UUID with complete configuration details and masked connection parameters.
      operationId: get_target_v1_target__target_uuid__get
      parameters:
      -
        name: target_uuid
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Target Uuid
      responses:
        200:
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TargetRedactSchema'
        422:
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    put:
      tags:
      - Target
      summary: Update target
      description: Update an existing target with new configuration and optional validation control.
      operationId: update_target_v1_target__target_uuid__put
      parameters:
      -
        name: target_uuid
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Target Uuid
      -
        name: validate
        in: query
        required: false
        schema:
          type: boolean
          description: Whether to validate target configuration
          default: true
          title: Validate
        description: Whether to validate target configuration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TargetUpdateRequestSchema'
      responses:
        200:
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TargetSchema'
        422:
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - Target
      summary: Delete target
      description: Permanently delete a target and its encrypted configuration data.
      operationId: delete_target_v1_target__target_uuid__delete
      parameters:
      -
        name: target_uuid
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Target Uuid
      responses:
        204:
          description: Successful Response
        422:
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/target/{target_uuid}/profile:
    post:
      tags:
      - Target
      summary: Start target profiling
      description: Manually trigger target profiling. Target must be active with industry and use_case.
      operationId: start_profiling_v1_target__target_uuid__profile_post
      parameters:
      -
        name: target_uuid
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Target Uuid
      responses:
        200:
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StartProfilingResponseSchema'
        422:
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    put:
      tags:
      - Target
      summary: Update target profile
      description: Update target background and additional context fields without connection validation.
      operationId: update_target_profile_v1_target__target_uuid__profile_put
      parameters:
      -
        name: target_uuid
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Target Uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TargetContextUpdateSchema'
      responses:
        200:
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TargetSchema'
        422:
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    get:
      tags:
      - Target
      summary: Get profiling results
      description: Get profiling results including merged user and profiler data.
      operationId: get_profiling_results_v1_target__target_uuid__profile_get
      parameters:
      -
        name: target_uuid
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Target Uuid
      responses:
        200:
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TargetProfileResponse'
        422:
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/target/probe:
    post:
      tags:
      - Target
      summary: Run profiling probes on target
      description: Send profiling questions to a target using provided connection parameters. Returns TargetResponseSchema with target_background and additional_context populated from probe responses.
      operationId: run_target_probes_v1_target_probe_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TargetProbeRequest'
        required: true
      responses:
        200:
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TargetResponseSchema'
        422:
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/target/validate-auth:
    post:
      tags:
      - Target
      summary: Validate authentication configuration
      description: 'Validate OAuth2 credentials by fetching a test token. For HEADERS and BASIC_AUTH, validates field presence only.'
      operationId: validate_auth_v1_target_validate_auth_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TargetAuthValidationRequestSchema'
        required: true
      responses:
        200:
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TargetAuthValidationResponseSchema'
        422:
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/target/ms-copilot-studio/auth-url:
    post:
      tags:
      - Target
      summary: Generate Copilot Studio auth URL
      description: Generate MS Copilot Studio OAuth authorization URL.
      operationId: generate_ms_copilot_studio_auth_url_v1_target_ms_copilot_studio_auth_url_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MSCopilotStudioAuthUrlRequestSchema'
        required: true
      responses:
        200:
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MSCopilotStudioAuthUrlResponseSchema'
        422:
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/target/ms-copilot-studio/token:
    post:
      tags:
      - Target
      summary: Exchange Copilot Studio auth code
      description: 'Exchange auth code for tokens via MSAL, store token cache in GSM.'
      operationId: exchange_ms_copilot_studio_token_v1_target_ms_copilot_studio_token_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MSCopilotStudioTokenRequestSchema'
        required: true
      responses:
        200:
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MSCopilotStudioTokenResponseSchema'
        422:
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/target/ms-copilot-studio/token/{token_json_uuid}:
    delete:
      tags:
      - Target
      summary: Delete MS Copilot Studio token records
      description: Delete both auth flow and token cache GSM records (cancel cleanup).
      operationId: delete_ms_copilot_studio_token_v1_target_ms_copilot_studio_token__token_json_uuid__delete
      parameters:
      -
        name: token_json_uuid
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Token Json Uuid
      responses:
        204:
          description: Successful Response
        422:
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/custom-attack/custom-prompt-set:
    post:
      tags:
      - CustomAttack
      summary: Create a new custom prompt set
      description: Create a new custom prompt set.
      operationId: create_prompt_set_v1_custom_attack_custom_prompt_set_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomPromptSetCreateRequestSchema'
        required: true
      responses:
        201:
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomPromptSetResponseSchema'
        422:
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/custom-attack/list-custom-prompt-sets:
    get:
      tags:
      - CustomAttack
      summary: List custom prompt sets
      description: List all custom prompt sets with pagination and filtering support.
      operationId: list_prompt_sets_v1_custom_attack_list_custom_prompt_sets_get
      parameters:
      -
        name: skip
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          description: Number of records to skip
          default: 0
          title: Skip
        description: Number of records to skip
      -
        name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 100
          minimum: 1
          description: Maximum records to return
          default: 10
          title: Limit
        description: Maximum records to return
      -
        name: status
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Filter by status
          title: Status
        description: Filter by status
      -
        name: active
        in: query
        required: false
        schema:
          anyOf:
          - type: boolean
          - type: 'null'
          description: Filter by active status
          title: Active
        description: Filter by active status
      -
        name: archive
        in: query
        required: false
        schema:
          anyOf:
          - type: boolean
          - type: 'null'
          description: 'Filter by archive status (None=non-archived only, True=archived only, False=non-archived only)'
          title: Archive
        description: 'Filter by archive status (None=non-archived only, True=archived only, False=non-archived only)'
      -
        name: search
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Search in name and description
          title: Search
        description: Search in name and description
      -
        name: language
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Filter by language code (ISO 639-1)
          title: Language
        description: Filter by language code (ISO 639-1)
      responses:
        200:
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomPromptSetListSchema'
        422:
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/custom-attack/custom-prompt-set/{prompt_set_uuid}:
    get:
      tags:
      - CustomAttack
      summary: Get prompt set details
      description: Retrieve a specific prompt set by UUID with complete details including properties.
      operationId: get_prompt_set_v1_custom_attack_custom_prompt_set__prompt_set_uuid__get
      parameters:
      -
        name: prompt_set_uuid
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Prompt Set Uuid
      responses:
        200:
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomPromptSetResponseSchema'
        422:
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    put:
      tags:
      - CustomAttack
      summary: Update prompt set
      description: 'Update prompt set details including name, description, and properties.'
      operationId: update_prompt_set_v1_custom_attack_custom_prompt_set__prompt_set_uuid__put
      parameters:
      -
        name: prompt_set_uuid
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Prompt Set Uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomPromptSetUpdateRequestSchema'
      responses:
        200:
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomPromptSetResponseSchema'
        422:
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/custom-attack/custom-prompt-set/{prompt_set_uuid}/archive:
    put:
      tags:
      - CustomAttack
      summary: Archive or unarchive a prompt set
      description: Archive or unarchive a prompt set to manage its lifecycle.
      operationId: archive_prompt_set_v1_custom_attack_custom_prompt_set__prompt_set_uuid__archive_put
      parameters:
      -
        name: prompt_set_uuid
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Prompt Set Uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomPromptSetArchiveRequestSchema'
      responses:
        200:
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomPromptSetResponseSchema'
        422:
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/custom-attack/custom-prompt-set/custom-prompt:
    post:
      tags:
      - CustomAttack
      summary: Create prompt in a prompt set
      description: Create a new prompt in a prompt set.
      operationId: create_prompt_v1_custom_attack_custom_prompt_set_custom_prompt_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomPromptCreateRequestSchema'
        required: true
      responses:
        201:
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomPromptResponseSchema'
        422:
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/custom-attack/custom-prompt-set/{prompt_set_uuid}/list-custom-prompts:
    get:
      tags:
      - CustomAttack
      summary: List prompts in a prompt set
      description: List all prompts within a specific prompt set with pagination and filtering.
      operationId: list_prompts_in_set_v1_custom_attack_custom_prompt_set__prompt_set_uuid__list_custom_prompts_get
      parameters:
      -
        name: prompt_set_uuid
        in: path
        required: true
