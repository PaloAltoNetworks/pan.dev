  /adns-resolver/v1/ca-certs:upload:
    post:
      description: Upload an EDL CA certificate file. Accepts a PEM-encoded certificate via multipart/form-data.
      operationId: UploadCACertFromFile
      requestBody:
        content:
          multipart/form-data:
            encoding:
              cert:
                contentType: application/x-pem-file,application/x-x509-ca-cert
              name:
                contentType: text/plain
            schema:
              properties:
                cert:
                  contentEncoding: binary
                  contentMediaType: application/octet-stream
                  description: PEM-encoded CA certificate file (.pem, .crt, or .cer)
                  format: binary
                  type: string
                name:
                  description: Name of the CA certificate
                  examples:
                    - My CA Cert
                  maxLength: 128
                  type: string
              required:
                - name
                - cert
              type: object
