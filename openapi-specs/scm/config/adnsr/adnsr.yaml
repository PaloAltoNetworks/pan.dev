            default: 200
            description: Maximum number of items to return
            format: int32
            maximum: 1000
            minimum: 1
            type: integer
        - description: Number of items to skip
          explode: false
          in: query
          name: offset
          schema:
            default: 0
            description: Number of items to skip
            format: int32
            minimum: 0
            type: integer
        - description: Field to sort by (id, name, description, profile name, created_at, last_updated_at)
          explode: false
          in: query
          name: sort_by
          schema:
            default: created_at
            description: Field to sort by (id, name, description, profile name, created_at, last_updated_at)
            enum:
              - id
              - name
              - description
              - profile_name
              - created_at
              - last_updated_at
            type: string
        - description: Sort order (ASC or DESC)
          explode: false
          in: query
          name: sort_order
          schema:
            default: DESC
            description: Sort order (ASC or DESC)
            enum:
              - ASC
              - DESC
            type: string
        - description: Search term to filter by name, description or profile name
          explode: false
          in: query
          name: search
          schema:
            description: Search term to filter by name, description or profile name
            type: string
      responses:
