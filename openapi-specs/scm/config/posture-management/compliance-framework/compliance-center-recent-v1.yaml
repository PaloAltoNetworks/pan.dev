                  type: array
                  description: "BPC status filter"
                  items:
                    type: string
                severity:
                  type: array
                  description: "Severity filter"
                  items:
                    type: string
                bpc_id:
                  type: array
                  description: "BPC ID filter"
                  items:
                    type: string
                object_type:
                  type: array
                  description: "Object type filter"
                  items:
                    type: string
                object_id:
                  type: array
                  description: "Object ID filter"
                  items:
                    type: string
                remediation_location:
                  type: array
                  description: "Remediation location filter"
                  items:
                    type: string
                action:
                  type: array
                  description: "Action filter"
                  items:
                    type: string
                device_type:
                  type: array
                  description: "Device type filter"
                  items:
                    type: string
            example:
              product: "ngfw"
              bpc_status: []
              severity: []
              bpc_id: ["100", "102", "103", "104", "105", "107", "108", "109", "111", "117", "12", "121", "122", "123", "124", "125", "126", "127", "128", "129", "13", "130", "131", "132", "133", "134", "136", "138", "139", "141", "142", "143", "144", "145", "149", "150", "151", "154", "155", "157", "158", "159", "16", "164", "165", "17", "173", "174", "177", "178", "182", "183", "184", "185", "186", "187", "188", "189", "19", "190", "194", "196", "197", "199", "200", "203", "207", "208", "21", "211", "212", "215", "216", "217", "223", "224", "227", "228", "231", "233", "234", "241", "242", "243", "247", "249", "253", "259", "26", "260", "261", "262", "263", "264", "267", "268", "27", "271", "272", "273", "276", "277", "278", "279", "280", "281", "282", "283", "284", "285", "287", "288", "289", "292", "293", "294", "295", "296", "297", "298", "299", "3", "300", "301", "302", "303", "304", "305", "306", "307", "308", "311", "312", "317", "32", "320", "321", "322", "323", "324", "325", "326", "327", "328", "329", "33", "330", "331", "332", "333", "339", "340", "341", "344", "345", "346", "347", "38", "4", "40", "41", "42", "43", "44", "45", "47", "49", "5", "51", "52", "53", "55", "57", "58", "6", "60", "63", "65", "67", "68", "69", "7", "71", "72", "74", "76", "77", "78", "79", "80", "86", "87", "89", "9", "90", "91", "92", "94", "95", "97", "98"]
              object_type: []
              object_id: []
              remediation_location: []
              action: []
              device_type: ["ngfw"]
      responses:
        '200':
          description: |
            Success - Returns benchmark monitoring data in the requested format.

            **CSV Format Columns:**
            1. BPC Title - Description of the best practice check
            2. Device Serial - Serial number of the device
            3. Bpc Id - Best Practice Check ID
            4. Product - Product type (ngfw, sase, all)
            5. Object Type - Type of configuration object
            6. Severity - Severity level (Critical, Warning, Informational)
            7. Location - Configuration location context
            8. Remediation Location - Full path to the remediation location
            9. Object Id - Object identifier
            10. Bpc Status - Status of the check (pass, fail, exception)
            11. User Excluded - Whether the check was user-excluded (true/false)
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
            text/csv:
              schema:
                type: string
                format: binary
              example: |
                BPC Title,Device Serial,Bpc Id,Product,Object Type,Severity,Location,Remediation Location,Object Id,Bpc Status,User Excluded
                The Permitted IP Addresses list on the management interface of the firewall should be used to prevent access from unauthorized sources,007051000239252,100,ngfw,device_setup_management_interface,Informational,,tsgid:1001536090/Device:007051000239252/Device Setup Management Interface:Device Setup Management Interface/,Device Setup Management Interface,fail,false
                Administrative management interface services should not allow unencrypted protocols like HTTP and Telnet,007051000239252,102,ngfw,device_setup_management_interface,Warning,,tsgid:1001536090/Device:007051000239252/Device Setup Management Interface:Device Setup Management Interface/,Device Setup Management Interface,pass,false
        '400':
          description: "Bad request - invalid format, compression type, or filter criteria"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                _errors:
                  - code: "API_CF_E00001"
                    message: "Invalid input"
                    details: ["Invalid format or compression type specified"]
                    help: "https://docs.paloaltonetworks.com/compliance-center/api/errors#API_CF_E00001"
                _request_id: "eb18eb0c-d5b7-43f3-9e38-38464ee11e2f"
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "Bearer token authentication using JWT"

  schemas:
    # ──── Request Schemas ────
    ComplianceFrameworkRequest:
      type: object
      description: "Compliance framework create/update request"
      properties:
        name:
          type: string
          description: "Compliance framework name"
        description:
          type: string
          description: "Framework description"
        source_url:
          type: string
          description: "Source URL of the framework"
        source:
          type: string
          description: "Framework source/origin"
        category:
          type: string
          description: "Framework category (e.g., 'PCF', 'CCF')"
          enum:
            - PCF
            - CCF
        hierarchy_header:
          type: object
          description: "Hierarchy header metadata"
          additionalProperties: true
        hierarchy_data:
          type: object
          description: "Hierarchical control structure"
          properties:
            children:
              type: array
              description: "Array of control nodes"
              items:
                $ref: '#/components/schemas/ControlNode'
        logo:
          type: object
          description: "Framework logo image"
          properties:
            image:
              type: string
              description: "Base64 encoded image data (e.g., 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAA...')"
            type:
              type: string
              description: "Image MIME type (e.g., 'image/png', 'image/jpeg')"
            name:
              type: string
              description: "Image filename (e.g., 'framework-logo.png')"
      example:
        name: "CIS Benchmark v1.4"
        description: "Center for Internet Security Benchmark"
        source_url: "https://www.cisecurity.org/benchmark/palo_alto_networks"
        source: "CIS"
        category: "PCF"
        hierarchy_header:
          version: "1.4"
          release_date: "2024-01-15"
        hierarchy_data:
          children:
            - name: "Access Control"
              description: "Ensure proper access controls"
              bpc_mapped: [1001, 1002]
              children: []
        logo:
          image: "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAA..."
          type: "image/png"
          name: "framework-logo.png"

    ControlNode:
      type: object
      description: "Control node in the compliance framework hierarchy"
      properties:
        name:
          type: string
          description: "Control name"
        description:
          type: string
          description: "Control description"
        bpc_mapped:
          type: array
          description: "Array of BPC (Best Practice Check) IDs mapped to this control"
          items:
            type: integer
        children:
          type: array
          description: "Nested child controls"
          items:
            $ref: '#/components/schemas/ControlNode'

    # ──── Response Schemas ────
    ComplianceFramework:
      type: object
      description: "Compliance framework resource"
      properties:
        id:
          type: string
          description: "Compliance framework ID"
          example: "PCF-7f1ae852-f5a4-40ed-911a-88d54ebf8876"
        name:
          type: string
          description: "Compliance framework name"
        description:
          type: string
          description: "Framework description"
        source_url:
          type: string
          description: "Source URL of the framework"
        source:
          type: string
          description: "Framework source/origin"
        category:
          type: string
          description: "Framework category"
          enum:
            - PCF
            - CCF
        hierarchy_header:
          type: object
          description: "Hierarchy header metadata"
          additionalProperties: true
        hierarchy_data:
          type: object
          description: "Hierarchical control structure"
        logo:
          type: object
          description: "Framework logo image"
          properties:
            image:
              type: string
              description: "Base64 encoded image data"
            type:
              type: string
              description: "Image MIME type"
            name:
              type: string
              description: "Image filename"
        created_at:
          type: string
          format: date-time
          description: "Creation timestamp"
        updated_at:
          type: string
          format: date-time
          description: "Last update timestamp"
        status:
          type: string
          description: "Framework status"
          enum:
            - draft
            - released
      example:
        id: "PCF-7f1ae852-f5a4-40ed-911a-88d54ebf8876"
        name: "CIS Benchmark v1.4"
        description: "Center for Internet Security Benchmark"
        source_url: "https://www.cisecurity.org/benchmark/palo_alto_networks"
        source: "CIS"
        category: "PCF"
        status: "released"
        created_at: "2024-01-15T10:00:00Z"
        updated_at: "2024-01-15T10:00:00Z"

    CFSummaryResponse:
      type: object
      description: "Compliance framework summary response"
      properties:
        data:
          type: array
          description: "Array of compliance framework summaries"
          items:
            type: object
            properties:
              id:
                type: string
                description: "Compliance framework ID"
                example: "PCF-7f1ae852-f5a4-40ed-911a-88d54ebf8876"
              category:
                type: string
                description: "Framework category (PCF or CCF)"
                example: "PCF"
              create_time:
                type: integer
                format: int64
                description: "Framework creation timestamp (epoch milliseconds)"
                example: 1758913230056
              benchmark:
                type: boolean
                description: "Whether this framework is a benchmark"
                example: true
              benchmark_by:
                type: string
                description: "User who marked this framework as benchmark (only present if benchmark is true)"
                example: "cchristiansen@paloaltonetworks.com"
              benchmark_time:
                type: integer
                format: int64
                description: "Timestamp when framework was marked as benchmark (epoch milliseconds, only present if benchmark is true)"
                example: 1771871351110
              revision_summary:
                type: array
                description: "Array of framework revisions"
                items:
                  type: object
                  properties:
                    name:
                      type: string
                      description: "Compliance framework name"
                      example: "NIST CSF 2.0"
                    source_url:
                      type: string
                      description: "Source URL of the framework"
                      example: "https://nvlpubs.nist.gov/nistpubs/CSWP/NIST.CSWP.29.pdf"
                    source:
                      type: string
                      description: "Framework source"
                      example: "NIST"
                    update_time:
                      type: integer
                      format: int64
                      description: "Revision update timestamp (epoch milliseconds)"
                      example: 1764789586408
                    revision_id:
                      type: string
                      description: "Revision ID"
                      example: "in_release"
                    revision_name:
                      type: string
                      description: "Revision name"
                      example: "Added logo"
                    revision_number:
                      type: string
                      description: "Revision number"
                      example: "Updated logo"
                    description:
                      type: string
                      description: "Framework description"
                      example: "NIST CSF 2.0 compliance refers to the guidelines and recommendations outlined in the National Institute of Standards and Technology Cybersecurity Framework (NIST CSF)"
                    state:
                      type: string
                      description: "Revision state"
                      enum:
                        - draft
                        - released
                      example: "released"
                    overall_score:
                      type: integer
                      description: "Overall compliance score (0-100, -1 if not available)"
                      example: 82
                    industry_score:
                      type: integer
                      description: "Industry compliance score (0-100, -1 if not available)"
                      example: 80
                    data_available:
                      type: boolean
                      description: "Whether compliance data is available (false when overall_score is -1)"
                      example: true
                    releasable:
                      type: boolean
                      description: "Whether this revision can be released"
                      example: true
                    updated_by:
                      type: string
                      description: "User who last updated this revision"
                      example: "cchristiansen@paloaltonetworks.com"
              logo:
                type: object
                description: "Framework logo information"
                properties:
                  image:
                    type: string
                    description: "Base64 encoded logo image data"
                    example: "data:image/png;base64,iVBORw0KGg..."
                  type:
                    type: string
                    description: "Image MIME type"
                    example: "image/png"
                  name:
                    type: string
                    description: "Image file name"
                    example: "nist.png"
      example:
        data:
          - id: "PCF-7f1ae852-f5a4-40ed-911a-88d54ebf8876"
            category: "PCF"
            create_time: 1758913230056
            benchmark: true
            benchmark_by: "cchristiansen@paloaltonetworks.com"
            benchmark_time: 1771871351110
            revision_summary:
              - name: "NIST CSF 2.0"
                source_url: "https://nvlpubs.nist.gov/nistpubs/CSWP/NIST.CSWP.29.pdf"
                source: "NIST"
                update_time: 1764789586408
                revision_id: "in_release"
                revision_name: "Added logo"
                revision_number: "Updated logo"
                description: "NIST CSF 2.0 compliance refers to the guidelines and recommendations outlined in the National Institute of Standards and Technology Cybersecurity Framework (NIST CSF)"
                state: "released"
                overall_score: 82
                industry_score: 80
                data_available: true
                releasable: true
                updated_by: "cchristiansen@paloaltonetworks.com"
            logo:
              image: "data:image/png;base64,iVBORw0KGg..."
              type: "image/png"
              name: "nist.png"

    ErrorResponse:
      type: object
      description: "Standard error response format"
      properties:
        _errors:
          type: array
          description: "List of error details"
          items:
            $ref: '#/components/schemas/ErrorDetail'
          minItems: 1
        _request_id:
          type: string
          description: "Unique request identifier for troubleshooting"
          format: uuid
          example: "eb18eb0c-d5b7-43f3-9e38-38464ee11e2f"
      required:
        - _errors
        - _request_id

    ErrorDetail:
      type: object
      description: "Individual error information"
      properties:
        code:
          type: string
          description: "Machine-readable error code following format API_CF_{severity}{number}"
          pattern: '^API_CF_[EWI][0-9]{5}'
          example: "API_CF_E00001"
        message:
          type: string
          description: "Human-readable error summary"
          minLength: 1
          example: "Invalid query parameter"
        details:
          type: array
          description: "Detailed error explanations"
          items:
            type: string
            minLength: 1
          minItems: 1
          example: ["Invalid value for parameter 'cf-id'"]
        help:
          type: string
          description: "Documentation URL for error resolution"
          format: uri
          example: "https://docs.paloaltonetworks.com/compliance-center/api/errors#API_CF_E00001"
      required:
        - code
        - message
  responses:
    BadRequestError:
      description: "Bad request - invalid parameters or request body"
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            _errors:
              - code: "API_CF_E00001"
                message: "Invalid input"
                details: ["Query parameter 'cf-id' is required"]
                help: "https://docs.paloaltonetworks.com/compliance-center/api/errors#API_CF_E00001"
            _request_id: "eb18eb0c-d5b7-43f3-9e38-38464ee11e2f"

    ForbiddenError:
      description: "Forbidden - insufficient permissions"
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            _errors:
              - code: "API_CF_E00003"
                message: "Access denied"
                details: ["User does not have permission to access this resource"]
                help: "https://docs.paloaltonetworks.com/compliance-center/api/errors#API_CF_E00003"
            _request_id: "eb18eb0c-d5b7-43f3-9e38-38464ee11e2f"

    NotFoundError:
      description: "Not found - resource does not exist"
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            _errors:
              - code: "API_CF_E00004"
                message: "Resource not found"
                details: ["Compliance framework 'PCF-7f1ae852-f5a4-40ed-911a-88d54ebf8876' not found"]
                help: "https://docs.paloaltonetworks.com/compliance-center/api/errors#API_CF_E00004"
            _request_id: "eb18eb0c-d5b7-43f3-9e38-38464ee11e2f"

    InternalServerError:
      description: "Internal server error"
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            _errors:
              - code: "API_CF_E00500"
                message: "Internal server error"
                details: ["An unexpected error occurred while processing the request"]
                help: "https://docs.paloaltonetworks.com/compliance-center/api/errors#API_CF_E00500"
            _request_id: "eb18eb0c-d5b7-43f3-9e38-38464ee11e2f"
