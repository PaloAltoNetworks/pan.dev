  /compliance-controls/{id}:
    get:
      tags:
        - Compliance Analytics
      summary: Get Compliance Controls
      description: "Retrieve compliance controls for a framework"
      operationId: "getComplianceControls"
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
