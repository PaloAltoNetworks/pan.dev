  schemas:
    job_status:
      type: object
      required:
        - jobId
        - progress
        - state
        - request
        - results
      properties:
        jobId:
          type: string
          format: uuid
          description: Unique identifier for the job.
          example: "ce727d2e-f22b-4c0b-824f-37aa2a4ca360"
        progress:
          type: integer
          minimum: 0
          maximum: 100
          description: Job completion percentage.
          example: 100
        state:
          type: string
          description: Current state of the job.
          enum:
            - pending
            - in_progress
            - complete
            - failed
          example: "complete"
        request:
          type: object
          description: The original request that initiated the job.
          required:
            - command
            - devices
          properties:
            command:
              type: string
              description: The command that was executed.
              example: "show-advanced-routing-route"
            devices:
              type: array
              description: List of device serial numbers for which the command was executed.
              items:
                type: string
                pattern: '^[0-9]{14,15}$'
              example:
                - "012345678901234"
        results:
          type: array
          description: Array of results from each device. The structure of the result data varies based on the job type.
          items:
            $ref: '#/components/schemas/job_result'
    job_result:
      type: object
      required:
        - device
        - state
        - created_ts
        - updated_ts
        - details
      properties:
        device:
          type: string
          pattern: '^[0-9]{14,15}$'
          description: The serial number of the device.
          example: "012345678901234"
        state:
          type: string
          description: The state of the job for this specific device.
          enum:
            - pending
            - in_progress
            - complete
            - failed
          example: "complete"
        created_ts:
          type: string
          description: Timestamp when the job was created.
          example: "2026-03-02 19:00:04"
        updated_ts:
          type: string
          description: Timestamp when the job was last updated.
          example: "2026-03-02 19:00:04"
        details:
          type: object
          description: Detailed results from the command execution. The structure varies based on the command type.
          required:
            - msg
            - result
          properties:
            msg:
              type: string
              description: Status message from the command execution.
              example: "Command completed successfully."
            result:
              type: object
              description: The actual result data from the command. Structure varies by command type and may contain routing tables, device information, or other operational data.
              additionalProperties: true
    generic_error:
      type: object
      properties:
        _errors:
          $ref: '#/components/schemas/error_detail_cause_infos'
        _request_id:
          type: string
    error_detail_cause_infos:
      type: array
      items:
        $ref: '#/components/schemas/error_detail_cause_info'
    error_detail_cause_info:
      title: Cause Info
      type: object
      properties:
        'code':
          type: string
        message:
          type: string
        details:
          oneOf:
            - type: string
            - type: object
        help:
          type: string
security:
  - scmToken: []
x-internal: false
