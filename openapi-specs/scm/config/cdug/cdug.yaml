    put:
      summary: Update Cloud Dynamic User Groups
      description: "Updates an existing Cloud Dynamic User Group. Use this endpoint\
        \ to modify group attributes\nand constraints for an already created group.\n\
        \n**This is used to edit an existing/created group.**\n\n## How it Works\n\
        - The `objectGUID` in the request body identifies which group to update\n\
        - The `objectGUID` is obtained from:\n  - POST `/cloud-dug-definition` response\
        \ when creating a group\n  - GET `/cloud-dug-definition/group` response when\
        \ listing groups\n- Only the fields you want to update need to be included\
        \ in the request\n- Primary use case: updating `user_attribute_constrain`\
        \ to modify group membership criteria\n\n## Important Behavior\n**The Application\
        \ Programming Interface returns HTTP 200 even when the objectGUID is not found.**\n\
        When the provided objectGUID doesn't exist, the response will be:\n```json\n\
        {\n  \"success\": true,\n  \"result\": {\n    \"sync\": \"Not found cloud\
        \ dug def group guid <objectGUID>\",\n    \"value\": \"\"\n  }\n}\n```\nAlways\
        \ check the `result.sync` field for error messages when processing the response.\n\
        \n**Note:** Set `useNormalizedAttrs` to `\"true\"` for external Application\
        \ Programming Interface calls (SCM integration). Also, we do not allow the\
        \ update of name related attributes (Name, Common-Name, Distinguished Name).\
        \ This is also to match behavior of UI."
      operationId: PutDirectory-syncV1Cloud-dug-definitionGroup
      responses:
        '200':
          description: 'Response from update operation.


            **Note:** The API returns HTTP 200 even when the objectGUID is not found.

            Check the `result.sync` field for error messages like "Not found cloud
            dug def group guid".

            '
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupUpdateResponse'
              examples:
                successfulUpdate:
                  summary: Successfully updated group
                  value:
                    success: true
                    result:
                      objectGUID: 72bbc29c-2703-11f1-b839-22edd0e18ff6
                      Mail: ''
                      WhenChanged: 20260325044739.0Z
                      cdug_status: updated
                      description: ''
                      ext_lastmod: 1774414059.086046
                      user_attribute_constrain:
                        $and:
                        - State: CA
                groupNotFound:
                  summary: ObjectGUID not found (still returns 200)
                  value:
                    success: true
                    result:
                      sync: Not found cloud dug def group guid 72bbc29c-2703-11f1-b839-22edd0e18ff61
                      value: ''
        '400':
          $ref: '#/components/responses/400_bad_request'
        '401':
          $ref: '#/components/responses/401_unauthorized'
        '500':
          $ref: '#/components/responses/500_internal_error'
      parameters: []
      tags:
      - Cloud Dynamic User Groups
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GroupUpdateRequest'
            examples:
              updateConstraints:
                summary: Update group attribute constraints
                value:
                  domain: okta-directory
                  useNormalizedAttrs: 'true'
                  value:
                    objectGUID: 72bbc29c-2703-11f1-b839-22edd0e18ff6
                    description: ''
                    user_attribute_constrain:
                      $and:
                      - State: CA
              updateWithMail:
                summary: Update group with additional fields
                value:
                  domain: okta-directory
                  useNormalizedAttrs: 'true'
                  value:
                    objectGUID: 72bbc29c-2703-11f1-b839-22edd0e18ff6
                    Name: updated_group_name
                    Mail: ''
                    description: Updated description for the group
                    user_attribute_constrain:
                      $and:
                      - UserAccountControl: '512'
                      - Department: Engineering
              updateMultipleConstraints:
                summary: Update with multiple OR constraints
                value:
                  domain: uppercasedss.onmicrosoft.com
                  useNormalizedAttrs: 'true'
                  value:
                    objectGUID: d32d355e-230f-11f1-841b-5a9eb7df464d
                    description: Sales or Marketing users
                    user_attribute_constrain:
                      $or:
                      - Department: Sales
                      - Department: Marketing
    delete:
      summary: Delete Cloud Dynamic User Groups
      description: 'Deletes a specific Cloud Dynamic User Group by objectGUID or all
        groups in a category by defID.


        ## How it Works

        - Use `objectGUID` to delete a specific group (obtained from POST create or
        GET list responses)

        - Use `defID` to delete all groups in a category (obtained from GET list response)

        - Provide either `objectGUID` or `defID`, but not both


        ## Important Behavior

        **The Application Programming Interface returns HTTP 200 even when deletion
        fails or is delayed.**


        ### Possible scenarios:

        1. **Sync in progress**: If a data sync is currently running for the tenant,
        the deletion request is saved but not immediately executed. You''ll need to
        retry later or wait for the next sync.

        2. **Successful deletion**: The group is deleted immediately and sync is scheduled.


        Always check the `result.sync` and `result.detail` fields to determine the
        actual outcome:

        - `"sync": "success"` - Deletion completed

        - `"sync": "Cloud Dynamic Group definition saved..."` + `"detail": "Data sync
        in-progress..."` - Deletion pending, retry later.'
      operationId: DeleteDirectory-syncV1Cloud-dug-definitionGroup
      responses:
        '200':
          description: 'Delete request processed (does not guarantee immediate deletion).


            **Important:** HTTP 200 does not mean the group was deleted. Check the
            response body:

            - If `result.sync` = "success", deletion completed

            - If `result.detail` contains "Data sync in-progress", deletion is pending
            and group was NOT deleted yet

            '
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupDeleteResponse'
              examples:
                successfulDeletion:
                  summary: Group successfully deleted
                  value:
                    success: true
                    result:
                      sync: success
                      value: null
                syncInProgress:
                  summary: Sync in progress - deletion pending (group NOT deleted
                    yet)
                  value:
                    success: true
                    result:
                      detail: Data sync in-progress for customer 4231344437556610560,
                        Please reschedule later
                      sync: Cloud Dynamic Group definition saved. Unable to schedule
                        sync. Try to sync changes manually or wait for the next automated
                        sync
                      value: null
        '400':
          $ref: '#/components/responses/400_bad_request'
        '401':
          $ref: '#/components/responses/401_unauthorized'
        '500':
          $ref: '#/components/responses/500_internal_error'
      parameters:
      - name: domain
        in: query
        description: Domain name (same as used when creating the group)
        required: true
        schema:
          type: string
        example: okta-directory
      - name: objectGUID
        in: query
        description: 'Unique group identifier to delete a specific group.

          Obtained from POST /cloud-dug-definition response or GET /cloud-dug-definition/group
          response.

          Provide either objectGUID or defID, but not both.

          '
        required: false
        schema:
          type: string
        example: 72bbc29c-2703-11f1-b839-22edd0e18ff6
      - name: defID
        in: query
        description: 'Category identifier to delete all groups in a specific category.

          Obtained from GET /cloud-dug-definition/group response.

          Provide either objectGUID or defID, but not both.

          '
        required: false
        schema:
          type: string
        example: 116c2d28-0cfb-11f1-a8d8-d2bbfe9d4496
      tags:
      - Cloud Dynamic User Groups
