  schemas:
    agent-profiles:
      type: object
      properties:
        name:
          type: string
        folder:
          type: string
          default: Mobile Users
        agent_ui:
          type: object
          description: Agent UI configuration settings
          properties:
            agent_user_override_timeout:
              type: integer
              description: Agent disabled duration (minutes).  A value of `0` means the agent will remain disabled until manually enabled.
              minimum: 0
              maximum: 65535
              default: 0
            max_agent_user_overrides:
              type: integer
              description: The maximum number of times the agent can be disabled.  A value of `0` means there are no limits to the number of times the agent can be disabled.
              minimum: 0
              maximum: 25
              default: 0
            passcode:
              type: string
              format: password
              description: The passcode used to disable the agent
              minLength: 6
              maxLength: 64
            uninstall_password:
              type: string
              format: password
              description: The password used to uninstall the agent
              minLength: 6
              maxLength: 32
            welcome_page:
              type: object
              description:  The welcome page displayed upon login
              properties:
                page:
                  type: string
        authentication_override:
          type: object
          properties:
            accept_cookie:
              type: object
              properties:
                cookie_lifetime:
                  type: object
                  properties:
                    lifetime_in_days:
                      type: number
                      minimum: 1
                      maximum: 365
                    lifetime_in_hours:
                      type: number
                      minimum: 1
                      maximum: 72
                    lifetime_in_minutes:
                      type: number
                      minimum: 1
                      maximum: 59
            cookie_encrypt_decrypt_cert:
              type: string
            generate_cookie:
              type: boolean
        certificate:
          type: object
          properties:
            criteria:
              type: object
              properties:
                certificate_profile:
                  type: string
        client_certificate:
          type: object
          properties:
            local:
              type: string
            scep:
              type: string
              maxLength: 255
        custom_checks:
          type: object
          properties:
            criteria:
              type: object
              properties:
                plist:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      key:
                        type: array
                        items:
                          type: object
                          properties:
                            name:
                              type: string
                            negate:
                              type: boolean
                            value:
                              type: string
                              pattern: .*
                              maxLength: 1024
                      negate:
                        type: boolean
                registry_key:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                        maxLength: 1023
                      default_value_data:
                        type: string
                        maxLength: 1024
                      negate:
                        type: boolean
                      registry_value:
                        type: array
                        items:
                          type: object
                          properties:
                            name:
                              type: string
                            negate:
                              type: boolean
                            value_data:
                              type: string
        gateways:
          type: object
          properties:
            external:
              type: object
              properties:
                list:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      choice:
                        type: object
                        oneOf:
                          - type: object
                            title: fqdn
                            properties:
                              fqdn:
                                type: string
                          - type: object
                            title: ip
                            properties:
                              ip:
                                type: object
                                properties:
                                  ipv4:
                                    type: string
                                    pattern: '^([:0-9.])+$'
                                    maxLength: 100
                                  ipv6:
                                    type: string
                                    maxLength: 100
                      manual:
                        type: boolean
                        description: If this GlobalProtect gateway can be manually selected
                        default: false
                      priority_rule:
                        type: array
                        items:
                          type: object
                          properties:
                            name:
                              type: string
                            priority:
                              enum:
                                - '0'
                                - '1'
                                - '2'
                                - '3'
                                - '4'
                                - '5'
            internal:
              type: object
              properties:
                list:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      choice:
                        type: object
                        oneOf:
                          - type: object
                            title: fqdn
                            properties:
                              fqdn:
                                type: string
                          - type: object
                            title: ip
                            properties:
                              ip:
                                type: object
                                properties:
                                  ipv4:
                                    type: string
                                    pattern: '^([:0-9.])+$'
                                    maxLength: 100
                                  ipv6:
                                    type: string
                                    maxLength: 100
                      source_ip:
                        type: array
                        items:
                          type: string
        gp_app_config:
          type: object
          properties:
            config:
              type: array
              description: Currently we only support connect-method and tunnel-mtu as app-config
              items:
                type: object
                anyOf:
                  - $ref: '#/components/schemas/connect-method'
                  - $ref: '#/components/schemas/tunnel-mtu'
        hip_collection:
          type: object
          properties:
            certificate_profile:
              type: string
            collect_hip_data:
              type: boolean
            custom_checks:
              type: object
              properties:
                linux:
                  type: object
                  properties:
                    process_list:
                      type: array
                      items:
                        type: string
                mac_os:
                  type: object
                  properties:
                    plist:
                      type: array
                      items:
                        type: object
                        properties:
                          name:
                            type: string
                            description: Preference list
                            maxLength: 1023
                          key:
                            type: array
                            items:
                              type: string
                        required:
                          - name
                    process_list:
                      type: array
                      items:
                        type: string
                windows:
                  type: object
                  properties:
                    process_list:
                      type: array
                      items:
                        type: string
                    registry_key:
                      type: array
                      items:
                        type: object
                        properties:
                          name:
                            type: string
                            description: Registry key
                            maxLength: 1023
                          registry_value:
                            type: array
                            items:
                              type: string
                        required:
                          - name
            exclusion:
              type: object
              properties:
                category:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      vendor:
                        type: array
                        items:
                          type: object
                          properties:
                            name:
                              type: string
                            product:
                              type: array
                              items:
                                type: string
            max_wait_time:
              type: number
              minimum: 10
              maximum: 60
        internal_host_detection:
          type: object
          properties:
            hostname:
              type: string
              description: Host name of the IPv4 in DNS record
              pattern: '^[a-zA-Z0-9._-]+$'
              maxLength: 256
            ip_address:
              type: string
              description: Internal IPv4 address of a host
        internal_host_detection_v6:
          type: object
          properties:
            hostname:
              type: string
              description: Host name of the IPv4 in DNS record
              pattern: '^[a-zA-Z0-9._-]+$'
              maxLength: 256
            ip_address:
              type: string
              description: Internal IPv6 address of a host
        machine_account_exists_with_serialno:
          type: object
          properties:
            'yes':
              type: object
            'no':
              type: object
        os:
          type: array
          items:
            enum:
              - Android
              - Chrome
              - IoT
              - Linux
              - Mac
              - Windows
              - WindowsUWP
              - iOS
        save_user_credentials:
          enum:
            - '0'
            - '1'
            - '2'
            - '3'
        source_user:
          type: array
          items:
            type: string
        third_party_vpn_clients:
          type: array
          items:
            enum:
              - PAN Virtual Ethernet Adapter
              - Juniper Network Virtual Adapter
              - Cisco Systems VPN Adapter
      required:
        - name
    connect-method:
      type: object
      properties:
        name:
          enum:
            - connect-method
          default: connect-method
        value:
          type: array
          minItems: 1
          maxItems: 1
          items:
            enum:
              - user-logon
              - pre-logon
              - on-demand
              - pre-logon-then-on-demand
    tunnel-mtu:
      type: object
      properties:
        name:
          enum:
            - tunnel-mtu
          default: tunnel-mtu
        value:
          type: array
          description: GlobalProtect Connection MTU (bytes)
          minItems: 1
          maxItems: 1
          items:
            type: number
            minimum: 1000
            maximum: 1420
            default: 1400
    agent-versions:
      type: object
      title: agent-versions
      properties:
        agent_versions:
          type: array
          description: The available versions of the GlobalProtect agent
          items:
            type: string
      required:
        - agent_versions
    authentication-settings:
      type: object
      properties:
        authentication_profile:
          type: string
        os:
          enum:
            - Any
            - Android
            - Browser
            - Chrome
            - IoT
            - Linux
            - Mac
            - Satellite
            - Windows
            - WindowsUWP
            - iOS
          default: Any
        user_credential_or_client_cert_required:
          type: boolean
      required:
        - authentication_profile
        - os
        - user_credential_or_client_cert_required
    move-auth-settings:
      type: object
      properties:
        name:
          type: string
        where:
          enum:
            - before
            - after
            - top
            - bottom
        destination:
          type: string
        folder:
          type: string
    mobile-agent-global-settings:
      type: object
      properties:
        agent_version:
          type: string
        manual_gateway:
          type: object
          description: Use the locations from GET /infrastrustre-settings deployment field to setup manual gateways.
          properties:
            region:
              type: array
              items:
                type: object
                properties:
                  name:
                    type: string
                  locations:
                    type: array
                    items:
                      type: string
    mobile-agent-infrastructure-settings:
      type: object
      properties:
        id:
          type: string
          description: UUID of the resource
          readOnly: true
          example: 123e4567-e89b-12d3-a456-426655440000
        name:
          type: string
        dns_servers:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              dns_suffix:
                type: array
                items:
                  type: string
              internal_dns_match:
                type: array
                items:
                  type: object
                  properties:
                    name:
                      type: string
                    domain_list:
                      type: array
                      items:
                        type: string
                    primary:
                      type: object
                      properties:
                        dns_server:
                          type: object
                        use_cloud_default:
                          type: object
                    secondary:
                      type: object
                      properties:
                        dns_server:
                          type: object
                        use_cloud_default:
                          type: object
              primary_public_dns:
                type: object
                properties:
                  dns_server:
                    type: string
              secondary_public_dns:
                type: object
                properties:
                  dns_server:
                    type: string
        enable_wins:
          type: object
          properties:
            'no':
              type: object
            'yes':
              type: object
              properties:
                wins_servers:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      primary:
                        type: string
                      secondary:
                        type: string
        ip_pools:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              ip_pool:
                type: array
                items:
                  type: string
        ipv6:
          type: boolean
        portal_hostname:
          type: object
          properties:
            custom_domain:
              type: object
              properties:
                cname:
                  type: string
                hostname:
                  type: string
                ssl_tls_service_profile:
                  type: string
                  description: 'value is muCustomDomainSSLProfile, it will reference to the corresponding certificate under ssl-tls-service-profile automatically'
                  default: muCustomDomainSSLProfile
            default_domain:
              type: object
              properties:
                hostname:
                  type: string
        udp_queries:
          type: object
          properties:
            retries:
              type: object
              properties:
                attempts:
                  type: number
                  description: Maximum number of retries before trying next name server
                  minimum: 1
                  maximum: 30
                interval:
                  type: number
                  description: Time in seconds for another request to be sent
                  minimum: 1
                  maximum: 30

        static_ip_pools:
          type: array
          items:
            $ref: '#/components/schemas/static-ip-pool'
      required:
        - id
        - name
        - dns_servers
        - ip_pools
        - portal_hostname
    mobile-agent-locations:
      type: object
      properties:
        region:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              locations:
                type: array
                items:
                  type: string
    tunnel-profiles:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 31
        authentication_override:
          type: object
          properties:
            accept_cookie:
              type: object
              properties:
                cookie_lifetime:
                  type: object
                  properties:
                    lifetime_in_days:
                      type: number
                      minimum: 1
                      maximum: 365
                    lifetime_in_hours:
                      type: number
                      minimum: 1
                      maximum: 72
                    lifetime_in_minutes:
                      type: number
                      minimum: 1
                      maximum: 59
                cookie_encrypt_decrypt_cert:
                  type: string
                generate_cookie:
                  type: boolean
        no_direct_access_to_local_network:
          type: boolean
        os:
          type: array
          items:
            enum:
              - Android
              - Chrome
              - IoT
              - Linux
              - Mac
              - Windows
              - WindowsUWP
              - iOS
        retrieve_framed_ip_address:
          type: boolean
        source_address:
          type: object
          properties:
            ip_address:
              type: array
              items:
                type: string
            region:
              type: array
              items:
                type: string
        source_user:
          type: array
          items:
            type: string
        split_tunneling:
          type: object
          properties:
            access_route:
              type: array
              items:
                type: string
            exclude_access_route:
              type: array
              items:
                type: string
            exclude_applications:
              type: array
              items:
                type: string
