openapi: 3.0.0
info:
  title: Unified Incident Framework APIs
  version: 3.0.0
  description: "Consolidates security and operational incidents from multiple \nPaloAlto\
    \ Networks products into a unified management interface. Provides read-only\n\
    access to search, filter, and analyze incident data across the Strata Cloud\n\
    Manager ecosystem. This Open API spec file was created on March 24, 2026. \xA9\
    \ 2026 Palo Alto Networks, Inc. Palo Alto Networks is a registered trademark of\
    \ Palo Alto Networks. A list of our trademarks can be found at [https://www.paloaltonetworks.com/company/trademarks.html](https://www.paloaltonetworks.com/company/trademarks.html).\
    \ All other marks mentioned herein may be trademarks of their respective companies."
servers:
- url: https://api.strata.paloaltonetworks.com
  description: Production Server
security:
- JWT: []
components:
  securitySchemes:
    JWT:
      type: http
      description: JWT authentication with bearer token
      scheme: bearer
      bearerFormat: Bearer [token]
  parameters:
    PrismaTenantHeader:
      in: header
      name: prisma-tenant
      description: The tenant and sub-tenant ID identifier (e.g., tenant_id:sub_tenant_id).
      required: true
      schema:
        type: string
    PrismaRegionHeader:
      in: header
      name: X-PANW-Region
      description: The region for request(e.g., americas, europe, uk, au etc).
      required: true
      schema:
        type: string
  schemas:
    FilterRule:
      type: object
      properties:
        property:
          type: string
          example: status
        operator:
          type: string
          example: in
        values:
          type: array
          items:
            type: string
          example:
          - Raised
    FilterObject:
      type: object
      properties:
        rules:
          type: array
          items:
            $ref: '#/components/schemas/FilterRule'
    PaginationObject:
      type: object
      properties:
        page_size:
          type: integer
          example: 25
        page_number:
          type: integer
          example: 1
        order_by:
          type: array
          items:
            type: object
            properties:
              property:
                type: string
                example: updated_time
              order:
                type: string
                example: desc
                enum:
                - asc
                - desc
    ErrorResponse:
      type: object
      properties:
        errorCode:
          type: string
          example: REST10001
        message:
          type: string
          example: Unexpected server error
        details:
          type: string
          example: Failed to process request
    FieldListItem:
      type: object
      properties:
        property:
          type: string
          example: updated_time
        alias:
          type: string
          example: updated_time
        dataType:
          type: string
          example: timestamp
        dataClass:
          type: string
          example: timestamp
        sequence:
          type: string
          example: '1'
        type:
          type: string
          example: timestamp
    SearchResponseHeader:
      type: object
      properties:
        createdAt:
          type: string
          format: date-time
          example: '2026-03-12T19:38:43Z'
        dataCount:
          type: integer
          example: 50
        requestId:
          type: string
          example: af683747-79af-46bb-b2f1-54d050c4eaab
        queryInput:
          type: object
          properties:
            time_range:
              type: string
              example: last 180 day(s)
            event_time:
              type: object
              properties:
                from:
                  type: string
                  format: date-time
                  example: '2025-09-13T00:00:00Z'
                to:
                  type: string
                  format: date-time
                  example: '2026-03-12T19:37:59Z'
                from_epoch:
                  type: integer
                  format: int64
                  example: 1757721600000
                to_epoch:
                  type: integer
                  format: int64
                  example: 1773344279000
        isResourceDataOverridden:
          type: boolean
          example: false
        fieldList:
          type: array
          items:
            $ref: '#/components/schemas/FieldListItem'
        status:
          type: object
          properties:
            subCode:
              type: integer
              example: 200
        pagination:
          type: object
          properties:
            current_page:
              type: integer
              example: 1
            order_by:
              type: array
              items:
                type: object
                properties:
                  property:
                    type: string
                    example: updated_time
                  order:
                    type: string
                    enum:
                    - asc
                    - desc
            next_page:
              type: integer
              example: 2
            page_count:
              type: integer
              example: 7
            total_count:
              type: integer
              example: 318
            page_size:
              type: integer
              example: 50
        name:
          type: string
          example: netsec/incidents/incidents_list
        cache_operation:
          type: string
          example: IGNORED
    ImpactedObjects:
      type: object
      properties:
        agent_ids:
          type: array
          example: []
          items:
            type: string
        aggr_locations:
          type: array
          example: []
