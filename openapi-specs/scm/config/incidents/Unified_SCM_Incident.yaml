ExternalTags:
  Incidents APIs:
    title: Incidents APIs
    description: Operations related to listing, querying, and managing specific incidents.
    tags:
    - Incidents APIs
paths:
  /incidents/v1/search:
    post:
      summary: Incidents List Search
      description: Searches network security incidents with advanced filtering and
        pagination.
      operationId: searchIncidents
      responses:
        '200':
          description: List of incidents
          content:
            application/json:
              schema:
                type: object
                properties:
                  header:
                    $ref: '#/components/schemas/SearchResponseHeader'
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        updated_time:
                          type: integer
                          format: int64
                          example: 1765468859684
                        severity:
                          type: string
                          example: Informational
                        severity_id:
                          type: integer
                          example: 200
                        status:
                          type: string
                          example: Raised
                        title:
                          type: string
                          example: Tenant has 14 raised alerts
                        priority:
                          type: string
                          example: Not Set
                        priority_id:
                          type: integer
                          example: 0
                        product:
                          type: string
                          example: Prisma Access
                        category:
                          type: string
                          example: Network
                        sub_category:
                          type: string
                          example: ''
                        code:
                          type: string
                          example: INC_AOA_TENANT_ALERTS_NOTIFICATION
                        incident_id:
                          type: string
                          example: 21818c4a-8353-4d9c-ae3e-ae90004d4662
                        raised_time:
                          type: integer
                          format: int64
                          example: 1765468859684
                        cleared_time:
                          type: integer
                          format: int64
                          example: 1765468859684
                        release_state:
                          type: string
                          example: Released
                        incident_type:
                          type: string
                          example: SOURCE_AGGREGATION_INCIDENT
                        designation:
                          type: string
                          example: root
                        acknowledged:
                          type: boolean
                          example: false
                        acknowledged_by:
                          type: string
                          example: John Doe
                        primary_impacted_objects:
                          $ref: '#/components/schemas/ImpactedObjects'
                        related_impacted_objects:
                          $ref: '#/components/schemas/ImpactedObjects'
                        snow_assignee:
                          type: string
                          example: ''
                        snow_priority:
                          type: string
                          example: ''
                        snow_status:
                          type: string
                          example: ''
                        snow_ticket_id:
                          type: string
                          example: ''
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      parameters: []
      tags:
      - Incidents APIs
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                filter:
                  $ref: '#/components/schemas/FilterObject'
                pagination:
                  $ref: '#/components/schemas/PaginationObject'
            examples:
              FilterWithPagination:
                summary: Filter by Product/Status with Pagination
                value:
                  filter:
                    rules:
                    - property: release_state
                      operator: in
                      values:
                      - Released
                    - property: product
                      operator: in
                      values:
                      - NGFW
                      - Prisma Access
                      - Posture
                    - property: status
                      operator: in
                      values:
                      - Raised
                  pagination:
                    page_size: 50
                    page_number: 1
                    order_by:
                    - property: updated_time
                      order: desc
  /incidents/v1/details/{incident-id}:
    get:
      summary: Incidents Details
      description: Retrieves comprehensive information about a specific network security
        incident.
      operationId: getIncidentDetails
      responses:
        '200':
          description: Detailed incident information
          content:
            application/json:
              schema:
                type: object
                properties:
                  incident_id:
                    type: string
                    example: 21818c4a-8353-4d9c-ae3e-ae90004d4662
                  title:
                    type: string
                    example: Tenant has 14 raised alerts
                  description:
                    type: string
                    example: This alert triggers if the firewall has detected that
                      a dataplane ethernet interface is down.
                  description_locale_key:
                    type: string
                    example: alert.sig_45de40b0_fdbb_4506_900b_033d4551cdde.description
                  raised_time:
                    type: integer
                    format: int64
                    example: 1765468859684
                  updated_time:
                    type: integer
                    format: int64
                    example: 1765468859684
                  resource_keys:
                    type: string
                    description: JSON string containing resource identifiers.
                    example: '{"tenant_id": "24072002", "sub_tenant_id": "24072002"}'
                  status:
                    type: string
                    example: Raised
                  remediations:
                    type: string
                    description: Stringified JSON object containing remediation steps
                      for the incident.
                    example: '{"remediations":[{"dynamic_content":{"steps":[{"title":"How
                      to renew a locally generated certificate :","subSteps":[{"title":"
                      ","description":"Select the certificate to be renewed in the
                      following section: Device > Certificate Management > Certificates."}]}]}}]}'
                  detail:
                    type: string
                    description: Stringified JSON array containing detailed alert
                      information.
                    example: '{"severity":"SEVERITY_S20","concern_level":"CONCERN_LEVEL_RAISED"}'
                  alerts:
                    type: array
                    items:
                      type: object
                      properties:
                        alert_id:
                          type: string
                          example: 0a887db4-d760-4dc2-bb14-04c5e120b811
                        processed_alert_id:
                          type: string
                          example: 0a887db4-d760-4dc2-bb14-04c5e120b811
                        severity:
                          type: string
                          example: Critical
                        state:
                          type: string
                          example: Raised
                        title:
                          type: string
                          example: Alert title
                        updated_time:
                          type: integer
                          format: int64
                          example: 1765468859684
                        domain:
                          type: string
                          example: External
                        inc_prop:
                          type: integer
                          example: 0
                        ctx_only_alert:
                          type: boolean
                          example: false
                        code:
                          type: string
                          example: AL_AOA_TENANT_ALERTS_NOTIFICATION
                        resource_keys:
                          type: string
                          description: JSON string containing resource identifiers.
                          example: '{"tenant_id": "24072002", "sub_tenant_id": "24072002"}'
                        release_state:
                          type: string
                          example: Released
                  incident_type:
                    type: string
                    example: SOURCE_AGGREGATION_INCIDENT
                  incident_code:
                    type: string
                    example: INC_AOA_TENANT_ALERTS_NOTIFICATION
                  incident_settings_id:
                    type: string
                    example: INC_AOA_TENANT_ALERTS_NOTIFICATION
                  severity_id:
                    type: integer
                    example: 200
                  severity:
                    type: string
                    example: Informational
                  priority:
                    type: string
                    example: Not Set
                  release_state:
                    type: string
                    example: Released
                  product:
                    type: string
                    example: Prisma Access
                  resource_context:
                    type: string
                    description: Stringified JSON object containing contextual resource
                      information for the incident.
                    example: '{"cluster_id":100251836,"site_name":"SC-Brazil"}'
                  category:
                    type: string
                    example: Network and Traffic
                  sub_category:
                    type: string
                    example: Interface
                  designation:
                    type: string
                    example: root
                  acknowledged:
                    type: boolean
                    example: false
                  acknowledged_by:
                    type: string
                    example: John Doe
                  snow_assignee:
                    type: string
                    example: ''
                  snow_priority:
                    type: string
                    example: ''
                  snow_status:
                    type: string
                    example: ''
                  snow_ticket_id:
                    type: string
                    example: ''
                  primary_impacted_objects:
                    $ref: '#/components/schemas/ImpactedObjects'
                  related_impacted_objects:
                    $ref: '#/components/schemas/ImpactedObjects'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      parameters:
      - name: incident-id
        in: path
        required: true
        description: The unique identifier of the incident.
        schema:
          type: string
      tags:
      - Incidents APIs
