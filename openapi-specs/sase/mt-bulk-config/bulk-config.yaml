  /mt/config/v1/snippets:
    get:
      summary: List configuration snippets
      description: Retrieves a list of configuration snippets that are available to
        the authenticated user based on their tenant context and permissions
      tags:
        - Snippet Resource API
      parameters:
        - name: pageNum
          in: query
          schema:
            type: integer
            format: int32
            default: 0
        - name: pageSize
          in: query
          schema:
            type: integer
            format: int32
            default: 100
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              examples:
                List snippet to tenants:
                  value:
                    data:
                      - folder: Shared
                        id: D1E064CE-7017-4F57-ABA5-9BDF9843972F
                        name: GlobalSnippet
                        version:
