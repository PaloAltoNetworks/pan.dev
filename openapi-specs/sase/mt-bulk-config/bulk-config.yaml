---
openapi: 3.1.0
tags:
  - name: Job Resource API
    description: APIs for managing and tracking bulk configuration jobs
  - name: Snippet Resource API
    description: APIs for managing configuration snippets
  - name: Tenant Resource API
    description: APIs for managing tenant hierarchy and configuration
  - name: Tenant Feature API
    description: APIs for managing tenant feature enablement and status
components:
  securitySchemes:
    authKey:
      type: http
      scheme: Bearer
  schemas:
    SnippetDetails:
      type: object
      properties:
        name:
          type: string
    TenantBean:
      type: object
      required:
        - tenantId
      properties:
        tenantId:
          type: string
    TenantFeatureBean:
      type: object
      required:
        - tsgId
      properties:
        tsgId:
          type: string
    TenantSnippetAssociation:
      type: object
      required:
        - snippet
        - tenants
      properties:
        snippet:
          $ref: "#/components/schemas/SnippetDetails"
        tenants:
          type: array
          items:
            type: string
paths:
  /mt/config/v1/jobs:
    get:
      summary: List bulk jobs
      description: Retrieves a paginated list of bulk configuration jobs that have
        been submitted to the system
      tags:
        - Job Resource API
      parameters:
        - name: from
          in: query
          schema:
            type: integer
            format: int64
        - name: pageNum
          in: query
          schema:
            type: integer
            format: int32
            default: 0
        - name: pageSize
          in: query
          schema:
            type: integer
            format: int32
            default: 100
        - name: search
          in: query
          schema:
            type: string
        - name: to
          in: query
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Success
          content:
            application/json:
              examples:
                List Jobs:
                  value:
                    data:
                      - id: 08f085ef-03c9-4c59-8926-671edca14d4c
                        initiatedBy: admin
                        jobStatus: IN_PROGRESS
                        jobType: ASSIGNED
                        snippetsAssociated:
                          - id: 671D812B-FA57-459B-B383-75E63E89518A
                            name: GlobalSnippet1
