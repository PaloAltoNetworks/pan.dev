    post:
      summary: Revert tenant configuration
      description: "Reverts a tenant's configuration to its previous known good state,\
        \ effectively rolling back the most recent configuration change"
      tags:
        - Tenant Resource API
      requestBody:
        content:
          application/json:
            examples:
              Revert Tenant Configuration:
                value:
                  tenantId: "12345"
            schema:
              $ref: "#/components/schemas/TenantBean"
        required: true
      responses:
        "200":
          description: Success
          content:
            application/json:
              examples:
