info:
  contact:
    email: support@paloaltonetworks.com
  description: "This Open API spec file represents the APIs available for\n[Palo Alto\
    \ Networks Multitenant Bulk Configuration](https://pan.dev/sase/api/mt-bulk-config/)\
    \ APIs.\n\nThese APIs enable Managed Security Service Providers (MSSPs) and large\
    \ enterprises to push configuration snippets across multiple Prisma SASE tenants,\
    \ track bulk deployment jobs, and manage tenant hierarchy from a single management\
    \ point in Strata Cloud Manager.\n\nThese APIs use the common SASE authentication\
    \ mechanism and base URL. See the\n[Prisma SASE API Get Started](https://pan.dev/sase/docs/getstarted)\
