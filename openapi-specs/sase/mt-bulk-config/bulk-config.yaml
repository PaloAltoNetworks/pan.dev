  /mt/config/v1/snippets/assign-and-push:
    post:
      summary: Assign and push
      description: Assigns a configuration snippet to one or more target tenants and
        immediately pushes the configuration changes to those tenants
      tags:
        - Snippet Resource API
      requestBody:
        content:
          application/json:
            examples:
              Assign Snippet to Tenants:
                value:
                  snippetId: snippet-123
                  tenantIds:
                    - tenant-1
                    - tenant-2
                    - tenant-3
            schema:
              $ref: "#/components/schemas/TenantSnippetAssociation"
        required: true
      responses:
        "200":
          description: Success
          content:
            application/json:
              examples:
                Assign snippet to tenants and push:
                  value:
                    jobId: 15033562-0B4D-4549-8AA1-074FE3F60FF0
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: Data Not Found
        "500":
          description: Server Error
      security:
        - authKey: []
  /mt/config/v1/snippets/unassign-and-push:
    post:
      summary: Unassign and push
      description: Removes a configuration snippet assignment from one or more target
        tenants and immediately pushes the configuration removal to those tenants
      tags:
        - Snippet Resource API
      requestBody:
        content:
          application/json:
            examples:
              Unassign Snippet from Tenants:
                value:
                  snippetId: snippet-123
                  tenantIds:
                    - tenant-1
                    - tenant-2
                    - tenant-3
            schema:
              $ref: "#/components/schemas/TenantSnippetAssociation"
        required: true
      responses:
        "200":
          description: Snippet unassignment initiated successfully. Returns parent
            job ID for tracking the bulk removal operation.
          content:
            application/json:
              examples:
                Unassign snippet to tenants and push:
                  value:
                    jobId: 15033562-0B4D-4549-8AA1-074FE3F60FF0
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: Data Not Found
        "500":
          description: Server Error
      security:
        - authKey: []
