components:
  schemas:
    FilterRequest:
      type: object
      properties:
        filter:
          $ref: "#/components/schemas/FilterCondition"
        histogram:
          $ref: "#/components/schemas/HistogramCondition"
        properties:
          type: array
          items:
            $ref: "#/components/schemas/QueryProperty"
        count:
          type: integer
          description: Maximum number of records to return
          default: 10000
    FilterCondition:
      type: object
      properties:
        operator:
          type: string
          enum:
          - AND
          - OR
          default: AND
        rules:
          type: array
          items:
            $ref: "#/components/schemas/QueryRule"
      required:
      - rules
    QueryRule:
      type: object
      required:
      - property
      - operator
      - values
      properties:
        property:
          type: string
          description: "Field to filter on (e.g., event_time, raised_time, severity, state, incident_id)"
        operator:
          type: string
          description: "Filter operator. Time fields support: last_n_hours, last_n_days, between. Other fields support: equals, not_equals, in, not_in, gt, lt, gte, lte."
        values:
          type: array
          description: "Filter values. For last_n_hours: [N] where N is 1-24. For last_n_days: [N] where N is 1-180. For between: [startEpochMs, endEpochMs]."
          items: {}
    QueryProperty:
      type: object
      properties:
        property:
          type: string
    HistogramCondition:
      type: object
      properties:
        range:
          type: string
          description: "Time bucket size"
          enum:
          - minute
          - hour
          - day
        value:
          type: string
          description: "Multiplier for the range (e.g., '1' for 1-hour buckets)"
        enableEmptyInterval:
          type: boolean
          description: "Whether to include time buckets with zero count"
          default: true
    ThreatAggregationType:
      type: string
      description: "Aggregation strategy for threat count results"
      enum:
      - SERVICE_TYPE
      - TENANT
      - NONE
      default: SERVICE_TYPE
    ConnectivityAggregationType:
      type: string
      description: "Aggregation strategy for service connectivity results"
      enum:
      - NONE
      - CONNECTION_STATE
      default: NONE
    ServiceConnectionNodeType:
      type: string
      description: "Service connectivity node type"
      enum:
      - CDL
      - EP
      - MU
      - RN
      - SC
      - ZTNA
    AddOnThreatRequestType:
      type: string
      description: "Add-on threat metric type to retrieve"
      enum:
      - threat_count_ai_security
      - threat_count_iot_source_type
      - threat_count_app_security
    LicenseProduct:
      type: string
      description: "License product type"
      enum:
      - prisma_access
      - sdwan
      - prisma_browser
    SecurityAddonsProduct:
      type: string
      description: "Product to filter security add-ons by"
      enum:
      - prisma_access
      - sdwan
  securitySchemes:
    authKey:
      type: http
      scheme: Bearer
