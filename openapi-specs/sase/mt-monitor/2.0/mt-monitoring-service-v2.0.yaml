      tags:
        - Threats
      summary: Get Threats by Category
      description: Get Threats by Category
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FilterRequest"
            examples:
              Last 24 Hours:
                value:
                  filter:
                    rules:
                    - property: event_time
                      operator: last_n_hours
                      values:
                      - 24
              Last 7 Days:
                value:
                  filter:
                    rules:
                    - property: event_time
                      operator: last_n_days
                      values:
                      - 7
        required: true
      responses:
        "200":
          description: Success
          content:
            application/json:
              examples:
                Get threats by category:
                  value:
                    data:
                    - tenant_id: "1021202872"
                      category: vulnerability
                      count: 142
                    - tenant_id: "1021202872"
                      category: spyware
                      count: 87
                    - tenant_id: "1033430256"
                      category: virus
                      count: 53
                    - tenant_id: "1033430256"
                      category: url-filtering
                      count: 31
                    requestId: a1b2c3d4-5e6f-7890-abcd-ef1234567890
        "400":
          description: Bad Request
          content:
            application/json:
              examples:
                Invalid request payload:
                  value:
                    error:
                      errorCode: 10007
                      errorType: INTERNAL_ERROR
                      httpStatus: 400
                      msg: Invalid request payload
                    requestId: b2c3d4e5-6f78-9012-bcde-f12345678901
        "500":
          description: Server Error
          content:
            application/json:
              examples:
                Unknown error:
