  /api/mt/monitoring/v2/service-connectivity/status:
    post:
      tags:
        - Service Connectivity
      summary: Get Service Connectivity Status
      description: Get Service Connectivity Status by Node Type
      parameters:
      - name: nodeType
        in: query
        required: true
        description: "Node type to query connectivity status for"
        schema:
          $ref: "#/components/schemas/ServiceConnectionNodeType"
      - name: aggBy
        in: query
        description: "Aggregation strategy. NONE returns per-tenant breakdown, CONNECTION_STATE aggregates across tenants by state."
        schema:
          $ref: "#/components/schemas/ConnectivityAggregationType"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FilterRequest"
            examples:
              Filter by state Up:
                value:
                  filter:
                    rules:
                    - property: state
                      operator: in
                      values:
                      - 1
              Filter by state Down:
                value:
                  filter:
                    rules:
                    - property: state
                      operator: in
                      values:
                      - 0
        required: true
      responses:
        "200":
          description: Success
          content:
            application/json:
              examples:
                Service connectivity per tenant:
                  value:
                    data:
                    - tenant_id: "1021202872"
                      node_type: MU
                      up: 45
                      down: 2
                      needs_attention: 1
                      unknown: 0
                    - tenant_id: "1033430256"
                      node_type: MU
                      up: 120
                      down: 0
                      needs_attention: 3
                      unknown: 0
                    requestId: abcdef01-2345-6789-abcd-ef0123456789
                Service connectivity aggregated by state:
                  value:
                    data:
                    - connection_state: up
                      count: 165
                    - connection_state: down
                      count: 2
                    - connection_state: needs_attention
                      count: 4
                    - connection_state: unknown
                      count: 0
                    requestId: bcdef012-3456-789a-bcde-f01234567890
        "400":
          description: Bad Request
          content:
            application/json:
              examples:
                Invalid request payload:
                  value:
                    error:
                      errorCode: 10007
                      errorType: INTERNAL_ERROR
                      httpStatus: 400
                      msg: Invalid request payload
                    requestId: cdef0123-4567-89ab-cdef-012345678901
        "500":
          description: Server Error
          content:
            application/json:
              examples:
                Failed to retrieve data:
                  value:
                    error:
                      errorCode: 1001
                      errorType: INTERNAL_ERROR
                      httpStatus: 500
                      msg: Failed to retrieve data from insights
                    requestId: def01234-5678-9abc-def0-123456789012
