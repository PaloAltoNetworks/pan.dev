  /api/mt/monitoring/v2/threats/threat_count:
    post:
      tags:
        - Threats
      summary: Get Threat Count
      description: Get Threat Count
      parameters:
      - name: aggBy
        in: query
        description: "Aggregation strategy. SERVICE_TYPE groups by service, TENANT groups by tenant, NONE returns raw data."
        schema:
          $ref: "#/components/schemas/ThreatAggregationType"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FilterRequest"
            examples:
              Last 24 Hours:
                value:
                  filter:
                    rules:
                    - property: event_time
                      operator: last_n_hours
                      values:
                      - 24
              Between timestamps:
                value:
                  filter:
                    rules:
                    - property: event_time
                      operator: between
                      values:
                      - 1705312200000
                      - 1705398600000
        required: true
      responses:
        "200":
          description: Success
          content:
            application/json:
              examples:
                Threat count by service type:
                  value:
                    data:
                    - tenant_id: "1021202872"
                      service_type: GP
                      count: 320
                    - tenant_id: "1021202872"
                      service_type: RN
                      count: 145
                    - tenant_id: "1033430256"
                      service_type: SC
                      count: 78
                    requestId: f6789012-3456-7890-0123-456789012345
