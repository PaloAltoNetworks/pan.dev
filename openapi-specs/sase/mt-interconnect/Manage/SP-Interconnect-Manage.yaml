info:
  title: SP Interconnect Manage APIs
  version: '1.0'
  description: "These APIs provide the administrative tools necessary to configure\
    \ and manage the lifecycle of Service Provider (SP) Interconnects \nand virtual\
    \ VlanAttachments within the management plane. They enable administrators to establish\
    \ private, secure bridges between Service Providers \nand Prisma Access to bypass\
    \ public cloud backbones. Use these tools during initial deployment or regional\
    \ expansion to provision high-capacity physical and virtual links. \nBy submitting\
    \ specific regional and partner parameters, you can automate the creation of shared\
