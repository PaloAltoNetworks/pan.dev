        endTime milliseconds.
      parameters:
      - name: interconnectId
        in: path
        required: true
        schema:
          type: string
      - name: vlanAttachmentId
        in: path
        required: true
        schema:
          type: string
      - name: duration
        in: query
        description: 'Duration for logs. Allowed values: 15m, 1h, 1d, 3d'
        schema:
          type: string
          default: 1d
          enum:
          - 15m
          - 1h
          - 1d
          - 3d
      responses:
        '200':
          description: Success
          content:
            application/json:
              examples:
                Get cloud router logs:
                  value:
                    data:
                      logs:
                      - timestamp: 1758576695399
                        severity: INFO
                        message: BGP session established with peer 10.0.0.1
                      - timestamp: 1758576779732
                        severity: WARNING
                        message: BGP hold timer expired, resetting session
                    requestId: 82923271-2db3-4895-b1cf-a5faa77d28e3
        '400':
          description: Bad Request
          content:
            application/json:
              examples:
                Invalid duration:
                  value:
                    error:
                      errorCode: 52091
                      errorType: VALIDATION_ERROR
                      httpStatus: 400
                      msg: Invalid duration, allowed duration are 15m, 1h, 1d, 3d
                    requestId: 95203e0e-e0f7-49ef-9b9d-04c9ba42e95b
                Logs not supported for AWS:
                  value:
                    error:
                      errorCode: 52092
                      errorType: VALIDATION_ERROR
                      httpStatus: 400
                      msg: CloudRouter logs supported only for GCP connections
                    requestId: a1b2c3d4-5e6f-7890-abcd-ef1234567890
        '500':
          description: Server Error
          content:
            application/json:
              examples:
                Failed to get logs:
                  value:
                    error:
                      errorCode: 52090
                      errorType: INTERNAL_ERROR
                      httpStatus: 500
                      msg: Failed getting cloud router logs from GCP
                    requestId: d42dba1a-23f1-4818-813b-2da9f35c95bb
      operationId: GetMtSp-interconnectInterconnectsBy_interconnectidVlan-attachmentsBy_vlanattachmentidLogs
  /mt/sp-interconnect/regions:
    get:
      tags:
      - Interconnect
      summary: List of Regions and Edge Locations
      description: Fetch the master list of all geographical regions and edge locations
        supported by the SP Interconnect service. This assists in network planning
        by identifying optimal locations for Interconnect placement. Consult this
        data to determine the closest edge location to your physical infrastructure
        for low-latency traffic egress. The response is dynamically filtered based
        on the cloudProvider to ensure regional compatibility.
      parameters:
      - name: cloudProvider
        in: query
        schema:
          $ref: '#/components/schemas/CloudProvider'
      responses:
        '200':
          description: Success
          content:
            application/json:
              examples:
                Get IP Pool regions/edge locations:
                  value:
                    data:
                    - edge_locations:
                      - display_name: US Southwest
                        edge_location: us-west-201
                      - display_name: US West
                        edge_location: us-west-1
                      compute_region: us-west2
                      theater: North Americas
                    - edge_locations:
                      - display_name: US Central West
                        edge_location: us-west-3
                      compute_region: us-west3
                      theater: North Americas
                    requestId: e459bba9-ca17-4bfa-a55a-f7305a7e8f75
      operationId: GetMtSp-interconnectRegions
  /mt/sp-interconnect/regions/physical-connections:
    get:
      tags:
      - Interconnect
      summary: List of Physical Connection Regions in GCP
      description: Retrieve the specific regions and colocation facilities available
        for physical interconnect deployments on the GCP network. This informs network
        engineers of the precise locations where high-speed physical links can be
        provisioned. Use this when developing a dedicated physical connectivity strategy
        for large-scale multi-tenant environments. The data provides a hierarchy of
        continents, cities, and specific facility names.
      responses:
        '200':
          description: Success
          content:
            application/json:
              examples:
                Get regions for Physical Interconencts in GCP:
                  value:
                    data:
                      regions:
                      - cities:
                        - coloFacilities:
                          - address: 'Cologix, Inc.

                              1050 W Pender Street

                              Vancouver, V6E 3S7

                              Canada

                              '
                            city: Vancouver
                            continent: C_NORTH_AMERICA
                            description: Cologix VAN2
                            status: AVAILABLE
                            zones:
                            - availabilityZone: zone1
                              facilityProvider: Cologix
                              facilityProviderFacilityId: Cologix
                              id: 1377
                              name: yvr-zone1-1881
                              peeringdbFacilityId: '1881'
                              selfLink: https://www.googleapis.com/compute/v1/projects/host-gpcs-dev-01/global/interconnectLocations/yvr-zone1-1881
                              status: AVAILABLE
                            - availabilityZone: zone2
                              facilityProvider: Cologix
                              facilityProviderFacilityId: Cologix
                              id: 1378
                              name: yvr-zone2-1881
                              peeringdbFacilityId: '1881'
                              selfLink: https://www.googleapis.com/compute/v1/projects/host-gpcs-dev-01/global/interconnectLocations/yvr-zone2-1881
                              status: AVAILABLE
                          name: Vancouver
                        region: C_NORTH_AMERICA
                    requestId: 709de72e-8004-41c8-9dc5-9d9b852876c4
      operationId: GetMtSp-interconnectRegionsPhysical-connections
  /mt/sp-interconnect/settings:
    post:
      tags:
      - Interconnect
      summary: Configure Egress Settings
      description: Apply traffic routing preferences and egress behavior for a specific
        Tenant Service Group (TSG). This determines whether egress traffic utilizes
        the private Service Provider (SP) path or the standard Prisma Access (PA)
        path. Set this during tenant onboarding or when modifying existing regional
        traffic policies. If SP egress is selected, you must specify the CIDR ranges
        that should participate in the private routing.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SettingsEntry'
            examples:
              Set SP egress type with CIDRs:
                value:
                  egressType: SP
                  cidr:
                  - 2.1.1.1/29
                  - 3.2.2.2/29
              Set PA egress type:
                value:
                  egressType: PA
        required: true
      responses:
        '200':
          description: Success
          content:
            application/json:
              examples:
                Update Egress type and cidr:
                  value:
                    data:
                      cidr:
                      - 2.1.1.1/29
                      - 3.2.2.2/29
                      egressType: SP
                    requestId: 996e250d-e1bc-4499-a408-7ccbfdda0368
        '400':
          description: Bad Request
          content:
            application/json:
              examples:
                Update Egress type and cidr failed on not vpc entry:
                  value:
                    error:
                      errorCode: 52003
                      errorType: VALIDATION_ERROR
                      httpStatus: 400
                      msg: Missing VPC association entry for tenant
                    requestId: c33354e9-6fd0-491d-9dac-010240132fed
        '409':
          description: Conflict
      operationId: PostMtSp-interconnectSettings
    get:
      summary: Get Egress Settings
      description: View the current egress and routing configuration for the authenticated
        tenant context. This verifies whether the tenant is currently utilizing the
        SP Interconnect or the default public path for their egress traffic. Access
        this to validate that your network architecture policies have been correctly
        applied at the management plane. The response provides the egress type and
        all participating CIDR blocks.
      tags:
      - Interconnect
      responses:
        '200':
          description: Success
          content:
            application/json:
              examples:
                Get Egress type and cidr:
                  value:
                    data:
                      cidr:
                      - 3.2.2.2/29
                      - 2.1.1.1/29
                      egressType: SP
                    requestId: d10ee1b0-b8ed-461b-af14-dfad5a782dc5
        '400':
          description: Bad Request
          content:
            application/json:
              examples:
                Get Egress type and cidr failed on not vpc entry:
                  value:
                    error:
                      errorCode: 52030
                      errorType: VALIDATION_ERROR
                      httpStatus: 400
                      msg: Tenant does not have shared vpc assigned
                    requestId: 130cb837-b3d8-43af-b15f-cd60724cab8d
        '404':
          description: Not Found
      operationId: GetMtSp-interconnectSettings
servers:
- url: https://api.sase.paloaltonetworks.com
security:
- authKey: []
components:
  schemas:
    CloudProvider:
      type: string
      enum:
      - GCP
      - AWS
    ConnectionType:
      type: string
      enum:
      - DEDICATED
      - PARTNER
    DedicatedVlanAttachmentDetailsEntry:
      type: object
      properties:
        edgeAvailability:
          type: string
        bandwidth:
          $ref: '#/components/schemas/Bandwidth'
      required:
      - edgeAvailability
    InterconnectRequest:
      type: object
      required:
      - name
      - region
      - partnerName
      - partnerEmail
      - usage
      - cloudProvider
      - type
      properties:
        name:
          type: string
          pattern: ^([-0-9a-z]){1,13}$
        region:
          type: string
          pattern: \\S+
        partnerName:
          type: string
          pattern: ^([a-zA-Z0-9\s\-]){1,30}$
        partnerEmail:
          type: string
          pattern: \\S
        usage:
          $ref: '#/components/schemas/InterconnectUsage'
        tsgId:
          type: string
          pattern: ^[0-9-]+$
        cloudProvider:
          $ref: '#/components/schemas/CloudProvider'
        type:
          $ref: '#/components/schemas/ConnectionType'
        ipPool:
          $ref: '#/components/schemas/IPPoolRequest'
        physicalConnection:
          $ref: '#/components/schemas/PhysicalConnectionEntry'
        vlanAttachment:
          $ref: '#/components/schemas/VlanAttachmentRequest'
    InterconnectUsage:
      type: string
      enum:
      - SHARED
      - PER_TENANT
    IPPoolRequest:
      type: object
      required:
      - ipProvider
      properties:
        ipBlocks:
          type: array
          uniqueItems: true
          items:
            $ref: '#/components/schemas/IPBlockEntry'
        ipProvider:
          $ref: '#/components/schemas/IPProvider'
    IPBlockEntry:
      type: object
      required:
      - cidr
      properties:
        edgeLocation:
          type: string
        cidr:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            type: string
        type:
          $ref: '#/components/schemas/IPBlockType'
    IPBlockType:
      type: string
      enum:
      - PRIMARY
      - SECONDARY
    IPProvider:
      type: string
      enum:
      - SP
      - PANW
    PhysicalConnectionEntry:
      type: object
      required:
      - physicalConnectionName
      - linkType
      - coloFacilities
      - partnerName
      - partnerEmail
      properties:
        physicalConnectionName:
          type: string
          pattern: \\S
        linkType:
          $ref: '#/components/schemas/PhysicalInterconnectLinkType'
        requestedLinkCount:
          type: integer
          format: int32
        coloFacilities:
          type: array
          minItems: 1
          items:
            type: string
        macSecEnabled:
          type: boolean
        partnerName:
          type: string
          pattern: \\S
        partnerEmail:
          type: string
          pattern: \\S
    PhysicalInterconnectLinkType:
      type: string
      enum:
      - LINK_TYPE_ETHERNET_10G_LR
      - LINK_TYPE_ETHERNET_100G_LR
    VlanAttachmentRequest:
      type: object
      required:
      - name
      - bgpPeerAsn
      - bgpPeerBfdSessionInitMode
      properties:
        name:
          type: string
          pattern: ^([-0-9a-z]){1,13}$
        stackType:
          $ref: '#/components/schemas/StackType'
        bandwidth:
          $ref: '#/components/schemas/Bandwidth'
        bgpPeerAsn:
          type: integer
          format: int64
          minimum: 1
        bgpPeerBfdSessionInitMode:
          $ref: '#/components/schemas/SessionInitializationMode'
        bgpPeerBfdMinTransmitInterval:
          type: integer
          format: int64
          maximum: 30000
          minimum: 1000
        bgpPeerBfdMinReceiveInterval:
          type: integer
          format: int64
          maximum: 30000
          minimum: 1000
        bgpPeerBfdMultiplier:
          type: integer
          format: int64
          maximum: 16
          minimum: 5
        dedicatedConnectionDetails:
          type: array
          items:
            $ref: '#/components/schemas/DedicatedVlanAttachmentDetailsEntry'
        primaryAttachmentCustomIpAddress:
          $ref: '#/components/schemas/VlanAttachmentCustomIpAddress'
        redundantAttachmentCustomIpAddress:
          $ref: '#/components/schemas/VlanAttachmentCustomIpAddress'
        bgpPeerMd5AuthEnabled:
          type: boolean
    StackType:
      type: string
      enum:
      - IPV4_ONLY
      - IPV4_IPV6
    Bandwidth:
      type: string
      enum:
      - BPS_50M
      - BPS_100M
      - BPS_200M
      - BPS_300M
      - BPS_400M
      - BPS_500M
      - BPS_1G
      - BPS_2G
      - BPS_5G
      - BPS_10G
    SessionInitializationMode:
      type: string
      enum:
      - ACTIVE
      - PASSIVE
      - DISABLED
    SettingsEntry:
      type: object
      required:
      - egressType
      properties:
        egressType:
          type: string
          pattern: SP|PA
        cidr:
          type: array
          uniqueItems: true
          items:
            type: string
            pattern: ^((25[0-5]|2[0-4][0-9]|[0-1]?[0-9]{1,2})(\.(25[0-5]|2[0-4][0-9]|[0-1]?[0-9]{1,2})){3})\/(3[0-2]|[1-2][0-9]|[0-9])$
    VlanAttachmentCustomIpAddress:
      type: object
      description: Custom IP address configuration for VLAN attachment BGP peering.
        Both Cloud Router and Customer Router IP addresses must be provided together
        with matching prefix lengths (/29 or /30). IP addresses must not be in reserved
        ranges (RFC1918 private IPs, loopback, etc.) and must not be network or broadcast
        addresses.
      properties:
        candidateCloudRouterIpAddress:
          type: string
          description: Cloud Router IP address in CIDR notation (e.g., 169.254.1.1/29).
            Must have prefix length /29 or /30 and match the prefix length of candidateCustomerRouterIpAddress.
          pattern: ^((25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?))/(29|30)$
        candidateCustomerRouterIpAddress:
          type: string
          description: Customer Router IP address in CIDR notation (e.g., 169.254.1.2/29).
            Must have prefix length /29 or /30 and match the prefix length of candidateCloudRouterIpAddress.
          pattern: ^((25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?))/(29|30)$
  securitySchemes:
    authKey:
      type: http
      scheme: Bearer
ExternalTags: {}
