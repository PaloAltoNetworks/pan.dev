openapi: 3.1.0
info:
  title: SP Interconnect Manage APIs
  version: '1.0'
  description: "This Open API spec file was created on January 28, 2026. \xA9 2026\
    \ Palo Alto Networks, Inc. Palo Alto Networks is a registered trademark of Palo\
    \ Alto Networks. A list of our trademarks can be found at [https://www.paloaltonetworks.com/company/trademarks.html](https://www.paloaltonetworks.com/company/trademarks.html).\
    \ All other marks mentioned herein may be trademarks of their respective companies."
servers:
- url: https://api.sase.paloaltonetworks.com
security:
- authKey: []
components:
  schemas:
    CloudProvider:
      type: string
      enum:
      - GCP
      - AWS
    ConnectionType:
      type: string
      enum:
      - DEDICATED
      - PARTNER
    DedicatedVlanAttachmentDetailsEntry:
      type: object
      properties:
        edgeAvailability:
          type: string
        bandwidth:
          $ref: '#/components/schemas/Bandwidth'
      required:
      - edgeAvailability
    InterconnectRequest:
      type: object
      required:
      - name
      - region
      - partnerName
      - partnerEmail
      - usage
      - cloudProvider
      - type
      properties:
        name:
          type: string
          pattern: ^([-0-9a-z]){1,13}$
        region:
          type: string
          pattern: \\S+
        partnerName:
          type: string
          pattern: ^([a-zA-Z0-9\s\-]){1,30}$
        partnerEmail:
          type: string
          pattern: \\S
        usage:
          $ref: '#/components/schemas/InterconnectUsage'
        tsgId:
          type: string
          pattern: ^[0-9-]+$
        cloudProvider:
          $ref: '#/components/schemas/CloudProvider'
        type:
          $ref: '#/components/schemas/ConnectionType'
        ipPool:
          $ref: '#/components/schemas/IPPoolRequest'
        physicalConnection:
          $ref: '#/components/schemas/PhysicalConnectionEntry'
        vlanAttachment:
          $ref: '#/components/schemas/VlanAttachmentRequest'
    InterconnectUsage:
      type: string
      enum:
      - SHARED
      - PER_TENANT
    IPPoolRequest:
      type: object
      required:
      - ipProvider
      properties:
        ipBlocks:
          type: array
          uniqueItems: true
          items:
            $ref: '#/components/schemas/IPBlockEntry'
        ipProvider:
          $ref: '#/components/schemas/IPProvider'
    IPBlockEntry:
      type: object
      required:
      - cidr
      properties:
        edgeLocation:
          type: string
        cidr:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            type: string
        type:
          $ref: '#/components/schemas/IPBlockType'
    IPBlockType:
      type: string
      enum:
      - PRIMARY
      - SECONDARY
    IPProvider:
      type: string
      enum:
      - SP
      - PANW
    PhysicalConnectionEntry:
      type: object
      required:
      - physicalConnectionName
      - linkType
      - coloFacilities
      - partnerName
      - partnerEmail
      properties:
        physicalConnectionName:
          type: string
          pattern: \\S
        linkType:
          $ref: '#/components/schemas/PhysicalInterconnectLinkType'
        requestedLinkCount:
          type: integer
          format: int32
        coloFacilities:
          type: array
          minItems: 1
          items:
            type: string
        macSecEnabled:
          type: boolean
        partnerName:
          type: string
          pattern: \\S
        partnerEmail:
          type: string
          pattern: \\S
    PhysicalInterconnectLinkType:
      type: string
      enum:
      - LINK_TYPE_ETHERNET_10G_LR
      - LINK_TYPE_ETHERNET_100G_LR
    VlanAttachmentRequest:
      type: object
      required:
      - name
      - bgpPeerAsn
      - bgpPeerBfdSessionInitMode
      properties:
        name:
          type: string
          pattern: ^([-0-9a-z]){1,13}$
        stackType:
          $ref: '#/components/schemas/StackType'
        bandwidth:
          $ref: '#/components/schemas/Bandwidth'
        bgpPeerAsn:
          type: integer
          format: int64
          minimum: 1
        bgpPeerBfdSessionInitMode:
          $ref: '#/components/schemas/SessionInitializationMode'
        bgpPeerBfdMinTransmitInterval:
          type: integer
          format: int64
          maximum: 30000
          minimum: 1000
        bgpPeerBfdMinReceiveInterval:
          type: integer
          format: int64
          maximum: 30000
          minimum: 1000
        bgpPeerBfdMultiplier:
          type: integer
          format: int64
          maximum: 16
          minimum: 5
        dedicatedConnectionDetails:
          type: array
          items:
            $ref: '#/components/schemas/DedicatedVlanAttachmentDetailsEntry'
        bgpPeerMd5AuthEnabled:
          type: boolean
    StackType:
      type: string
      enum:
      - IPV4_ONLY
      - IPV4_IPV6
    Bandwidth:
      type: string
      enum:
      - BPS_50M
      - BPS_100M
      - BPS_200M
      - BPS_300M
      - BPS_400M
      - BPS_500M
      - BPS_1G
      - BPS_2G
      - BPS_5G
      - BPS_10G
    SessionInitializationMode:
      type: string
      enum:
      - ACTIVE
      - PASSIVE
      - DISABLED
    SettingsEntry:
      type: object
      required:
      - egressType
      properties:
        egressType:
          type: string
          pattern: SP|PA
        cidr:
          type: array
          uniqueItems: true
          items:
            type: string
            pattern: ^((25[0-5]|2[0-4][0-9]|[0-1]?[0-9]{1,2})(\.(25[0-5]|2[0-4][0-9]|[0-1]?[0-9]{1,2})){3})\/(3[0-2]|[1-2][0-9]|[0-9])$
  securitySchemes:
    authKey:
      type: http
      scheme: Bearer
ExternalTags: {}
paths:
  /mt/sp-interconnect/interconnects:
    get:
      summary: List interconnects
      description: List interconnects.
      operationId: GetMtSp-interconnectInterconnects
      responses:
        '200':
          description: Success
          content:
            application/json:
              examples:
                Get interconnects:
                  value:
                    data:
                    - cloudProvider: GCP
                      id: 1689a56a-9386-40b5-aa9a-0cebad2650d8
                      name: new-ic
                      partnerEmail: acme@abc.com
                      partnerName: acme
                      permittedActions: []
                      region: us-west2
                      regionDisplayName: US Southwest
                      status: INACTIVE
                      tenantActivationCount: 0
                      tenantType: MT_ROOT
                      tsgId: '1669501385'
                      type: PARTNER
                      usage: SHARED
                      vlanAttachments:
                      - bfdEnabled: false
                        bgpPeerAsn: 9493
                        bgpPeerBfdSessionInitMode: DISABLED
                        bgpPeerMd5AuthEnabled: false
                        createTime: 1758576695399
                        edgeAvailability: AVAILABILITY_DOMAIN_2
                        id: d06a04c9-b6aa-4e40-8722-cfee46fc786c
                        msg: Error getting network from gcp,Not Found
                        name: test-2
                        permittedActions:
                        - DELETE_CONNECTION
                        stackType: IPV4_ONLY
                        state: CREATE_VLAN_ATTACHMENT_FAILED
                        status: INACTIVE
                        tenantCount: 0
                        updateTime: 1758576779732
                    - cloudProvider: GCP
                      id: 9fbb3e68-1760-4447-a8fa-381a28208477
                      name: sp-auto-pt
                      partnerEmail: sp@example.com
                      partnerName: equinix
                      permittedActions: []
                      region: europe-southwest1
                      regionDisplayName: Andorra
                      rootTsgId: '1669501385'
                      status: DELETING
                      tenantActivationCount: 0
                      tenantId: '1033430256'
                      tenantType: MT_CHILD
                      tsgId: '1021202872'
                      type: PARTNER
                      usage: PER_TENANT
                    requestId: f6d99966-f98e-484d-a4f2-74237eaf79ab
                Get AWS interconnects:
                  value:
                    data:
                    - cloudProvider: AWS
                      id: 424f9837-68b3-11f0-92e9-4201ac16024e
                      name: aws-ic-east
                      partnerEmail: ops@company.com
                      partnerName: company-ops
                      permittedActions:
                      - DELETE_BACKBONE
                      region: us-east-1
                      regionDisplayName: US East
                      status: ACTIVE
                      tenantActivationCount: 5
                      tenantType: MT_ROOT
                      tsgId: '1669501385'
                      type: PARTNER
                      usage: SHARED
                      vlanAttachments:
                      - awsAccountId: '123456789012'
                        awsConnectionName: dx-connection-1
                        bandwidth: BPS_1G
                        bgpPeerAsn: 65001
                        bgpPeerBfdSessionInitMode: ACTIVE
                        bgpPeerMd5AuthEnabled: true
                        createTime: 1758576695376
                        edgeAvailability: AVAILABILITY_DOMAIN_1
                        id: aa465af0-d241-4097-8ee6-31b1c29924f7
                        name: aws-vlan-1
                        permittedActions:
                        - DELETE_CONNECTION
                        stackType: IPV4_ONLY
                        state: ACTIVE
                        status: ACTIVE
                        tenantCount: 3
                        updateTime: 1758576695404
                    requestId: b66e6d42-0af3-4b92-8ef9-1be242ded8f3
        '500':
          description: Server Error
      parameters:
      - name: includeDefaultInterconnect
        in: query
        schema:
          type: boolean
      - name: includeTenantsAssociated
        in: query
        schema:
          type: boolean
      tags:
      - untagged
    post:
      summary: Create new interconnect
      description: Create new interconnect.
      operationId: PostMtSp-interconnectInterconnects
      responses:
        '200':
          description: Success
          content:
            application/json:
              examples:
                Add an interconnect:
                  value:
                    data:
                      cloudProvider: GCP
                      id: 1689a56a-9386-40b5-aa9a-0cebad2650d8
                      name: new-ic
                      partnerEmail: acme@abc.com
                      partnerName: acme
                      permittedActions: []
                      region: us-west2
                      regionDisplayName: US Southwest
                      status: INACTIVE
                      tenantActivationCount: 0
                      tenantType: MT_ROOT
                      tsgId: '1669501385'
                      type: PARTNER
                      usage: SHARED
                      vlanAttachments:
                      - bfdEnabled: false
                        bgpPeerAsn: 9493
                        bgpPeerBfdSessionInitMode: DISABLED
                        bgpPeerMd5AuthEnabled: false
                        createTime: 1758576695376
                        edgeAvailability: AVAILABILITY_DOMAIN_1
                        id: aa465af0-d241-4097-8ee6-31b1c29924f7
                        name: test-1
                        permittedActions: []
                        stackType: IPV4_ONLY
                        state: NOT_STARTED
                        status: INACTIVE
                        tenantCount: 0
                        updateTime: 1758576695404
                      - bfdEnabled: false
                        bgpPeerAsn: 9493
                        bgpPeerBfdSessionInitMode: DISABLED
                        bgpPeerMd5AuthEnabled: false
                        createTime: 1758576695399
                        edgeAvailability: AVAILABILITY_DOMAIN_2
                        id: d06a04c9-b6aa-4e40-8722-cfee46fc786c
                        name: test-2
                        permittedActions: []
                        stackType: IPV4_ONLY
                        state: NOT_STARTED
                        status: INACTIVE
                        tenantCount: 0
                        updateTime: 1758576695404
                    requestId: ae1dcb52-7086-4e18-a5a8-8ef8b991c585
        '400':
          description: Bad Request
          content:
            application/json:
              examples:
                Add an interconnect with invalid payload:
                  value:
                    error:
                      errorCode: 52046
                      errorType: VALIDATION_ERROR
                      httpStatus: 400
                      msg: Connection input region unsupported
                    requestId: 3c84be78-eee9-4751-ba03-91759a6e9321
                Invalid interconnect name:
                  value:
                    error:
                      errorCode: 52051
                      errorType: VALIDATION_ERROR
                      httpStatus: 400
                      msg: Name must be lowercase letters,numbers or hyphens; max
                        length 13 characters
                    requestId: a1b2c3d4-5e6f-7890-abcd-ef1234567890
                BGP ASN 16550 not allowed:
                  value:
                    error:
                      errorCode: 52028
                      errorType: VALIDATION_ERROR
                      httpStatus: 400
                      msg: BGP Peer ASN with value 16550 is not allowed
                    requestId: b2c3d4e5-6f78-9012-bcde-f12345678901
                Missing VPC association:
                  value:
                    error:
                      errorCode: 52003
                      errorType: VALIDATION_ERROR
                      httpStatus: 400
                      msg: Missing VPC association entry for tenant
                    requestId: c3d4e5f6-7890-1234-cdef-012345678901
        '409':
          description: Conflict
          content:
            application/json:
              examples:
                Interconnect already exists:
                  value:
                    error:
                      errorCode: 52004
                      errorType: VALIDATION_ERROR
                      httpStatus: 409
                      msg: Interconnect with same usage/cloud_provider/region already
                        exists
                    requestId: d4e5f678-9012-3456-def0-123456789012
                Interconnect name exists:
                  value:
                    error:
                      errorCode: 52049
                      errorType: VALIDATION_ERROR
                      httpStatus: 409
                      msg: Interconnect with same name already exists
                    requestId: e5f67890-1234-5678-ef01-234567890123
        '500':
          description: Server Error
          content:
            application/json:
              examples:
                Add backbone failed due to internal error:
                  value:
                    error:
                      errorCode: 50002
                      errorType: INTERNAL_ERROR
                      httpStatus: 500
                      msg: Failed to add Backbone in db
                    requestId: 432568e0-05e2-4baa-8595-ed6bb4f98b64
      parameters: []
      tags:
      - untagged
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InterconnectRequest'
            examples:
              Create GCP Partner Interconnect:
                value:
                  name: new-ic
                  region: us-west2
                  partnerName: acme
                  partnerEmail: acme@abc.com
                  usage: SHARED
                  cloudProvider: GCP
                  type: PARTNER
                  vlanAttachment:
                    name: test
                    bgpPeerAsn: 9493
                    bgpPeerBfdSessionInitMode: DISABLED
                    stackType: IPV4_ONLY
                    bgpPeerMd5AuthEnabled: false
              Create AWS Partner Interconnect:
                value:
                  name: aws-ic
                  region: us-east-1
                  partnerName: equinix
                  partnerEmail: sp@equinix.com
                  usage: SHARED
                  cloudProvider: AWS
                  type: PARTNER
                  vlanAttachment:
                    name: aws-conn-1
                    bgpPeerAsn: 65001
                    bgpPeerBfdSessionInitMode: ACTIVE
                    bgpPeerBfdMinTransmitInterval: 1000
                    bgpPeerBfdMinReceiveInterval: 1000
                    bgpPeerBfdMultiplier: 5
              Create GCP Dedicated Interconnect:
                value:
                  name: ded-ic
                  region: us-west2
                  partnerName: datacenter-ops
                  partnerEmail: ops@datacenter.com
                  usage: SHARED
                  cloudProvider: GCP
                  type: DEDICATED
                  vlanAttachment:
                    name: ded-vlan-1
                    bgpPeerAsn: 16363
                    bgpPeerBfdSessionInitMode: ACTIVE
                    bandwidth: BPS_10G
                    bgpPeerMd5AuthEnabled: true
                    dedicatedConnectionDetails:
                    - edgeAvailability: ZONE1
                      bandwidth: BPS_10G
                    - edgeAvailability: ZONE2
                      bandwidth: BPS_10G
              Create Per-Tenant Interconnect:
                value:
                  name: tenant-ic
                  region: europe-west1
                  partnerName: tenant-partner
                  partnerEmail: partner@tenant.com
                  usage: PER_TENANT
                  tsgId: '1021202872'
                  cloudProvider: GCP
                  type: PARTNER
                  vlanAttachment:
                    name: tenant-conn
                    bgpPeerAsn: 65100
                    bgpPeerBfdSessionInitMode: DISABLED
        required: true
  /mt/sp-interconnect/interconnects/info:
    get:
      summary: Get Interconnect Info
      description: Get Interconnect Info.
      operationId: GetMtSp-interconnectInterconnectsInfo
      responses:
        '200':
          description: Success
          content:
            application/json:
              examples:
                Get interconnect info for tenant:
                  value:
                    data:
                      interconnects:
                      - id: 1689a56a-9386-40b5-aa9a-0cebad2650d8
                        name: new-ic
                        region: us-west2
                        regionDisplayName: US Southwest
                        edgeLocationRegionName: us-west-201
                        usage: SHARED
                        bandwidth: 200Mbps
                        cloudProvider: GCP
                        status: ACTIVE
                      - id: 9fbb3e68-1760-4447-a8fa-381a28208477
                        name: aws-ic
                        region: us-east-1
                        regionDisplayName: US East
                        edgeLocationRegionName: us-east-1a
                        usage: SHARED
                        bandwidth: 500Mbps
                        cloudProvider: AWS
                        status: ACTIVE
                      supportedFeatures:
                      - SP_INTERCONNECT
                      - DEDICATED_INTERCONNECT
                    requestId: 82923271-2db3-4895-b1cf-a5faa77d28e3
                Get interconnect info with no interconnects:
                  value:
                    data:
                      interconnects: []
                      supportedFeatures:
                      - SP_INTERCONNECT
                    requestId: a1b2c3d4-5e6f-7890-abcd-ef1234567890
        '404':
          description: Not Found
          content:
            application/json:
              examples:
                Tenant not found:
                  value:
                    error:
                      errorCode: 52033
                      errorType: VALIDATION_ERROR
                      httpStatus: 404
                      msg: The tenant doesn't exist
                    requestId: d1c5b994-3ce5-4011-acff-498a2080535c
        '500':
          description: Server Error
      parameters: []
      tags:
      - untagged
  /mt/sp-interconnect/interconnects/physical-connections:
