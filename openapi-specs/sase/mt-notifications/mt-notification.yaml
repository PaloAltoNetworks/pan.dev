  /mt/notifications/v1/profiles/{notification-profile-id}:
    get:
      tags:
        - Notification Profiles
      summary: Profile
      description: |-
        ### Overview

        Get the notification profile associated with the current tenant.

        Pass the notification profile Id as path param

        The current tenant TSG Id is obtained from the user JWT.

        This is a per-tenant query.

        ### Response Body Format

        ``` json
        {
            "data":{
                "id": "<notification-profile-id>",
                "profileName": "<profileName>",
                "description": "<Profile Description>",
                "tenantList":
                [
                    "<tsgId1>",
                    "<tsgId2>"
                ],
                "excludeTenantList": [
                    "<tsgId3>",
                    "<tsgId4>"
                ],
                "successTenant": [],
                "failureTenant": [],
                "status": "SUCCESS",
                "notifTypeDetails":
                [
                    {
                        "notifCategoryList":
                        [
                            {
                                "type": "UPGRADE/ANNOUNCEMENTS",
                                "bestPractice": true/false,
                                "name": "<category name>",
                                "subCategoryList":
                                [
                                    {
                                        "bestPractice": true/false,
                                        "name": "<sub-category name>"
                                    }
                                ]
                            }
                        ],
                    }
                ],
                "notifChannels":
                [
                    {
                        "name": "<webhook channel name>",
                        "type": "WEBHOOK",
                        "webhookChannelDetails":
                        {
                            "urls":
                            [
                                "<url1>",
                                "<url2>"
                            ],
                            "authType": "NO_AUTH"
                        }
                    },
                    {
                        "emailChannelDetails":
                        {
                            "emails":
                            [
                                {
                                    "emailId": "<user@domain.com>",
                                    "name": "<name>"
                                }
                            ]
                        },
                        "name": "<email channel name>",
                        "type": "EMAIL"
                    }
                ],
                "opState": "ENABLED/DISABLED",
            },
            "requestId": "<requestId>"
        }

         ```
