  /mt/notifications/v1/list:
    post:
      tags:
        - Notification
      summary: List
      description: |-
        ### Overview

        Get list of notifications for all child tenants for the current tenant.

        The current tenant TSG Id is extracted from user JWT.

        This is a per-user query.

        <u><b>API Body parameters:</b></u>

        - filters:
            - readState - valid values are READ, UNREAD
            - notifType - UPGRADES, ANNOUNCEMENTS
            - By default, if no filters are provided then readState is READ and UNREAD and notifType is all the values
        - sortByList:
            - field - valid values are createdTime or impactedTenantCount
            - sortBy - value values are DESC or ASC

        ### Request Body Format

        ``` json
        {
          "filters": [
            {
              "field": "readState"
              "values": ["Valid values are READ, UNREAD"]
            },
            {
              "field": "notifType"
              "values": ["Valid values are UPGRADES, ANNOUNCEMENTS"]
            }
          ],
          "sortByList": {
            "field": "createdTime or impactedTenantCount",
            "sortBy": "<ASC, DESC - Default = DESC>"
          },
          "page":{
                    "num": 0,
                    "size": 10
                  }
        }

         ```

        ### Response Body Format

        ``` json
        {
            "data": {
                "notificationList": [
                    {
                        "id": "<notification id>",
                        "name": "<notification name>",
                        "impactedTenantCount": <number of impacted tenants>,
                        "impactedTenants": [
                            "<tsgId1>",
                            "<tsgId2>"
                         ],
                        "createdTime": <UTC time epoch>,
                        "aggKey": {
                            "notifType": "<UPGRADES/ANNOUNCEMENTS>",
                            "inAppFlag": true/false,
                            "category": "<category name>",
                            "subCategory": "<sub-category name>",
                            "tsgId": "<tsgId>"
                        },
                        "body":"<body>",
                        "action": "<action on seeing notification>",
                        "readState": "READ or UNREAD"
                    },
                                   :
                                   :
                ],
                "notificationCounts": {
                    "readCount": <read count>,
                    "unreadCount": <unread count>
                }
            },
            "requestId": "<requestId>"
        }

         ```
      requestBody:
        content:
          application/json:
            examples:
              All Notifications:
                value:
                  filters:
                    - field: readState
                      values:
                        - READ
                        - UNREAD
                    - field: notifType
                      values:
                        - UPGRADES
                        - ANNOUNCEMENTS
                  sortByList:
                    - field: createdTime
                      sortBy: DESC
              Unread Upgrades:
                value:
                  filters:
                    - field: readState
                      values:
                        - UNREAD
                    - field: notifType
                      values:
                        - UPGRADES
                  sortByList:
                    - field: createdTime
                      sortBy: DESC
              Unread Announcements:
                value:
                  filters:
                    - field: readState
                      values:
                        - UNREAD
                    - field: notifType
                      values:
                        - ANNOUNCEMENTS
                  sortByList:
                    - field: createdTime
                      sortBy: DESC
              Notifications list with Pagination:
                value:
                  filters:
                    - field: readState
                      values:
                        - UNREAD
                    - field: notifType
                      values:
                        - ANNOUNCEMENTS
                  sortByList:
                    - field: createdTime
                      sortBy: DESC
                  page:
                    - num: 0
                      size: 10

      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
              examples:
                example-0:
                  summary: All Notifications
                  value:
                    data:
                      notificationCounts:
                        readCount: 1
                        unreadCount: 0
                      notificationList:
                        - action: >-
                            Action: Multi-Tenant UPGRADES Notification of
                            Dataplane: Completed for 1091039496
                          aggKey:
                            category: Dataplane
                            inAppFlag: true
                            notifType: UPGRADES
                            subCategory: Completed
                            tsgId: '1091039496'
                          body: >-
                            Body: Multi-Tenant UPGRADES Notification of
                            Dataplane: Completed for 1091039496
                          id: e8ebd16c-66ab-4113-aa1e-ab274c46322a
