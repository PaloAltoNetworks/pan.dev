openapi: 3.0.2
info:
  title: Multi-Tenant Notifications API
  version: "1.0"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
security:
  - bearerAuth: []
paths:
  /mt/notifications/v1/profiles:
    get:
      tags:
        - Notification Profiles
      summary: Profile List
      description: |-
        ### Overview

        Get list of notification profiles associated with the current tenant.

        The current tenant TSG Id is obtained from the user JWT.

        This is a per-tenant query.

        ### Response Body Format

        ``` json
        {
            "data":
            [
                {
                    "id": "<notification-profile-id>",
                    "profileName": "<profileName>",
                    "description": "<Profile Description>",
                    "tenantList":
                    [ "<tsgId1>", "<tsgId2>" ],
                    "excludeTenantList": [ "<tsgId3>", "<tsgId4>" ],
                    "successTenant": [],
                    "failureTenant": [],
                    "status": "SUCCESS",
                    "notifTypeDetails":
                    [
                        {
                            "notifCategoryList":
                            [
                                {
                                    "type": "UPGRADE/ANNOUNCEMENTS/INCIDENTS",
                                    "bestPractice": true/false,
                                    "name": "<category name>",
                                    "subCategoryList":
                                    [
                                        {
                                            "bestPractice": true/false,
                                            "name": "<sub-category name>"
                                        }
                                    ]
                                }
                            ]
                        }
                    ],
                    "notifChannels":
                    [
                        {
                            "name": "<webhook channel name>",
                            "type": "WEBHOOK",
                            "webhookChannelDetails":
                            {
                                "urls": [ "<url1>", "<url2>" ],
                                "authType": "NO_AUTH"
                            }
                        },
                        {
                            "name": "<email channel name>",
                            "type": "EMAIL",
                            "emailChannelDetails":
                            {
                                "emails":
                                [
                                    {
                                        "emailId": "<user@domain.com>",
                                        "name": "<name>"
                                    }
                                ]
                            }
                        }
                    ],
                    "opState": "ENABLED/DISABLED",
                }
            ],
            "requestId": "<requestId>"
        }

         ```
