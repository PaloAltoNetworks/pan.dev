  /mt/notifications/v1/list/details/{notification-id}:
    get:
      tags:
        - Notification
      summary: Get Notification By Id
      description: >-
        ### Overview


        Get notification associated with the id specified in the API path
        parameter.


        The current tenant TSG Id is extracted from user JWT.


        This is a per-user query.


        ### Response Body Format


        ``` json

        {
            "data": {
                        "id": "<notification id>",
                        "name": "<notification name>",
                        "impactedTenantCount": <number of impacted tenants>,
                        "impactedTenants": [
                            "<tsgId1>",
                            "<tsgId2>"
                         ],
                        "createdTime": <UTC time epoch>,
                        "aggKey": {
                            "notifType": "<UPGRADES/ANNOUNCEMENTS>",
                            "inAppFlag": true/false,
                            "category": "<category name>",
                            "subCategory": "<sub-category name>",
                            "tsgId": "<tsgId>"
                        },
                        "body":"<body>",
                        "channels": [],
                        "action": "<action on seeing notification>",
                        "readState": "READ or UNREAD"
                    }
            },
            "requestId": "<requestId>"
        }

         ```
      parameters:
        - name: notification-id
          in: path
          schema:
            type: string
          required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
              example:
                data:
                  aggKey:
                    category: UPGRADES_category1
                    notifType: UPGRADES
                    subCategory: UPGRADES_category1_sub_category
                    tsgId: '1091039496'
                    inAppFlag: true
                  body: body
                  id: '1'
                  impactedTenantCount: 2
                  impactedTenants:
                    - '1091039497'
                    - '1091039496'
                  name: abc
                  channels: []
                  createdTime: 1
                  readState: READ
                requestId: d99c59a0-f271-41b4-b9af-8d7c72829aa6
