openapi: 3.0.2
info:
  title: SASE 5G Monitor API
  version: '1.0'
  description: "The SASE 5G Monitoring APIs provide real-time visibility and technical\
    \ telemetry across the 5G infrastructure. These interfaces enable administrators\
    \ to track subscriber scaling, monitor regional registration trends, and audit\
    \ network throughput. By integrating these monitoring endpoints into centralized\
    \ dashboards, organizations can identify unauthorized device mappings, respond\
    \ to security incidents by severity, and ensure that 5G network interconnects\
    \ maintain optimal performance levels. This spec was created on February 06, 2026.\
    \ \xA9 2026 Palo Alto Networks, Inc."
paths:
  /mt/monitor/5g/tenants:
    get:
      tags:
      - Total Tenants
      summary: Retrieve Total Tenants
      description: Access the central management plane to retrieve the total count
        of tenants currently provisioned within the 5G environment. This query provides
        high-level visibility into ecosystem scale by scanning the active tenant database.
        Administrators should execute this check periodically to ensure tenant counts
        align with expected licensing and service levels.
      responses:
        '200':
          description: Success
          content:
            application/json:
              example:
                data:
                  total_tenants: 8
                header:
                  createdAt: '2025-12-17T01:28:33Z'
                  clientRequestId: null
                  dataCount: 1
                  status:
                    subCode: 200
        '401':
          description: Permission Denied
        '500':
          description: Server Error
      operationId: GetMtMonitor5gTenants
  /mt/monitor/5g/ueIp/registered:
    get:
      tags:
      - Registered UE Mappings
      summary: Fetch Registered Mappings
      description: Retrieve the current total of successfully registered User Equipment
        (UE) device mappings across the entire network. This operation identifies
        how many devices have active IP Address assignments by querying the real-time
        registration table. Use this data whenever you need to verify the current
        load of authenticated devices on the 5G network.
      responses:
        '200':
          description: Success
          content:
            application/json:
              example:
                data:
                  registered_device: 6
                header:
                  createdAt: '2025-12-17T02:03:07Z'
                  clientRequestId: null
                  dataCount: 1
                  status:
                    subCode: 200
        '401':
          description: Permission Denied
        '500':
          description: Server Error
      operationId: GetMtMonitor5gUeipRegistered
  /mt/monitor/5g/ueIp/region:
    get:
      tags:
      - UE IP Region
      summary: List Registered Regions
      description: View a list of all geographical compute regions where User Equipment
        (UE) devices are currently registered. This endpoint scans regional gateways
        to identify active subscriber locations. Perform this query to determine the
        global distribution of 5G traffic and ensure that subscribers are connecting
        to the intended regional nodes.
      responses:
        '200':
          description: Success
          content:
            application/json:
              example:
                data:
                - compute_region: us-west2
                header:
                  createdAt: '2025-12-17T02:06:52Z'
                  clientRequestId: null
                  dataCount: 1
                  status:
                    subCode: 200
        '401':
          description: Permission Denied
        '500':
          description: Server Error
      operationId: GetMtMonitor5gUeipRegion
  /mt/monitor/5g/ueIp/registered/trend:
    post:
      tags:
      - 5G Registered Trend
      summary: Analyze Registration Trends
      description: Generate a historical trend report showing the rate of successful
        UE device registrations over a specified time interval. By submitting a TrendRequest
        with filtering parameters, you can identify growth patterns or sudden spikes
        in device connectivity. Use this analysis to forecast capacity requirements
        and detect anomalies in subscriber behavior.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TrendRequest'
            example:
              properties:
              - property: imei
                function: count
                alias: registered_count
              filter:
                operator: AND
                rules:
                - property: event_time
                  operator: last_n_days
                  values:
                  - 7
                - property: compute_region
                  operator: in
                  values:
                  - us-central1
              histogram:
                property: event_time
                range: day
                enableEmptyInterval: false
                value: '1'
      responses:
        '200':
          description: Success
          content:
            application/json:
              example:
                data:
                - event_time: 1765324800000
                  registered_count: 4
                - event_time: 1765411200000
                  registered_count: 4
                header:
                  createdAt: '2025-12-17T02:05:29Z'
                  clientRequestId: null
                  dataCount: 7
                  status:
                    subCode: 200
        '400':
          description: Bad Request
        '401':
          description: Permission Denied
        '500':
          description: Server Error
      operationId: PostMtMonitor5gUeipRegisteredTrend
  /mt/monitor/5g/ueIp/deregistered/trend:
    post:
      tags:
      - 5G Deregistered Trend
      summary: Monitor Deregistration Trends
      description: Track the trend of devices disconnecting or deregistering from
        the 5G network over time. This endpoint processes historical telemetry to
        show when and where UE mappings are cleared. Monitor these trends to identify
        potential network stability issues or scheduled device maintenance windows
        that impact active subscriber counts.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TrendRequest'
            example:
              properties:
              - property: imei
                function: count
                alias: deregistered_count
              filter:
                operator: AND
                rules:
                - property: event_time
                  operator: last_n_days
                  values:
                  - 7
                - property: compute_region
                  operator: in
                  values:
                  - us-central1
              histogram:
                property: event_time
                range: day
                enableEmptyInterval: false
                value: '1'
      responses:
        '200':
          description: Success
          content:
            application/json:
              example:
                data:
                - event_time: 1765324800000
                  deregistered_count: 3
                - event_time: 1765411200000
                  deregistered_count: 3
                header:
                  createdAt: '2025-12-17T02:05:42Z'
                  clientRequestId: null
                  dataCount: 7
                  status:
                    subCode: 200
        '400':
          description: Bad Request
        '401':
          description: Permission Denied
        '500':
          description: Server Error
      operationId: PostMtMonitor5gUeipDeregisteredTrend
  /mt/monitor/5g/ueIp/count:
    post:
      tags:
      - Added and Cleared Mappings
      summary: Count Mapping Changes
      description: Retrieve a summary count of all UE IP Address mappings that were
        either added or cleared during a specific timeframe. This query uses time-based
        filters to provide a snapshot of network "churn" or movement. Execute this
        to audit how frequently IP Address assignments change within your 5G subscriber
        pool.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CountFilterRequest'
            example:
              filter:
                operator: AND
                rules:
                - property: event_time
                  operator: last_n_days
                  values:
                  - 7
      responses:
        '200':
          description: Success
          content:
            application/json:
              example:
                data:
                  add_count: 28
                  delete_count: 19
                header:
                  createdAt: '2025-12-17T02:07:14Z'
                  clientRequestId: null
                  dataCount: 1
                  status:
                    subCode: 200
        '400':
          description: Bad Request
        '401':
          description: Permission Denied
        '500':
          description: Server Error
      operationId: PostMtMonitor5gUeipCount
  /mt/monitor/5g/unknownIp/region:
    get:
      tags:
      - Unknown IP  Regions
      summary: Locate Unknown IPs
      description: Identify the compute regions where the system has detected 5G traffic
        from unknown or unmapped IP Address addresses. This endpoint scans regional
        traffic logs to find packets that lack a valid subscriber identity. Use this
        information to investigate potential security breaches or configuration errors
        in specific regional gateways.
      responses:
        '200':
          description: Success
          content:
            application/json:
              example:
                data:
                - compute_region: us-west2
                header:
                  createdAt: '2025-12-17T02:04:26Z'
                  clientRequestId: null
                  dataCount: 1
                  status:
                    subCode: 200
        '401':
          description: Permission Denied
        '500':
          description: Server Error
      operationId: GetMtMonitor5gUnknownipRegion
  /mt/monitor/5g/unknownIp/trend:
    post:
      tags:
      - 5G Unknown IPs Trend
      summary: Track Unknown IPs
      description: Monitor the historical trend of unknown IP Address address detections
        over a defined period. By analyzing these trends, you can determine if unauthorized
        traffic is increasing or if specific regions are consistently seeing unmapped
        devices. Use this telemetry to refine your UE registration policies and improve
        network-based security.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TrendRequest'
            example:
              properties:
              - property: ip_address
                function: distinct_count
                alias: count
              - property: compute_region
                alias: region
              filter:
                operator: AND
                rules:
                - property: event_time
                  operator: last_n_days
                  values:
                  - 7
                - property: compute_region
                  operator: in
                  values:
                  - us-central1
              histogram:
                property: event_time
                range: day
                enableEmptyInterval: false
                value: '1'
      responses:
        '200':
          description: Success
          content:
            application/json:
              example:
                data:
                - region: us-central1
                  event_time: 1765324800000
                  count: 13
                - region: us-central1
                  event_time: 1765411200000
                  count: 7
                header:
                  createdAt: '2025-12-17T02:05:04Z'
                  clientRequestId: null
                  dataCount: 8
                  status:
                    subCode: 200
        '400':
          description: Bad Request
        '401':
          description: Permission Denied
        '500':
          description: Server Error
      operationId: PostMtMonitor5gUnknownipTrend
  /mt/monitor/5g/mapping/activeUEs:
    get:
      tags:
      - Active Mappings
      summary: Identify Active Mappings
      description: Query the 5G management plane to retrieve the exact count of UE
        mappings that are currently active and passing traffic. This distinguishes
        between "registered" devices and those that are "actively" communicating.
        Perform this check to assess real-time network utilization and active session
        density.
      responses:
        '200':
          description: Success
          content:
            application/json:
              example:
                data:
                  active_mappings: 4
                header:
                  createdAt: '2025-12-17T02:05:18Z'
                  clientRequestId: null
                  dataCount: 1
                  status:
                    subCode: 200
        '401':
          description: Permission Denied
        '500':
          description: Server Error
      operationId: GetMtMonitor5gMappingActiveues
  /mt/monitor/5g/mapping/configuredUEs:
    get:
      tags:
      - Configured UE Mappings
      summary: List Configured Mappings
      description: Retrieve the count of all UE mappings that have been manually configured
        by administrators within the system. This provides a baseline of "known-good"
        devices that are authorized for 5G access. Compare this count against active
        registrations to identify if configured devices are failing to connect.
      responses:
        '200':
          description: Success
          content:
            application/json:
              example:
                data:
                  configured_ue_count: 94
                header:
                  createdAt: '2025-12-17T02:07:37Z'
                  clientRequestId: null
                  dataCount: 1
                  status:
                    subCode: 200
        '401':
          description: Permission Denied
        '500':
          description: Server Error
      operationId: GetMtMonitor5gMappingConfiguredues
  /mt/monitor/5g/mapping/unknownUEs:
    get:
      tags:
      - Unknown UE Mappings
      summary: Detect Unknown Mappings
      description: Identify User Equipment (UE) mappings that were registered through
        automated methods, such as RADIUS or Application Programming Interface, but
        were never explicitly configured by a user. This check highlights "shadow"
        devices or guest equipment that has entered the network. Review these mappings
        to ensure that automated registration flows are not introducing unauthorized
        devices.
      responses:
        '200':
          description: Success
          content:
            application/json:
              example:
                data:
                  unknown_mappings: 1
                header:
                  createdAt: '2025-12-17T02:07:45Z'
                  clientRequestId: null
                  dataCount: 1
                  status:
                    subCode: 200
        '401':
          description: Permission Denied
        '500':
          description: Server Error
      operationId: GetMtMonitor5gMappingUnknownues
  /mt/monitor/5g/mapping/region:
    get:
      tags:
      - Region
      summary: List Mapping Regions
      description: Access a regional breakdown of where specific 5G UE mappings currently
        exist across the compute infrastructure. This endpoint allows you to see the
        footprint of your 5G subscriber base. Use this when planning regional security
        policy deployments or during network maintenance to understand which regions
        have the highest mapping density.
      responses:
        '200':
          description: Success
          content:
            application/json:
              example:
                data:
                - us-west2
                - us-central1
                header:
                  createdAt: '2025-12-17T02:10:45Z'
                  clientRequestId: null
                  dataCount: 2
                  status:
                    subCode: 200
        '401':
          description: Permission Denied
        '500':
          description: Server Error
      operationId: GetMtMonitor5gMappingRegion
  /mt/monitor/5g/mapping:
    post:
      tags:
      - UE Mappings
      summary: Query Mapping Details
      description: Search for specific UE mapping details using IMSI, IMEI, or IP
        Address Address identifiers across your 5G tenant base. This endpoint supports
        advanced filtering and pagination to handle large datasets. Use this detailed
        search capability when troubleshooting connectivity for a specific device
        or performing a security audit on a particular subscriber.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MappingRequest'
            examples:
              Paginated List:
                value:
                  pageSize: 100
                  pageNum: 0
              Paginated List With Tenant Filter:
                value:
                  pageSize: 100
                  pageNum: 0
                  tenant:
                  - '1459340040'
                  - '1635727460'
              Paginated List With Region Filter:
                value:
                  pageSize: 100
                  pageNum: 0
                  region: us-west2
              Paginated List With Region  and Tenant Filter:
                value:
                  pageSize: 100
                  pageNum: 0
                  region: us-west2
                  tenant:
                  - '1459340040'
                  - '1635727460'
              Search with Pagination:
                value:
                  searchKey: '500012222222222'
                  pageSize: 100
                  pageNum: 0
              Search with Pagination and Filtering:
                value:
                  searchKey: '310260418380113'
                  pageSize: 100
                  pageNum: 0
                  region: us-west2
                  tenant:
                  - '1459340040'
                  - '1635727460'
      responses:
        '200':
          description: Success
          content:
            application/json:
              examples:
                Single Mapping:
                  value:
                    data:
                      mappings:
                      - apn: demo.com
                        createTime: 1737113951692
                        groups: new_grp
                        imei: '000000000000000'
                        imsi: '500012222222222'
                        tenantProvisioned: Inactive
                        tsgId: '1131085573'
                      totalCount: 1
                    header:
                      createdAt: '2025-12-17T02:07:58Z'
                      clientRequestId: null
                      dataCount: 1
                      status:
                        subCode: 200
                Multiple Mappings:
                  value:
                    data:
                      mappings:
                      - apn: pan.pcweb.comm
                        createTime: 1759426780582
                        imei: '000000000000000'
                        imsi: '310260418380113'
                        tenantProvisioned: Inactive
                        tsgId: '1558164857'
                      - apn: pan.fast.comm
                        createTime: 1759426957812
                        imei: '359414782481750'
                        imsi: '310260418380113'
                        tenantProvisioned: Inactive
                        tsgId: '1558164857'
                      totalCount: 2
                    header:
                      createdAt: '2025-12-17T02:08:33Z'
                      clientRequestId: null
                      dataCount: 2
                      status:
                        subCode: 200
        '400':
          description: Bad Request
        '401':
          description: Permission Denied
        '500':
          description: Server Error
      operationId: PostMtMonitor5gMapping
  /mt/monitor/5g/proxy:
    get:
      tags:
      - Total Proxies
      summary: Retrieve Proxy Counts
      description: Get a count of all proxy servers that have been configured by the
        client to handle 5G control plane traffic. This visibility ensures that the
        required infrastructure nodes are accounted for in the management plane. Execute
        this query during infrastructure audits to verify that all intended proxy
        servers are visible to the 5G management service.
      responses:
        '200':
          description: Success
          content:
            application/json:
              example:
                data:
                  count: 5
                header:
                  createdAt: '2025-12-17T02:05:51Z'
                  clientRequestId: null
                  dataCount: 1
                  status:
                    subCode: 200
        '401':
          description: Permission Denied
        '500':
          description: Server Error
      operationId: GetMtMonitor5gProxy
  /mt/monitor/5g/incidents/count:
    post:
      tags:
      - Incidents by Severity
      summary: Filter Security Incidents
      description: Categorize and count security incidents based on their assigned
        severity levels (Critical, Warning, etc.) over a specific timeframe. By applying
        severity filters, administrators can prioritize their response to high-impact
        network threats. Use this endpoint to generate executive security summaries
        or to trigger automated alerts for critical 5G incidents.
      parameters:
      - name: agg_by
        in: query
        schema:
          type: string
          enum:
          - tenant
        description: Aggregation parameter
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IncidentsCountRequest'
            example:
              properties:
              - property: total_count
              - property: critical_count
              - property: warning_count
              filter:
                rules:
                - property: raised_time
                  operator: last_n_days
                  values:
                  - 7
                - property: status
                  operator: equals
                  values:
                  - Raised
                - property: severity
                  operator: in
                  values:
                  - Critical
                  - Warning
                - property: domain
                  operator: in
                  values:
                  - External
                  - external
      responses:
        '200':
          description: Success
          content:
            application/json:
              example:
                data:
                - total_count: 680
                  critical_count: 340
                  warning_count: 0
        '400':
          description: Bad Request
        '401':
          description: Permission Denied
        '500':
          description: Server Error
      operationId: PostMtMonitor5gIncidentsCount
  /mt/monitor/5g/api/stats:
    post:
      tags:
      - API Stats
      summary: Review Application Programming Interface Performance
      description: Monitor the success and failure rates of Application Programming
        Interface calls made specifically through the 5G interface. This telemetry
        identifies integration health by tracking total calls, error counts, and response
        statuses. Use these statistics to troubleshoot 5G management service connectivity
        or to audit the performance of external automation tools.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CountFilterRequest'
            example:
              filter:
                operator: AND
                rules:
                - property: event_time
                  operator: last_n_days
                  values:
                  - 7
      responses:
        '200':
          description: Success
          content:
            application/json:
              example:
                data:
                  total_count: 0
                  success_count: 0
                  failure_count: 0
                header:
                  createdAt: '2025-12-17T02:06:39Z'
                  clientRequestId: null
                  dataCount: 1
                  status:
                    subCode: 200
        '400':
          description: Bad Request
        '401':
          description: Permission Denied
        '500':
          description: Server Error
      operationId: PostMtMonitor5gApiStats
  /mt/monitor/5g/interconnect/details:
    get:
      tags:
      - 5G Network Interconnects and Bandwidth
      summary: Examine Interconnect Status
      description: Retrieve technical details regarding 5G Network Interconnects,
        including available bandwidth and regional connection status. The system reports
        on the health of individual VLAN attachments (Up/Down) to ensure physical-to-virtual
        infrastructure continuity. Use this information to troubleshoot regional connectivity
        outages or to verify bandwidth allocations.
      responses:
        '200':
          description: Success
          content:
            application/json:
              example:
                data:
                - bandwidth: 200
                  regions:
                  - us-east1
                  - us-west2
                  - us-central1
                  vlanStatus:
                    down: 0
                    total: 8
                    up: 8
                header:
                  createdAt: '2025-12-17T02:07:25Z'
                  clientRequestId: null
                  dataCount: 1
                  status:
                    subCode: 200
        '401':
          description: Permission Denied
        '500':
          description: Server Error
      operationId: GetMtMonitor5gInterconnectDetails
  /mt/monitor/5g/interconnect/throughput:
    post:
      tags:
      - Throughput Trend
      summary: Analyze Network Throughput
      description: Analyze the ingress and egress throughput trends for specific 5G
        Network Interconnects over a historical timeline. By identifying peak traffic
        periods and average data rates, administrators can make informed decisions
        about capacity planning. Access this telemetry to ensure that 5G traffic remains
        within the provisioned bandwidth limits for each region.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ThroughputRequest'
            example:
              properties:
              - property: egress_throughput
              - property: ingress_throughput
              - property: event_time
              - property: region
              filter:
                operator: AND
                rules:
                - property: event_time
                  operator: last_n_days
                  values:
                  - 7
                - property: region
                  operator: equals
                  values:
                  - us-central1
              histogram:
                property: event_time
                range: day
                enableEmptyInterval: false
                value: '1'
      responses:
        '200':
          description: Success
          content:
            application/json:
              example:
                data:
                - egress_throughput: 0.002508770165798529
                  ingress_throughput: 0.003023766583801299
                  event_time: 1765324800000
                  region: us-central1
                - egress_throughput: 0.0027237501165300205
                  ingress_throughput: 0.0034827909235609217
                  event_time: 1765411200000
                  region: us-central1
        '400':
          description: Bad Request
        '401':
          description: Permission Denied
        '500':
          description: Server Error
      operationId: PostMtMonitor5gInterconnectThroughput
  /mt/monitor/5g/users:
    get:
      tags:
      - Total Number of Configured Users
      summary: Count Total Users
      description: Retrieve the absolute total of configured users authorized for
        the 5G service across all managed tenants. This count serves as a primary
        metric for understanding the total administrative scale of the environment.
        Check this value when performing global user audits or when reviewing total
        service adoption metrics.
      responses:
        '200':
          description: Success
          content:
            application/json:
              example:
                data:
                  total_users: 5000
                header:
                  createdAt: '2025-12-17T02:08:46Z'
                  clientRequestId: null
                  dataCount: 1
                  status:
                    subCode: 200
        '401':
          description: Permission Denied
        '500':
          description: Server Error
      operationId: GetMtMonitor5gUsers
servers:
- url: https://stratacloudmanager.paloaltonetworks.com
security:
- JWT: []
components:
  schemas:
    TrendRequest:
      type: object
      properties:
        properties:
          type: array
          items:
            type: object
            properties:
              property:
                type: string
              function:
                type: string
              alias:
                type: string
        filter:
          type: object
          properties:
            operator:
              type: string
            rules:
              type: array
              items:
                type: object
                properties:
                  property:
                    type: string
                  operator:
                    type: string
                  values:
                    type: array
                    items: {}
        histogram:
          type: object
          properties:
            property:
              type: string
            range:
              type: string
            enableEmptyInterval:
              type: boolean
            value:
              type: string
    CountFilterRequest:
      type: object
      properties:
        filter:
          type: object
          properties:
            operator:
              type: string
            rules:
              type: array
              items:
                type: object
                properties:
                  property:
                    type: string
                  operator:
                    type: string
                  values:
                    type: array
                    items: {}
    MappingRequest:
      type: object
      properties:
        pageSize:
          type: integer
          format: int32
        pageNum:
          type: integer
          format: int32
        searchKey:
          type: string
        region:
          type: string
        tenant:
          type: array
          items:
            type: string
    IncidentsCountRequest:
      type: object
      properties:
        properties:
          type: array
          items:
            type: object
            properties:
              property:
                type: string
        filter:
          type: object
          properties:
            rules:
              type: array
              items:
                type: object
                properties:
                  property:
                    type: string
                  operator:
                    type: string
                  values:
                    type: array
                    items: {}
    ThroughputRequest:
      type: object
      properties:
        properties:
          type: array
          items:
            type: object
            properties:
              property:
                type: string
        filter:
          type: object
          properties:
            operator:
              type: string
            rules:
              type: array
              items:
                type: object
                properties:
                  property:
                    type: string
                  operator:
                    type: string
                  values:
                    type: array
                    items: {}
        histogram:
