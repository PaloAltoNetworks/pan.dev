openapi: 3.0.2
info:
  title: SASE 5G Monitor Service API
  version: '1.0'
  description: "The SASE 5G Monitoring Service provides real-time visibility and technical\
    \ telemetry \nfor enterprise 5G infrastructure within the Strata Cloud Manager\
    \ (SCM) ecosystem. \nTechnical leads and network analysts utilize these APIs to\
    \ track subscriber scaling, \nmonitor regional registration trends, and audit\
    \ network throughput performance.\n\nBy leveraging these endpoints, organizations\
    \ maintain a continuous feedback loop on \nUser Equipment (UE) activity and regional\
    \ interconnect health. The service enables \nproactive troubleshooting through\
    \ incident severity tracking and API performance \nmonitoring, ensuring that global\
    \ 5G connectivity meets strict service level objectives \nwhile identifying unauthorized\
    \ traffic or signaling gaps. This spec was created on February 13, 2026. \xA9\
    \ 2026 Palo Alto Networks, Inc."
paths:
  /mt/monitor/5g/tenants:
    get:
      tags:
      - Total Tenants
      summary: Get Total Tenants
      description: Returns the total count of tenants.
      responses:
        '200':
          description: Success
          content:
            application/json:
              example:
                data:
                  total_tenants: 8
                header:
                  createdAt: '2025-12-17T01:28:33Z'
                  clientRequestId: null
                  dataCount: 1
                  status:
                    subCode: 200
        '401':
          description: Permission Denied
        '500':
          description: Server Error
      operationId: GetMtMonitor5gTenants
  /mt/monitor/5g/ueIp/registered:
    get:
      tags:
      - Registered UE Mappings
      summary: Get Registered UE Mappings
      description: Returns the count of registered device mappings.
      responses:
        '200':
          description: Success
          content:
            application/json:
              example:
                data:
                  registered_device: 6
                header:
                  createdAt: '2025-12-17T02:03:07Z'
                  clientRequestId: null
                  dataCount: 1
                  status:
                    subCode: 200
        '401':
          description: Permission Denied
        '500':
          description: Server Error
      operationId: GetMtMonitor5gUeipRegistered
  /mt/monitor/5g/ueIp/region:
    get:
      tags:
      - UE IP Region
      summary: Get UEs Region
      description: Returns the list of regions where UEs are registered.
      responses:
        '200':
          description: Success
          content:
            application/json:
              example:
                data:
                - compute_region: us-west2
                header:
                  createdAt: '2025-12-17T02:06:52Z'
                  clientRequestId: null
                  dataCount: 1
                  status:
                    subCode: 200
        '401':
          description: Permission Denied
        '500':
          description: Server Error
      operationId: GetMtMonitor5gUeipRegion
  /mt/monitor/5g/ueIp/registered/trend:
    post:
      tags:
      - 5G Registered Trend
      summary: Get Registered UE Trend
      description: Returns the trend of registered UE devices over time.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TrendRequest'
            example:
              properties:
              - property: imei
                function: count
                alias: registered_count
              filter:
                operator: AND
                rules:
                - property: event_time
                  operator: last_n_days
                  values:
                  - 7
                - property: compute_region
                  operator: in
                  values:
                  - us-central1
              histogram:
                property: event_time
                range: day
                enableEmptyInterval: false
                value: '1'
      responses:
        '200':
          description: Success
          content:
            application/json:
              example:
                data:
                - event_time: 1765324800000
                  registered_count: 4
                - event_time: 1765411200000
                  registered_count: 4
                header:
                  createdAt: '2025-12-17T02:05:29Z'
                  clientRequestId: null
                  dataCount: 7
                  status:
                    subCode: 200
        '400':
          description: Bad Request
        '401':
          description: Permission Denied
        '500':
          description: Server Error
      operationId: PostMtMonitor5gUeipRegisteredTrend
  /mt/monitor/5g/ueIp/deregistered/trend:
    post:
      tags:
      - 5G Deregistered Trend
      summary: Get DeRegistered UE Trend
      description: Returns the trend of deregistered UE devices over time.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TrendRequest'
            example:
              properties:
              - property: imei
                function: count
                alias: deregistered_count
              filter:
                operator: AND
                rules:
                - property: event_time
                  operator: last_n_days
                  values:
                  - 7
                - property: compute_region
                  operator: in
                  values:
                  - us-central1
              histogram:
                property: event_time
                range: day
                enableEmptyInterval: false
                value: '1'
      responses:
        '200':
          description: Success
          content:
            application/json:
              example:
                data:
                - event_time: 1765324800000
                  deregistered_count: 3
                - event_time: 1765411200000
                  deregistered_count: 3
                header:
                  createdAt: '2025-12-17T02:05:42Z'
                  clientRequestId: null
                  dataCount: 7
                  status:
                    subCode: 200
        '400':
          description: Bad Request
        '401':
          description: Permission Denied
        '500':
          description: Server Error
      operationId: PostMtMonitor5gUeipDeregisteredTrend
  /mt/monitor/5g/ueIp/count:
    post:
      tags:
      - Added and Cleared Mappings
      summary: Get Added/Cleared Mappings Count
      description: Returns the count of added and cleared UE IP Address mappings over
        a period of time.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CountFilterRequest'
            example:
              filter:
                operator: AND
                rules:
                - property: event_time
                  operator: last_n_days
                  values:
                  - 7
      responses:
        '200':
          description: Success
          content:
            application/json:
              example:
                data:
                  add_count: 28
                  delete_count: 19
                header:
                  createdAt: '2025-12-17T02:07:14Z'
                  clientRequestId: null
                  dataCount: 1
                  status:
                    subCode: 200
        '400':
          description: Bad Request
        '401':
          description: Permission Denied
        '500':
          description: Server Error
      operationId: PostMtMonitor5gUeipCount
  /mt/monitor/5g/unknownIp/region:
    get:
      tags:
      - Unknown IP  Regions
      summary: Get Unknown IP Address Region
      description: Returns the regions where unknown IPs are detected.
      responses:
        '200':
          description: Success
          content:
            application/json:
              example:
                data:
                - compute_region: us-west2
                header:
                  createdAt: '2025-12-17T02:04:26Z'
                  clientRequestId: null
                  dataCount: 1
                  status:
                    subCode: 200
        '401':
          description: Permission Denied
        '500':
          description: Server Error
      operationId: GetMtMonitor5gUnknownipRegion
  /mt/monitor/5g/unknownIp/trend:
    post:
      tags:
      - 5G Unknown IPs Trend
      summary: Get Unknown IP Address Trend
      description: Returns the trend of unknown IP Address addresses over time.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TrendRequest'
            example:
              properties:
              - property: ip_address
                function: distinct_count
                alias: count
              - property: compute_region
                alias: region
              filter:
                operator: AND
                rules:
                - property: event_time
                  operator: last_n_days
                  values:
                  - 7
                - property: compute_region
                  operator: in
                  values:
                  - us-central1
              histogram:
                property: event_time
                range: day
                enableEmptyInterval: false
                value: '1'
      responses:
        '200':
          description: Success
          content:
            application/json:
              example:
                data:
                - region: us-central1
                  event_time: 1765324800000
                  count: 13
                - region: us-central1
                  event_time: 1765411200000
                  count: 7
                header:
                  createdAt: '2025-12-17T02:05:04Z'
                  clientRequestId: null
                  dataCount: 8
                  status:
                    subCode: 200
        '400':
          description: Bad Request
        '401':
          description: Permission Denied
        '500':
          description: Server Error
      operationId: PostMtMonitor5gUnknownipTrend
  /mt/monitor/5g/mapping/activeUEs:
    get:
      tags:
      - Active Mappings
      summary: Get Active UE Mappings
      description: Returns the count of active UE mappings.
      responses:
        '200':
          description: Success
          content:
            application/json:
              example:
                data:
                  active_mappings: 4
                header:
                  createdAt: '2025-12-17T02:05:18Z'
                  clientRequestId: null
                  dataCount: 1
                  status:
                    subCode: 200
        '401':
          description: Permission Denied
        '500':
          description: Server Error
      operationId: GetMtMonitor5gMappingActiveues
  /mt/monitor/5g/mapping/configuredUEs:
    get:
      tags:
      - Configured UE Mappings
      summary: Get Configured UE Mappings
      description: Returns the count of UEs configured by the users.
      responses:
        '200':
          description: Success
          content:
            application/json:
              example:
                data:
                  configured_ue_count: 94
                header:
                  createdAt: '2025-12-17T02:07:37Z'
                  clientRequestId: null
                  dataCount: 1
                  status:
                    subCode: 200
        '401':
          description: Permission Denied
        '500':
          description: Server Error
      operationId: GetMtMonitor5gMappingConfiguredues
  /mt/monitor/5g/mapping/unknownUEs:
    get:
      tags:
      - Unknown UE Mappings
      summary: Get Unknown UE Mappings
      description: Returns the count of UE mappings which were not configured by user,
        but got registered either via Radius or Application Programming Interface.
      responses:
        '200':
          description: Success
          content:
            application/json:
              example:
                data:
                  unknown_mappings: 1
                header:
                  createdAt: '2025-12-17T02:07:45Z'
                  clientRequestId: null
                  dataCount: 1
                  status:
                    subCode: 200
        '401':
          description: Permission Denied
        '500':
          description: Server Error
      operationId: GetMtMonitor5gMappingUnknownues
  /mt/monitor/5g/mapping/region:
    get:
      tags:
      - Mappings Region
      summary: Get 5G Mapping Regions
      description: Returns the list of regions where mappings exist.
      responses:
        '200':
          description: Success
          content:
            application/json:
              example:
                data:
                - us-west2
                - us-central1
                header:
                  createdAt: '2025-12-17T02:10:45Z'
                  clientRequestId: null
                  dataCount: 2
                  status:
                    subCode: 200
        '401':
          description: Permission Denied
        '500':
          description: Server Error
      operationId: GetMtMonitor5gMappingRegion
  /mt/monitor/5g/mapping:
    post:
      tags:
      - UE Mappings
      summary: UE Mapping Details
      description: List all the UE Mappings or search a particular UE Mapping by IMSI,
        IMEI or IP Address Address. If no pagination is provided by deafult 100 records
        will be returned.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MappingRequest'
            examples:
              Paginated List:
                value:
                  pageSize: 100
                  pageNum: 0
              Paginated List With Tenant Filter:
                value:
                  pageSize: 100
                  pageNum: 0
                  tenant:
                  - '1459340040'
                  - '1635727460'
              Paginated List With Region Filter:
                value:
                  pageSize: 100
                  pageNum: 0
                  region: us-west2
              Paginated List With Region  and Tenant Filter:
                value:
                  pageSize: 100
                  pageNum: 0
                  region: us-west2
                  tenant:
                  - '1459340040'
                  - '1635727460'
              Search with Pagination:
                value:
                  searchKey: '500012222222222'
                  pageSize: 100
                  pageNum: 0
              Search with Pagination and Filtering:
                value:
                  searchKey: '310260418380113'
                  pageSize: 100
                  pageNum: 0
                  region: us-west2
                  tenant:
                  - '1459340040'
                  - '1635727460'
      responses:
        '200':
          description: Success
          content:
            application/json:
              examples:
                Single Mapping:
                  value:
                    data:
                      mappings:
                      - apn: demo.com
                        createTime: 1737113951692
                        groups: new_grp
                        imei: '000000000000000'
                        imsi: '500012222222222'
                        tenantProvisioned: Inactive
                        tsgId: '1131085573'
                      totalCount: 1
                    header:
                      createdAt: '2025-12-17T02:07:58Z'
                      clientRequestId: null
                      dataCount: 1
                      status:
                        subCode: 200
                Multiple Mappings:
                  value:
                    data:
                      mappings:
                      - apn: pan.pcweb.comm
                        createTime: 1759426780582
                        imei: '000000000000000'
                        imsi: '310260418380113'
                        tenantProvisioned: Inactive
                        tsgId: '1558164857'
                      - apn: pan.fast.comm
                        createTime: 1759426957812
                        imei: '359414782481750'
                        imsi: '310260418380113'
                        tenantProvisioned: Inactive
                        tsgId: '1558164857'
                      totalCount: 2
                    header:
                      createdAt: '2025-12-17T02:08:33Z'
                      clientRequestId: null
                      dataCount: 2
                      status:
                        subCode: 200
        '400':
          description: Bad Request
        '401':
          description: Permission Denied
        '500':
          description: Server Error
      operationId: PostMtMonitor5gMapping
  /mt/monitor/5g/proxy:
    get:
      tags:
      - Total Proxies
      summary: Get Total Proxies
      description: Returns the total count of proxy servers configured by the client.
      responses:
        '200':
          description: Success
          content:
            application/json:
              example:
                data:
                  count: 5
                header:
                  createdAt: '2025-12-17T02:05:51Z'
                  clientRequestId: null
                  dataCount: 1
                  status:
                    subCode: 200
        '401':
          description: Permission Denied
        '500':
          description: Server Error
      operationId: GetMtMonitor5gProxy
  /mt/monitor/5g/incidents/count:
    post:
      tags:
      - Incidents by Severity
      summary: Get Incidents By Severity
      description: Returns the count of incidents based on severity levels.
      parameters:
      - name: agg_by
        in: query
        schema:
          type: string
          enum:
          - tenant
        description: Aggregation parameter
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IncidentsCountRequest'
            example:
              properties:
              - property: total_count
              - property: critical_count
              - property: warning_count
              filter:
                rules:
                - property: raised_time
                  operator: last_n_days
                  values:
                  - 7
                - property: status
                  operator: equals
                  values:
                  - Raised
                - property: severity
                  operator: in
                  values:
                  - Critical
                  - Warning
                - property: domain
                  operator: in
                  values:
                  - External
                  - external
      responses:
        '200':
          description: Success
          content:
            application/json:
              example:
                data:
                - total_count: 680
                  critical_count: 340
                  warning_count: 0
        '400':
          description: Bad Request
        '401':
          description: Permission Denied
        '500':
          description: Server Error
      operationId: PostMtMonitor5gIncidentsCount
  /mt/monitor/5g/api/stats:
    post:
      tags:
      - API Stats
      summary: Get Application Programming Interface Stats
      description: Returns the total Application Programming Interface calls made
        and count of success and failure calls. Applicable for interface type Application
        Programming Interface.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CountFilterRequest'
            example:
              filter:
                operator: AND
                rules:
                - property: event_time
                  operator: last_n_days
                  values:
                  - 7
      responses:
        '200':
          description: Success
          content:
            application/json:
              example:
                data:
                  total_count: 0
                  success_count: 0
                  failure_count: 0
                header:
                  createdAt: '2025-12-17T02:06:39Z'
                  clientRequestId: null
                  dataCount: 1
                  status:
                    subCode: 200
        '400':
          description: Bad Request
        '401':
          description: Permission Denied
        '500':
          description: Server Error
      operationId: PostMtMonitor5gApiStats
  /mt/monitor/5g/interconnect/details:
    get:
      tags:
      - 5G Network Interconnects and Bandwidth
      summary: Get Interconnect Details
      description: Returns total bandwidth, region list and 5G Network Connections.
      responses:
        '200':
          description: Success
          content:
            application/json:
              example:
                data:
                - bandwidth: 200
                  regions:
                  - us-east1
                  - us-west2
                  - us-central1
                  vlanStatus:
                    down: 0
                    total: 8
                    up: 8
                header:
                  createdAt: '2025-12-17T02:07:25Z'
                  clientRequestId: null
                  dataCount: 1
                  status:
                    subCode: 200
        '401':
          description: Permission Denied
        '500':
          description: Server Error
      operationId: GetMtMonitor5gInterconnectDetails
  /mt/monitor/5g/interconnect/throughput:
    post:
      tags:
      - Throughput Trend
      summary: Get Throughput Trend
      description: Returns the throughput trend data for egress and ingress traffic.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ThroughputRequest'
            example:
              properties:
              - property: egress_throughput
              - property: ingress_throughput
              - property: event_time
              - property: region
              filter:
                operator: AND
                rules:
                - property: event_time
                  operator: last_n_days
                  values:
                  - 7
                - property: region
                  operator: equals
                  values:
                  - us-central1
              histogram:
                property: event_time
                range: day
                enableEmptyInterval: false
                value: '1'
      responses:
        '200':
          description: Success
          content:
            application/json:
              example:
                data:
                - egress_throughput: 0.002508770165798529
                  ingress_throughput: 0.003023766583801299
                  event_time: 1765324800000
                  region: us-central1
                - egress_throughput: 0.0027237501165300205
                  ingress_throughput: 0.0034827909235609217
                  event_time: 1765411200000
                  region: us-central1
        '400':
          description: Bad Request
        '401':
          description: Permission Denied
        '500':
          description: Server Error
      operationId: PostMtMonitor5gInterconnectThroughput
  /mt/monitor/5g/users:
    get:
      tags:
      - Total Number of Configured Users
      summary: Get Total Configured Users
      description: Returns the total count of configured users.
      responses:
        '200':
          description: Success
          content:
            application/json:
              example:
                data:
                  total_users: 5000
                header:
                  createdAt: '2025-12-17T02:08:46Z'
                  clientRequestId: null
                  dataCount: 1
                  status:
                    subCode: 200
        '401':
          description: Permission Denied
        '500':
          description: Server Error
      operationId: GetMtMonitor5gUsers
  /mt/monitor/5g/ueIp/bandwidth:
    post:
      tags:
      - Bandwidth Consumption
      summary: Get Bandwidth Consumption for Users
      description: Returns the egress and ingress bandwidth consumption for users.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BandwidthRequest'
            example:
              filter:
                rules:
                - property: event_time
                  operator: last_n_days
                  values:
                  - 7
                - property: tsg_id
                  operator: in
                  values:
                  - '1916630658'
                  - '1316969669'
                  - '1817714134'
                - property: compute_region
                  operator: in
                  values:
                  - us-central1
      responses:
        '200':
          description: Success
          content:
            application/json:
              example:
                data:
                - username: iot-test\\112233445566776_test.com
                  total_rx_bytes: 0
                  total_tx_bytes: 0
                  rx_throughput_bps: 0.0
                  tx_throughput_bps: 0.0
                  imei: 100000000000000
                  imsi: 112233445566776
                  apn: test.com
                  tsg_id: 12345678
                  compute_region: us-west2
        '400':
          description: Bad Request
        '401':
          description: Permission Denied
        '500':
          description: Server Error
      operationId: PostMtMonitor5gUeipBandwidth
servers:
- url: https://stratacloudmanager.paloaltonetworks.com
security:
- BearerAuth: []
components:
  schemas:
    TrendRequest:
      type: object
      properties:
        properties:
          type: array
          items:
            type: object
            properties:
              property:
                type: string
              function:
                type: string
              alias:
                type: string
        filter:
          type: object
          properties:
            operator:
              type: string
            rules:
              type: array
              items:
                type: object
                properties:
                  property:
                    type: string
                  operator:
                    type: string
                  values:
                    type: array
                    items: {}
        histogram:
          type: object
          properties:
            property:
              type: string
            range:
              type: string
            enableEmptyInterval:
              type: boolean
            value:
              type: string
    CountFilterRequest:
      type: object
      properties:
        filter:
          type: object
          properties:
            operator:
              type: string
            rules:
              type: array
              items:
                type: object
                properties:
                  property:
                    type: string
                  operator:
                    type: string
                  values:
                    type: array
                    items: {}
    MappingRequest:
      type: object
      properties:
        pageSize:
          type: integer
          format: int32
        pageNum:
          type: integer
          format: int32
        searchKey:
          type: string
        region:
          type: string
        tenant:
          type: array
          items:
            type: string
    IncidentsCountRequest:
      type: object
      properties:
        properties:
          type: array
          items:
            type: object
            properties:
              property:
                type: string
        filter:
          type: object
          properties:
            rules:
              type: array
              items:
                type: object
                properties:
                  property:
                    type: string
                  operator:
                    type: string
                  values:
                    type: array
                    items: {}
    ThroughputRequest:
      type: object
      properties:
        properties:
          type: array
          items:
            type: object
            properties:
              property:
                type: string
        filter:
          type: object
          properties:
            operator:
              type: string
            rules:
              type: array
              items:
                type: object
                properties:
                  property:
                    type: string
                  operator:
                    type: string
                  values:
                    type: array
                    items: {}
        histogram:
          type: object
          properties:
            property:
              type: string
            range:
              type: string
            enableEmptyInterval:
              type: boolean
            value:
              type: string
    BandwidthRequest:
      type: object
      properties:
        filter:
          type: object
          properties:
            operator:
              type: string
            rules:
              type: array
              items:
                type: object
                properties:
                  property:
                    type: string
                  operator:
                    type: string
                  values:
                    type: array
                    items: {}
ExternalTags: {}
