  /mt/manage/5g/register/ue:
    post:
      tags:
      - UE Enrichment
      summary: Register UE Device
      description: Dynamically register one or more User Equipment (UE) devices with
        the 5G management plane by providing their IP Address addresses and subscriber
        identifiers. This enrichment process allows the 5G security solution to map
        real-time traffic to specific IMSI and IMEI identities. Perform this registration
        when using the Application Programming Interface-based integration model to
        ensure traffic flows are correctly attributed to tenants.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterUE'
            examples:
              Register UE With mandatory params:
                value:
                - imsi: '333333333333333'
                  imei: '333333333333333'
                  apn: demo.com
                  ipv4Addr: 172.29.0.8
                  ipType: IPv4
                  eventTime: 123456789009
              Incorrect Payload:
                value:
                - imsi: '3333333333333'
                  imei: '333333333333333'
                  apn: demo.com
                  ipv4Addr: 172.29.0.8
                  ipType: IPv4
                  eventTime: 123456789009
              IP out of Range:
                value:
                - imsi: '333333333333333'
                  imei: '333333333333333'
                  apn: demo.com
                  ipv4Addr: 192.29.0.8
                  ipType: IPv4
                  eventTime: 123456789009
              Missing mandory param:
                value:
                - imsi: '333333333333333'
                  imei: '333333333333333'
                  apn: demo.com
                  ipv4Addr: 172.29.0.8
                  ipType: IPv4
              Partially correct payload:
                value:
                - imsi: '444444444444444'
                  imei: '444444444444444'
                  apn: demo.com
                  ipv4Addr: 172.29.0.10
                  ipType: IPv4
                  eventTime: 123456789009
                  expiryTime: 1234568988
                - imsi: '333333333333444'
                  imei: '333333333333444'
                  apn: demo.com
                  ipv4Addr: 172.29.0.9
                  ipType: IPv4
                  expiryTime: 1234568988
                  msisdn: test
              Update expiry Time:
                value:
                - imsi: '333333333333333'
                  imei: '333333333333333'
                  apn: demo.com
                  ipv4Addr: 172.29.0.8
                  ipType: IPv4
                  eventTime: 123456789009
                  expiryTime: 8765432190
      responses:
        '202':
          description: Accepted
          content:
            application/json:
              schema:
                type: object
              examples:
                Successful:
                  summary: Request Accepted
        '207':
          description: Partial Success
          content:
            application/json:
              schema:
                type: object
              example:
                apn: demo.com
                errorMsg: Event time is must
                expiryTime: 1234568988
                imei: '333333333333440'
                imsi: '333333333333444'
                ipType: 0
                ipv4Addr: 172.29.0.9
                msisdn: test
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                type: object
              examples:
                example-0:
                  summary: Incorrect Payload
                  value:
                    apn: demo.com
                    errorMsg: IMSI needs to be 15 digits, current length is 13
                    eventTime: 123456789009
                    imei: '333333333333333'
                    imsi: '3333333333333'
                    ipType: 0
                    ipv4Addr: 172.29.0.8
                example-1:
                  summary: IP Out of Range
                  value:
                    apn: demo.com
                    errorMsg: IP is not a part of any ue cidr block
                    eventTime: 123456789009
                    imei: '333333333333330'
                    imsi: '333333333333333'
                    ipType: 0
                    ipv4Addr: 192.29.0.8
                example-2:
                  summary: Missing mandatory param
                  value:
                    apn: demo.com
                    errorMsg: Event time is must
                    imei: '333333333333330'
                    imsi: '333333333333333'
                    ipType: 0
                    ipv4Addr: 172.29.0.8
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
              example:
                errorCode: '60076'
