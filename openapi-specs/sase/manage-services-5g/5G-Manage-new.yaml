openapi: 3.0.2
info:
  title: SASE 5G Manage API
  version: '1.0'
  description: "The evolution of 5G technology is transforming enterprise connectivity,\
    \ offering unprecedented speed and capacity. \nAs businesses embrace 5G networks,\
    \ the demand for robust security measures grows exponentially. \nService Providers\
    \ are at the forefront of this shift, tasked with safeguarding vast amounts of\
    \ sensitive data across diverse 5G-connected devices.\nTraditional security approaches\
    \ fall short in the 5G landscape. Embedded solutions often hit scalability roadblocks\
    \ and increase management complexity. \nOver-the-Top (OTT) solutions, while flexible,\
    \ prove impractical for many IoT devices and sensors. Neither fully addresses\
    \ the unique challenges of 5G, \nsuch as seamless roaming and integrated network-based\
    \ security.\n\nThis gap in the market calls for an innovative security paradigm\
    \ - one that combines scalability, ease of management, \nand comprehensive protection\
    \ across all 5G scenarios. \nThe Enterprise 5G Security Solution emerges as the\
    \ answer to these pressing needs, \noffering a new approach to securing the future\
    \ of enterprise connectivity. This spec was created on February 09, 2026. \xA9\
    \ 2026 Palo Alto Networks, Inc."
paths:
  /mt/manage/5g/cie/token:
    post:
      tags:
      - Cie Token Resource API
      summary: Save Tenant Token
      description: Use this endpoint to store the Cloud Identity Engine (CIE) token
        for a specific leaf tenant within the management plane. This action establishes
        the necessary credentials required for cross-tenant identity synchronization.
        Perform this step during initial tenant onboarding or whenever identity credentials
        require a refresh to maintain secure directory access.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CieTokenRequest'
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '404':
          description: Data Not Found
        '500':
          description: Server Error
      operationId: PostMtManage5gCieToken
  /mt/manage/5g/cie/token/details:
    post:
      tags:
      - Cie Token Resource API
      summary: Get Token Details
      description: Administrators can retrieve technical metadata for a leaf tenant's
        Cloud Identity Engine (CIE) token through this interface. The system accesses
        the secure storage vault to verify token validity and expiration status. Utilize
        this query when auditing tenant connectivity or troubleshooting identity-based
        access failures to ensure the synchronization service remains operational.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JsonObject'
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '404':
          description: Data Not Found
        '500':
          description: Server Error
      operationId: PostMtManage5gCieTokenDetails
  /mt/manage/5g/interconnect:
    get:
      tags:
      - Interconnect API
      summary: Get Interconnect Details
      description: This endpoint retrieves comprehensive technical data for all configured
        5G Network Interconnects, organized by geographical region. The management
        plane aggregates metrics such as bandwidth capacity, vlan attachment counts,
        and current operational status. Review these details when planning regional
        capacity expansions or monitoring the health of the physical-to-virtual infrastructure
        bridge.
      responses:
        '200':
          description: Success
          content:
            application/json:
              examples:
                Get Interconnect Details by region:
                  value:
                    data:
                    - bandwidth: 500000000
                      computeRegion: us-west2
                      status: Supported
                      vlanAttachmentCount: 2
                      vlanAttachmentStatusEntry:
                        down: 1
                        up: 1
                    - bandwidth: 100000000
                      computeRegion: us-central1
                      status: Supported
                      vlanAttachmentCount: 1
                      vlanAttachmentStatusEntry:
                        down: 0
                        up: 1
                    - bandwidth: 400000000
                      computeRegion: us-east2
                      status: Supported
                      vlanAttachmentCount: 1
                      vlanAttachmentStatusEntry:
                        down: 0
                        up: 1
                    - bandwidth: 300000000
                      computeRegion: us-west1
                      status: Supported
                      vlanAttachmentCount: 1
                      vlanAttachmentStatusEntry:
                        down: 1
                        up: 0
                    header:
                      createdAt: '2024-08-28T16:05:27Z'
                      dataCount: 4
                      status:
                        subCode: 200
        '400':
          description: Bad Request
        '404':
          description: Data Not Found
        '500':
          description: Server Error
      operationId: GetMtManage5gInterconnect
  /mt/manage/5g/control/cert/download:
    get:
      tags:
      - Control Plane Resource API
      summary: Download Certificate File
      description: Securely download the required 5G control plane certificate to
        establish encrypted communication between local infrastructure and the Prisma
        Access backbone. This file contains the cryptographic keys needed to authorize
        5G connectivity within a specific management region. Execute this download
        during the initial site setup phase to finalize the secure tunnel configuration
        for 5G traffic.
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '404':
          description: Data Not Found
        '500':
          description: Server Error
      operationId: GetMtManage5gControlCertDownload
  /mt/manage/5g/control/proxycert:
    get:
      tags:
      - Control Plane Resource API
      summary: Verify Proxy Certificate
      description: Query the management plane to confirm whether the required proxy
        certificate has been successfully uploaded for the root Tenant Service Group
        (TSG). This check ensures that the administrative hierarchy has the valid
        credentials necessary for high-level traffic inspection. Use this verification
        step before attempting to provision child tenants or deploying 5G-enabled
        security policies.
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '404':
          description: Data Not Found
        '500':
          description: Server Error
      operationId: GetMtManage5gControlProxycert
  /mt/manage/5g/control/proxycert/upload:
    post:
      tags:
      - Control Plane Resource API
      summary: Upload Certificate File
      description: Transmit the cryptographic proxy certificate to the root Tenant
        Service Group (TSG) to enable secure traffic handling within the 5G management
        plane. By providing the binary file and associated TSG identifiers, administrators
        establish the trust anchor required for secure communication. Perform this
        upload when initializing a new 5G region or updating expired certificates
        to prevent service interruptions.
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  format: binary
                  type: string
                filename:
                  type: string
                tsgId:
                  type: string
                rootTsgId:
                  type: string
            encoding:
              file:
                contentType: application/octet-stream
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '404':
          description: Data Not Found
        '500':
          description: Server Error
      operationId: PostMtManage5gControlProxycertUpload
  /mt/manage/5g/control/radiusProxy:
    get:
      tags:
      - Control Plane Resource API
      summary: Get Radius Proxy
      description: Fetch the RADIUS server shared secret assigned to the root Tenant
        Service Group (TSG) for authentication audit purposes. This endpoint retrieves
        the secret from secure storage to verify that the 5G management plane aligns
        with existing RADIUS server configurations.
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '404':
          description: Data Not Found
        '500':
          description: Server Error
      operationId: GetMtManage5gControlRadiusproxy
    post:
      tags:
      - Control Plane Resource API
      summary: Add Radius Proxy
      description: Create a new RADIUS server shared secret configuration for the
        root Tenant Service Group (TSG). Administrators submit the specific secret
        and creator details to enable the 5G management plane to proxy authentication
        requests effectively. Initialize this configuration when adding new authentication
        nodes or refreshing security keys for the 5G infrastructure.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RadiusProxyRequest'
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '404':
          description: Data Not Found
        '500':
          description: Server Error
      operationId: PostMtManage5gControlRadiusproxy
  /mt/manage/5g/control/radiusSecret:
    get:
      tags:
      - Control Plane Resource API
      summary: Get Radius Secret
      description: Fetch the shared secret key used for communicating with the external
        RADIUS server in the root tenant context. This allows administrators to audit
        the current security parameters used to authorize 5G subscriber sessions.
        Access this information when validating that local authentication configurations
        match the 5G management plane settings.
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '404':
          description: Data Not Found
        '500':
          description: Server Error
      operationId: GetMtManage5gControlRadiussecret
    post:
      tags:
      - Control Plane Resource API
      summary: Add Radius Secret
      description: Assign a new cryptographic shared secret for RADIUS server communication
        within the root Tenant Service Group (TSG). Administrators use this to establish
        the primary trust bond between the 5G management service and the corporate
        identity directory. Perform this operation when configuring initial authentication
        workflows or as part of a scheduled secret rotation policy.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RadiusServerSecretRequest'
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '404':
          description: Data Not Found
        '500':
          description: Server Error
      operationId: PostMtManage5gControlRadiussecret
  /mt/manage/5g/control/radiusServers:
    get:
      tags:
      - Control Plane Resource API
      summary: Get Radius Details
      description: Retrieve the full technical specifications and configuration status
        of all active RADIUS servers within a specific management region. The system
        returns server addresses and metadata required to maintain 5G connectivity
        and authentication flows. Use this endpoint during network troubleshooting
        or when auditing the external authentication dependencies of the 5G service.
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '404':
          description: Data Not Found
        '500':
          description: Server Error
      operationId: GetMtManage5gControlRadiusservers
  /mt/manage/5g/control/supported/interfaces:
    get:
      tags:
      - Control Plane Resource API
      summary: List Supported Interfaces
      description: Access a comprehensive list of all data interfaces currently supported
        by the 5G management service, such as RADIUS or Application Programming Interface-based
        enrichment. This inventory identifies which integration methods are available
        for tenant data processing. Consult this list when determining the optimal
        telemetry integration strategy for a new 5G deployment.
      responses:
        '200':
          description: Successful response
        '500':
          description: Server Error
      operationId: GetMtManage5gControlSupportedInterfaces
  /mt/manage/5g/control/interface:
    get:
      tags:
      - Control Plane Resource API
      summary: Get Interface Type
      description: View the specific interface type currently selected for 5G telemetry
        processing within the tenant context. This check identifies whether the system
        uses active RADIUS polling or passive Application Programming Interface-based
        registration for UE mapping.
      responses:
        '200':
          description: Successful response
        '500':
          description: Server Error
      operationId: GetMtManage5gControlInterface
    post:
      tags:
      - Control Plane Resource API
      summary: Add Interface Type
      description: "Define the primary interface type and interim message configuration\
        \ for the 5G control plane. Administrators set the integration model\u2014\
        such as RADIUS with optional message intervals\u2014to determine how the system\
        \ receives subscriber telemetry. Configure this when establishing the 5G connectivity\
        \ model to ensure accurate data synchronization."
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetInterface'
      responses:
        '200':
          description: Successful response
        '400':
          description: Bad Request
        '500':
          description: Server Error
      operationId: PostMtManage5gControlInterface
  /mt/manage/5g/control/interimMsg:
    put:
      tags:
      - Control Plane Resource API
      summary: Update Interim Configuration
      description: Modify the existing interim message interval and processing status
        for an active 5G control plane interface. This update allows administrators
        to tune the frequency of heartbeat messages to optimize performance or increase
        synchronization accuracy. Apply these changes when network conditions or telemetry
        requirements shift during active operation.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateInterimMsg'
      responses:
        '200':
          description: Successful response
        '400':
          description: Bad Request
        '404':
          description: Data Not Found
        '500':
          description: Server Error
      operationId: PutMtManage5gControlInterimmsg
  /mt/manage/5g/ipcidr/{compute_region}:
    get:
      tags:
      - Enable 5 GAPI
      summary: Get IP Address Cidr
      description: Retrieve the allocated IPv4 and IPv6 CIDR blocks for the 5G User
        Equipment (UE) pool within a specific compute region. The management plane
        provides these ranges to identify which IP Address sets are reserved for secure
        5G traffic. Access this information when configuring firewall rules or verifying
        IP Address resource availability for regional 5G deployments.
      parameters:
      - name: compute_region
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '404':
          description: Data Not Found
        '500':
          description: Server Error
      operationId: GetMtManage5gIpcidrBy_compute_region
  /mt/manage/5g/setup:
    post:
      tags:
      - Enable 5 GAPI
      summary: Enable 5G Connectivity
      description: Initialize the 5G connectivity framework for a specific compute
        region by provisioning the necessary CIDR blocks and enabling the management
        plane. Administrators submit the desired region and IP Address ranges to establish
        the secure tunnel between the 5G provider and the Prisma Access backbone.
        Use this endpoint once during the initial setup of a new 5G-capable service
        region.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Enable5GRequest'
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '404':
          description: Data Not Found
        '500':
          description: Server Error
      operationId: PostMtManage5gSetup
  /mt/manage/5g/tenantUEInfo:
    post:
      tags:
      - UE Info Resource API
      summary: Add UE Mapping
      description: Create a new mapping between a tenant and specific User Equipment
        (UE) identifiers, including IMSI, IMEI, and APN values. This endpoint binds
        unique subscriber hardware to a specific Tenant Service Group (TSG) for targeted
        policy application. Use this when onboarding individual devices or static
        IoT sensors that require persistent, identity-based security within the 5G
        network.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TenantUEInfoRequest'
            examples:
              Add Tenant UE Info:
                value:
                  root_tsg_id: '123456891'
                  tsg_id: '123456890'
                  imei: '111111789012345'
                  imsi: '123456789012345'
                  apn: apn@panw.com
              IMEI Input Size Error:
                value:
                  root_tsg_id: '1204544558'
                  tsg_id: '1886576124'
                  imei: '12345678901234'
                  imsi: '123456789012345'
                  apn: apn@panw.com
              IMSI Input Size Error:
                value:
                  root_tsg_id: '1204544558'
                  tsg_id: '1886576124'
                  imei: '123456789012345'
                  imsi: '12345678901234'
                  apn: apn@panw.com
      responses:
        '200':
          description: Success
          content:
            application/json:
              examples:
                Add Tenant UE Info:
                  value:
                    data:
                      id: 45a4ca95-9e8b-4a63-a482-70b7d3aa4fd8
                      root_tsg_id: '1204544558'
                      tsg_id: '1886576124'
                      imei: '123456789012340'
                      imsi: '123456789012345'
                      apn: apn@panw.com
                      create_time: 1738446903587
                      update_time: 1738446903587
        '400':
          description: Bad Request
          content:
            application/json:
              examples:
                Duplicate Tenant UE Info:
                  value:
                    errorCode: '60013'
                    message: Duplicate tenant UE information
                    details: Duplicate UE info
                    service: 5G Management Service
                    requestId: 9b3655ac-ce40-4e32-a38d-eff42e593d7f
                    clientRequestId: 9b3655ac-ce40-4e32-a38d-eff42e593d7f
                Invalid TSG Id:
                  value:
                    errorCode: '60014'
                    message: Failed to create tenant UE information
                    details: tsg_id 123456890 does not exist in TenantDetails
                    service: 5G Management Service
                    requestId: 814ea495-87e3-4f41-8ceb-7bec3d09fb23
                    clientRequestId: 814ea495-87e3-4f41-8ceb-7bec3d09fb23
                IMEI Input Size Error:
                  value:
                    errorCode: '60014'
                    message: Failed to create tenant UE information
                    details: IMEI needs to be 15 digits, current length is 27
                    service: 5G Management Service
                    requestId: 4934299e-15a1-454e-9f6c-c96c45b6d771
                    clientRequestId: 4934299e-15a1-454e-9f6c-c96c45b6d771
                IMSI Input Size Error:
                  value:
                    errorCode: '60014'
                    message: Failed to create tenant UE information
                    details: IMSI needs to be 15 digits, current length is 27
                    service: 5G Management Service
                    requestId: 4934299e-15a1-454e-9f6c-c96c45b6d771
                    clientRequestId: 4934299e-15a1-454e-9f6c-c96c45b6d771
        '404':
          description: Data Not Found
        '500':
          description: Server Error
          content:
            application/json:
              examples:
                ? '{"errorCode": "60000", "message": "Unexpected server error", "details":
                  "Unknown error occurred", "service": "5G Management Service", "requestId":
                  null, "clientRequestId": null}'
                : value: Internal Server Error
      operationId: PostMtManage5gTenantueinfo
  /mt/manage/5g/tenantUEInfo/delete:
    post:
      tags:
      - UE Info Resource API
      summary: Delete Bulk Mappings
      description: Permanently remove multiple Tenant-to-UE mappings from the management
        database in a single batch operation. Administrators provide a list of unique
        identity IDs to decommission large sets of subscriber equipment simultaneously.
        Execute this during fleet refreshes or when offboarding multiple devices from
        a specific 5G service plan.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TenantUeInfoBulkDeleteRequest'
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '404':
          description: Data Not Found
        '500':
          description: Server Error
      operationId: PostMtManage5gTenantueinfoDelete
  /mt/manage/5g/tenantUEInfo/list:
    post:
      tags:
      - UE Info Resource API
      summary: Get Mapping List
      description: Retrieve a paginated list of all active Tenant-to-UE mappings associated
        with a specific Tenant Service Group (TSG). The response includes technical
        details for each mapping, such as IMSI, IMEI, and associated security groups.
        Utilize this for periodic audits of subscriber inventories or when verifying
        the registration status of regional 5G devices.
      parameters:
      - name: filter
        in: query
        schema:
          pattern: ^[a-z]+:\w+(?:,[a-z]+:\w+)*$
          type: string
      - name: order
        in: query
        schema:
          pattern: ^[a-z]+:(asc|desc)*$
          type: string
      - name: page
        in: query
        schema:
          format: int32
          default: 0
          type: integer
      - name: size
        in: query
        schema:
          format: int32
          default: 50
          type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TenantUEInfoListInput'
            examples:
              List Tenant UE Info:
                value:
                  tsg_id: '1886576124'
      responses:
        '200':
          description: Success
          content:
            application/json:
              examples:
                List Tenant UE Info:
                  value:
                    totalItems: 2
                    data:
                    - identity_id: a5831ca0-5cf4-46a9-9409-6d55ea5e210a
                      root_tsg_id: '1204544558'
                      tsg_id: '1886576124'
                      imei: '100411547312190'
                      imsi: '264467605337818'
                      apn: apn@panw.com
                      group: []
                      create_time: 1737682646248
                      update_time: 1737682646248
                    - identity_id: 29900486-f87f-475a-803d-12e1ee886e55
                      root_tsg_id: '1204544558'
                      tsg_id: '1886576124'
                      imei: '100454707189790'
                      imsi: '512181509888245'
                      apn: apn@panw.com
                      group: []
                      create_time: 1737682657616
                      update_time: 1737682657616
                List Tenant UE Info with Groups:
                  value:
                    totalItems: 2
                    data:
                    - identity_id: a5831ca0-5cf4-46a9-9409-6d55ea5e210a
                      root_tsg_id: '1204544558'
                      tsg_id: '1886576124'
                      imei: '100411547312190'
                      imsi: '264467605337818'
                      apn: apn@panw.com
                      group:
                      - group_id: 6e451583-b3ab-4d62-af67-398675ab746f
                        group_name: testgroup
                      create_time: 1737682646248
                      update_time: 1737682646248
                    - identity_id: 29900486-f87f-475a-803d-12e1ee886e55
                      root_tsg_id: '1204544558'
                      tsg_id: '1886576124'
                      imei: '100454707189790'
                      imsi: '512181509888245'
                      apn: apn@panw.com
                      group: []
                      create_time: 1737682657616
                      update_time: 1737682657616
        '204':
          description: No Content
          content:
            application/json:
              examples:
                List Tenant UE Info Invalid TSG Id:
                  value:
                    totalItems: 0
                    data: []
        '400':
          description: Bad Request
        '404':
          description: Data Not Found
        '500':
          description: Server Error
      operationId: PostMtManage5gTenantueinfoList
  /mt/manage/5g/tenantUEInfo/upload:
    post:
      tags:
      - UE Info Resource API
      summary: Upload Tenant Feature
      description: Enable specific 5G management features for a tenant by uploading
        a configuration file directly to the management plane. This action activates
        regional capabilities and tenant-specific policies required for advanced 5G
        connectivity. Perform this upload during the feature activation phase to grant
        a tenant access to the 5G security framework.
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  format: binary
                  type: string
                filename:
                  type: string
                tsgId:
                  type: string
                rootTsgId:
                  type: string
            encoding:
              file:
                contentType: application/octet-stream
      responses:
        '200':
          description: Success
        '400':
          description: Bad Request
        '404':
          description: Data Not Found
        '500':
          description: Server Error
      operationId: PostMtManage5gTenantueinfoUpload
  /mt/manage/5g/tenantUEInfo/{identity_id}:
    put:
      tags:
      - UE Info Resource API
      summary: Edit UE Mapping
      description: Update the IMSI, IMEI, or APN parameters for an existing Tenant-to-UE
        mapping using its unique identifier. This allows administrators to keep subscriber
        records accurate as hardware changes or service configurations shift.
      parameters:
      - name: identity_id
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TenantUEInfoRequest'
            examples:
              Edit Tenant UE Info:
                value:
                  root_tsg_id: '123456891'
                  tsg_id: '123456890'
                  imei: '111111789012345'
                  imsi: '123456789012345'
                  apn: apn@panw.com
              IMEI Input Size Error:
                value:
                  root_tsg_id: '1204544558'
                  tsg_id: '1886576124'
                  imei: '12345678901234'
                  imsi: '123456789012345'
                  apn: apn@panw.com
              IMSI Input Size Error:
                value:
                  root_tsg_id: '1204544558'
                  tsg_id: '1886576124'
                  imei: '123456789012345'
                  imsi: '12345678901234'
                  apn: apn@panw.com
      responses:
        '200':
          description: Success
          content:
            application/json:
              examples:
                Edit Tenant UE Info:
                  value:
                    data:
                      id: 45a4ca95-9e8b-4a63-a482-70b7d3aa4fd8
                      root_tsg_id: '1204544558'
                      tsg_id: '1886576124'
                      imei: '111111789012340'
                      imsi: '123456789012345'
                      apn: apn@panw.com
                      create_time: 1738446903587
                      update_time: 1738446903587
        '400':
          description: Bad Request
          content:
            application/json:
              examples:
                Duplicate Tenant UE Info:
                  value:
                    errorCode: '60013'
                    message: Duplicate tenant UE information
                    details: Duplicate UE info
                    service: 5G Management Service
                    requestId: 9b3655ac-ce40-4e32-a38d-eff42e593d7f
                    clientRequestId: 9b3655ac-ce40-4e32-a38d-eff42e593d7f
                Invalid TSG Id:
                  value:
                    errorCode: '60014'
                    message: Failed to create tenant UE information
                    details: tsg_id 123456890 does not exist in TenantDetails
