                requestId: fd96df3d-4178-4141-a497-f4b12bc4d5ab
                clientRequestId: fd96df3d-4178-4141-a497-f4b12bc4d5ab
      operationId: PostMtManage5gDeregisterUe
servers:
- url: https://stratacloudmanager.paloaltonetworks.com
security:
- JWT: []
components:
  schemas:
    CSVFieldDelimiter:
      enum:
      - comma
      - semi_colon
      - tab
      type: string
    CieTokenRequest:
      type: object
      properties:
        tsg_id:
          type: string
        access_token:
          type: string
        created_by:
          type: string
        created_at:
          type: string
        cie_directory:
          type: string
    CompressionType:
      enum:
      - gzip
      - none
      - snappy
      type: string
    ConnectionRegionEntry:
      description: Connection Region Entry
      type: object
      properties:
        computeRegion:
          type: string
        connectionCount:
          format: int32
          type: integer
        connectionStatusEntry:
          $ref: '#/components/schemas/ConnectionStatusEntry'
        bandwidth:
          format: int64
          description: Bandwidth in BPS
          type: integer
        status:
          type: string
    ConnectionStatusEntry:
      type: object
      properties:
        up:
          format: int32
          type: integer
        down:
          format: int32
          type: integer
    Enable5GRequest:
      type: object
      properties:
        compute_region:
          type: string
        action:
          type: string
        ipv4_cidr:
          type: string
        ipv6_cidr:
          type: string
    JsonObject:
      type: array
      items:
        type: string
    RadiusProxyRequest:
      type: object
      properties:
        name:
          type: string
        ipaddress:
          type: string
    RadiusServerSecretRequest:
      type: object
      properties:
        secret:
          type: string
        created_by:
          type: string
    RegisterUE:
      type: array
      description: A list of one or more UEs
      items:
        type: object
        properties:
          apn:
            description: APN (Access Point Name) for the Tenant UE
            example: apn@panw.com
            type: string
          imei:
            description: 15 digit IMEI (International Mobile Equipment Identity) number.
              Error is returned if number of digits is not exactly 15.Last digit will
              be replaced by zero.
            example: '123456789012345'
            type: string
          imsi:
            description: 15 digit IMSI (International Mobile Subscriber Identity)
              number. Error is returned if number of digits is not exactly 15.
            example: '123456789012345'
            type: string
          ipType:
            description: it tells whether it is ipv4, ipv6 or dual stack. Valid values
              are IPv4, IPv6, IPv4v6
            example: IPV4
            type: string
          ipv4Addr:
            type: string
          ipv6Addr:
            type: string
          eventTime:
            description: epoc time in ms
            type: integer
          expiryTime:
            description: epoc time in ms
            type: integer
          sliceId:
            type: string
          msisdn:
            type: string
          ratType:
            type: string
          cellId:
            type: string
          supi:
            type: string
        required:
        - eventTime
        - ipType
        - imsi
        - imei
        - apn
    SetInterface:
      type: object
      properties:
        interfaceType:
          type: string
          example: RADIUS
        processInterimMsg:
          type: boolean
          default: false
        interimMsgInterval:
          type: integer
