components:
  schemas:
    Error:
      properties:
        _error:
          items:
            $ref: '#/components/schemas/ErrorResponse'
          type: array
    ErrorResponse:
      properties:
        code:
          type: string
        message:
          type: string
    ListResponse:
      properties:
        count:
          description: 'The actual count.

            '
          format: int32
          type: integer
        id:
          description: 'The ID.

            '
          type: string
      type: object
    SNMPAgent:
      properties:
        description:
          description: 'Description: Size(max = 256, error = DESCRIPTION_EXCEEDS_LIMIT:
            Description length exceeds limit, min = 0) '
          type: string
        id:
          description: Id
          type: string
        tags:
          description: 'Tags: ListString(allowDuplicate = false, allowEmpty = true,
            allowNull = true, length = 128, listMaxSize = 10, error = INVALID_TAG:
            Maximum 10 Unique tags of length 1024 each are allowed, noTrim = false,
            regex = [^,\\s]+, required = false) '
          items:
            description: Tags
            type: string
          type: array
        v2_config:
          $ref: '#/components/schemas/SNMPV2Config'
          description: 'V2 Config: Valid Valid '
        v3_config:
          $ref: '#/components/schemas/SNMPV3Config'
          description: 'V3 Config: Valid Valid '
    SNMPAgentV2N1:
      properties:
        description:
          description: 'Description: Size(max = 256, error = DESCRIPTION_EXCEEDS_LIMIT:
            Description length exceeds limit, min = 0) '
          type: string
        id:
          description: Id
          type: string
        system_contact:
          description: System Contact
          type: string
        system_location:
          description: System Location
          type: string
        tags:
          description: 'Tags: ListString(allowDuplicate = false, allowEmpty = true,
            allowNull = true, length = 128, listMaxSize = 10, error = INVALID_TAG:
            Maximum 10 Unique tags of length 1024 each are allowed, noTrim = false,
            regex = [^,\\s]+, required = false) '
          items:
            description: Tags
            type: string
          type: array
        v2_config:
          $ref: '#/components/schemas/SNMPV2Config'
          description: 'V2 Config: Valid Valid '
        v3_config:
          $ref: '#/components/schemas/SNMPV3Config'
          description: 'V3 Config: Valid Valid '
    SNMPTrap:
      properties:
        description:
          description: 'Description: Size(max = 256, error = DESCRIPTION_EXCEEDS_LIMIT:
            Description length exceeds limit, min = 0) '
          type: string
        enabled:
          description: Enabled
          type: boolean
        id:
          description: Id
          type: string
        server_ip:
          description: 'Server Ip: NotNull(error = SNMPTRAP_CONFIG_SERVER_IP_MISSING:
            SNMP Server ip cannot be null) IPAddress(allowEmpty = true, allowLinkLocal
            = false, allowNull = true, bcast = DENY, defaultRoute = false, dnsCheck
            = false, INVALID_IP_ADDRESS_001, type = IP) '
          type: string
        source_interface:
          description: Source Interface
          type: string
        tags:
          description: 'Tags: ListString(allowDuplicate = false, allowEmpty = true,
            allowNull = true, length = 128, listMaxSize = 10, error = INVALID_TAG:
            Maximum 10 Unique tags of length 1024 each are allowed, noTrim = false,
            regex = [^,\\s]+, required = false) '
          items:
            description: Tags
            type: string
          type: array
        v2_config:
          $ref: '#/components/schemas/SNMPTrapV2Config'
          description: 'V2 Config: Valid '
        v3_config:
          $ref: '#/components/schemas/SNMPTrapV3Config'
          description: 'V3 Config: Valid '
        version:
          description: 'Version: ValidateEnum(enumClass = classOf[SNMPVersion], error
            = SNMPTRAP_CONFIG_INVALID_VERSION: Unsupported snmp version specified,
            nullAllowed = false) '
          enum:
          - V2
          - V3
          type: string
      required:
      - version
      - server_ip
    SNMPTrapUserAccess:
      properties:
        auth_phrase:
          description: Auth Phrase
          type: string
        auth_type:
          description: Auth Type
          enum:
          - NONE
          - MD5
          - SHA
          type: string
        enc_phrase:
          description: Enc Phrase
          type: string
        enc_type:
          description: Enc Type
          enum:
          - NONE
          - AES
          - DES
          type: string
        engine_id:
          description: Engine Id
          type: string
        security_level:
          description: Security Level
          enum:
          - NOAUTH
          - AUTH
          - PRIVATE
          type: string
        user_name:
          description: User Name
          type: string
    SNMPTrapV2Config:
      properties:
        community:
          description: Community
          type: string
    SNMPTrapV3Config:
      properties:
        user_access:
          $ref: '#/components/schemas/SNMPTrapUserAccess'
          description: User Access
    SNMPUserAccess:
      properties:
        auth_phrase:
          description: Auth Phrase
          type: string
        auth_type:
          description: Auth Type
          enum:
          - NONE
          - MD5
          - SHA
          type: string
        enc_phrase:
          description: Enc Phrase
          type: string
        enc_type:
          description: Enc Type
          enum:
          - NONE
          - AES
          - DES
          type: string
        engine_id:
          description: Engine Id
          type: string
        security_level:
          description: Security Level
          enum:
          - NOAUTH
          - AUTH
          - PRIVATE
          type: string
        user_name:
          description: User Name
          type: string
    SNMPV2Config:
      properties:
        community:
          description: Community
          type: string
        enabled:
          description: Enabled
          type: boolean
    SNMPV3Config:
      properties:
        enabled:
          description: Enabled
          type: boolean
        users_access:
          description: Users Access
          items:
            $ref: '#/components/schemas/SNMPUserAccess'
          type: array
