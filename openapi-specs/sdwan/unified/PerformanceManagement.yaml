components:
  schemas:
    Aggregate:
      properties:
        data:
          description: Data
          items:
            $ref: '#/components/schemas/AggregateData'
          type: array
        field:
          description: Field
          type: string
        name:
          description: Name
          type: string
        operator:
          description: Operator
          enum:
          - max
          - count
          - min
          - avg
          - sum
          type: string
        statistic:
          description: Statistic
          type: string
        unit:
          description: Unit
          type: string
    AggregateData:
      properties:
        value:
          description: 'Value: JsonInclude(content = ALWAYS, contentFilter = classOf[Void],
            value = ALWAYS, valueFilter = classOf[Void]) '
          type: number
        view:
          type: object
    ApplicationFilter:
      properties:
        app_transfer_types:
          description: 'App Transfer Types: Size(max = 4, error = PERFMGMT_APP_TRANSFER_TYPE_LIST_SIZE_EXCEEDED:
            Maximum 4 app transfer types supported, min = 0) ValidateEnum(enumClass
            = classOf[TransferType], error = PERFMGMT_INVALID_APP_TRANSFER_TYPE: Invalid
            app transfer type specified in app filter, nullAllowed = true) '
          items:
            description: App Transfer Types
            enum:
            - RT_AUDIO
            - RT_VIDEO
            - TRANSACTIONAL
            - BULK
            type: string
          type: array
        application_ids:
          description: 'Application Ids: ListString(allowDuplicate = false, allowEmpty
            = true, allowNull = true, length = 0, listMaxSize = 0, error = PERFMGMT_RULE_DUPLICATE_APPLICATION_IDS:
            Duplicate application ids are not allowed in app filter for policy rule,
            noTrim = false, regex = , required = false) Size(max = 64, error = APP_DEF_ID_LIST_SIZE_EXCEEDED_64:
            Maximum 64 applications can be specified in a rule., min = 0) '
          items:
            description: Application Ids
            type: string
          type: array
    BasePolicyRule:
