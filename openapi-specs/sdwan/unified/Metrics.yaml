                  - code: DIRECTION_VIEW_NOT_SUPPORTED
                  - code: MAX_DATAPOINTS_END_TIME
              schema:
                $ref: '#/components/schemas/Error'
          description: Bad Request
      summary: Radius metrics (v2.0)
      tags:
      - Metrics
