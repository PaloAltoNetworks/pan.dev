components:
  schemas:
    Certificate:
      properties:
        algorithm:
          description: Algorithm
          type: string
        ca:
          description: Ca
          type: boolean
        certificate:
          description: Certificate
          type: string
        certificate_file:
          description: Certificate File
          type: string
        disabled:
          description: Disabled
          type: boolean
        disabled_reason:
          description: 'Disabled Reason: Size(max = 5000, DISABLED_REASON_INVALID_0001,
            min = 0) '
          type: string
        entity_id:
          description: 'Entity Id: NotNull(message = INVALID_ENTITY_ID) '
          type: string
        format:
          description: 'Format: Required(error = CERTIFICATE_FORMAT_INVALID: Invalid
            certificate format.) '
          enum:
          - PEM
          - PKCS12
          type: string
        has_key_file:
          description: Has Key File
          type: boolean
        has_passphrase:
          description: Has Passphrase
          type: boolean
        id:
          description: Id
          type: string
        inactive:
          description: Inactive
          type: boolean
        inactive_reason:
          description: 'Inactive Reason: Size(max = 5000, INACTIVE_REASON_INVALID_0001,
            min = 0) '
          type: string
        issuer:
          description: 'Issuer: NotNull(message = INVALID_ISSUER) '
          type: string
        issuer_hash:
          description: Issuer Hash
          type: string
        issuer_id:
          description: 'Issuer Id: NotNull(message = INVALID_ISSUER_ID) '
          type: string
        key_file:
          description: Key File
          type: string
        name:
          description: 'Name: Required(error = CERTIFICATE_NAME_INVALID: Please provide
            certificate name.) Size(max = 128, error = NAME_EXCEEDS_LIMIT: Name of
            the resource exceeds limit., min = 0) '
          type: string
        not_after:
          description: Not After
          format: int64
          type: integer
        not_before:
          description: Not Before
          format: int64
          type: integer
        not_valid_after:
          description: Not Valid After
          type: string
        not_valid_before:
          description: Not Valid Before
          type: string
        passphrase:
          description: Passphrase
          type: string
        public_key:
          description: 'Public Key: Size(max = 2048, message = INVALID_PUBLIC_KEY,
            min = 0) '
          type: string
        region:
          description: Region
          type: string
        revocation_date:
          description: Revocation Date
          format: int64
          type: integer
        revocation_reason:
          description: Revocation Reason
          type: string
        revoked:
          description: Revoked
          type: boolean
        serial_no:
          description: 'Serial No: NotNull(message = INVALID_SERIAL_NO) '
          type: string
        subj_descr:
          description: Subj Descr
          type: string
        subj_serial_no:
          description: Subj Serial No
          type: string
        subj_uid:
          description: Subj Uid
          type: string
        subject:
          description: 'Subject: NotNull(message = INVALID_SUBJECT) '
          type: string
        subject_hash:
          description: Subject Hash
          type: string
        title:
          description: Title
          type: string
        used_for:
          description: 'Used For: ListEnum(enumClass = classOf[CertificateUsage],
            length = 0, listMaxSize = 3, error = CERTIFICATE_USED_FOR_INVALID: Invalid
            certificate used_for value., nullAllowed = false) '
          items:
            description: Used For
            enum:
            - FORWARD_TRUST_CERTIFICATE
            - FORWARD_UNTRUST_CERTIFICATE
            - TRUSTED_ROOT_CA
            type: string
          type: array
      required:
      - format
      - subject
      - issuer_id
      - name
      - used_for
      - issuer
      - serial_no
      - entity_id
    CertificateAuthorityConfig:
      properties:
        ca_sign_timeout:
          description: 'Ca Sign Timeout: Required(message = required) Range(max =
            300L, CA_SIGN_TIMEOUT_OUT_OF_RANGE, min = 10L) '
          format: int32
          type: integer
        id:
          description: Id
          type: string
        manual_renew_trigger_threshold:
          description: 'Manual Renew Trigger Threshold: Required(message = required)
            Range(max = 1440L, MANUAL_RENEW_TRIGGER_THRESHOLD_OUT_OF_RANGE, min =
            5L) '
          format: int32
          type: integer
        renewal_window_from_expiry:
          description: 'Renewal Window From Expiry: Required(message = required) Range(max
            = 90L, RENEWAL_WINDOW_FROM_EXPIRY_OUT_OF_RANGE, min = 30L) '
          format: int32
          type: integer
        scep_config:
          $ref: '#/components/schemas/ScepConfig'
          description: 'Scep Config: Valid '
        type:
          description: 'Type: Required(message = required) ValidateEnum(enumClass
            = classOf[CertificateAuthorityConfigType], message = Invalid enum string.,
            nullAllowed = false) '
          enum:
          - LOCAL
          - SCEP
          type: string
      required:
      - ca_sign_timeout
      - manual_renew_trigger_threshold
      - renewal_window_from_expiry
      - type
    CertificatePOSTScreen:
      properties:
        certificate_file:
          description: Certificate File
          type: string
        format:
          description: 'Format: Required(error = CERTIFICATE_FORMAT_INVALID: Invalid
            certificate format.) '
          enum:
          - PEM
          - PKCS12
          type: string
        id:
          description: Id
          type: string
        key_file:
          description: Key File
          type: string
        name:
          description: 'Name: Required(error = CERTIFICATE_NAME_INVALID: Please provide
            certificate name.) Size(max = 128, error = NAME_EXCEEDS_LIMIT: Name of
            the resource exceeds limit., min = 0) '
          type: string
        passphrase:
          description: Passphrase
          type: string
        used_for:
          description: 'Used For: ListEnum(enumClass = classOf[CertificateUsage],
            length = 0, listMaxSize = 3, error = CERTIFICATE_USED_FOR_INVALID: Invalid
            certificate used_for value., nullAllowed = false) '
          items:
            description: Used For
            enum:
            - FORWARD_TRUST_CERTIFICATE
            - FORWARD_UNTRUST_CERTIFICATE
            - TRUSTED_ROOT_CA
            type: string
          type: array
      required:
      - used_for
      - format
      - name
    CertificatePUTScreen:
      properties:
        algorithm:
          description: Algorithm
          type: string
        ca:
          description: Ca
          type: boolean
        certificate_file:
          description: Certificate File
          type: string
        format:
          description: 'Format: Required(error = CERTIFICATE_FORMAT_INVALID: Invalid
            certificate format.) '
          enum:
          - PEM
          - PKCS12
          type: string
        id:
          description: Id
          type: string
        issuer:
          description: Issuer
          type: string
        issuer_hash:
          description: Issuer Hash
          type: string
        key_file:
          description: Key File
          type: string
        name:
          description: 'Name: Required(error = CERTIFICATE_NAME_INVALID: Please provide
            certificate name.) Size(max = 128, error = NAME_EXCEEDS_LIMIT: Name of
            the resource exceeds limit., min = 0) '
          type: string
        not_valid_after:
          description: Not Valid After
          type: string
        not_valid_before:
          description: Not Valid Before
          type: string
        passphrase:
          description: Passphrase
          type: string
        subject:
          description: Subject
          type: string
        subject_hash:
          description: Subject Hash
          type: string
        used_for:
          description: 'Used For: ListEnum(enumClass = classOf[CertificateUsage],
            length = 0, listMaxSize = 3, error = CERTIFICATE_USED_FOR_INVALID: Invalid
            certificate used_for value., nullAllowed = false) '
          items:
            description: Used For
            enum:
            - FORWARD_TRUST_CERTIFICATE
            - FORWARD_UNTRUST_CERTIFICATE
            - TRUSTED_ROOT_CA
            type: string
          type: array
      required:
      - used_for
      - format
      - name
    Error:
      properties:
        _error:
          items:
            $ref: '#/components/schemas/ErrorResponse'
          type: array
    ErrorResponse:
      properties:
        code:
          type: string
        message:
          type: string
    ListResponse:
      properties:
        count:
          description: 'The actual count.

            '
          format: int32
          type: integer
        id:
          description: 'The ID.

            '
          type: string
      type: object
    ScepConfig:
      properties:
        challenge_uri:
          description: Challenge Uri
          type: string
        enrollment_uri:
          description: Enrollment Uri
          type: string
        https:
          description: Https
          type: boolean
        num_challenge_passwords:
          description: Num Challenge Passwords
          type: integer
        server_certificate:
          description: Server Certificate
          type: string
        server_password:
          description: Server Password
          type: string
        server_primary_address:
          description: Server Primary Address
          type: string
        server_username:
          description: Server Username
          type: string
info:
  contact: {}
  description: APIs to manage certificates and certificate authorities.
  title: Certificates
  version: Latest
openapi: 3.0.0
paths:
  /sdwan/v2.0/api/certificates:
    get:
      description: Get all tenant certificates
      operationId: get-sdwan-v2.0-api-certificates
      responses:
        '200':
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/ListResponse'
                - properties:
                    items:
                      items:
                        $ref: '#/components/schemas/Certificate'
                      type: array
                  type: object
          description: Successful Operation
      summary: Get all tenant certificates V2.0 (v2.0)
      tags:
      - Certificates
    post:
      description: Create or import new certificate
      operationId: post-sdwan-v2.0-api-certificates
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CertificatePOSTScreen'
        description: Details of certificate to be created/imported
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Certificate'
          description: Successful Operation
        '400':
          content:
            application/json:
              example:
                value:
                  _error:
                  - code: CERTIFICATE_NAME_INVALID
                  - code: CERTIFICATE_KEY_FILE_INVALID
                  - code: CERTIFICATE_FILE_INVALID
              schema:
                $ref: '#/components/schemas/Error'
          description: Bad Request
      summary: Create or import new certificate v2.0 (v2.0)
      tags:
      - Certificates
  /sdwan/v2.0/api/certificates/revoked:
    get:
      description: Retrieve all revoked CICs for a tenant
      operationId: get-sdwan-v2.0-api-certificates-revoked
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Certificate'
          description: Successful Operation
      summary: Retrieve all revoked CICs for a tenant (v2.0)
      tags:
      - Certificates
  /sdwan/v2.0/api/certificates/{certificate_id}:
    delete:
      description: Delete a certificate of tenant
      operationId: delete-sdwan-v2.0-api-certificates-certificate_id
      parameters:
      - description: certificate id
        in: path
        name: certificate_id
        required: true
        schema:
          description: Certificate Id
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Certificate'
          description: Successful Operation
        '400':
          content:
            application/json:
              example:
                value:
                  _error:
                  - code: CERTIFICATE_NOT_FOUND
              schema:
                $ref: '#/components/schemas/Error'
          description: Bad Request
      summary: Delete a certificate of tenant v2.0 (v2.0)
      tags:
      - Certificates
    get:
      description: Get a specific certificate of tenant
      operationId: get-sdwan-v2.0-api-certificates-certificate_id
      parameters:
      - description: certificate id
        in: path
        name: certificate_id
        required: true
        schema:
          description: Certificate Id
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Certificate'
          description: Successful Operation
      summary: Get a specific certificate of tenant v2.0 (v2.0)
      tags:
      - Certificates
    put:
      description: Update certificate
      operationId: put-sdwan-v2.0-api-certificates-certificate_id
      parameters:
      - description: certificate id
        in: path
        name: certificate_id
        required: true
        schema:
          description: Certificate Id
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CertificatePUTScreen'
        description: Details of certificate to be updated
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Certificate'
          description: Successful Operation
        '400':
          content:
            application/json:
              example:
                value:
                  _error:
                  - code: CERTIFICATE_NOT_FOUND
                  - code: CERTIFICATE_NAME_INVALID
                  - code: CERTIFICATE_KEY_FILE_INVALID
                  - code: CERTIFICATE_FILE_INVALID
              schema:
                $ref: '#/components/schemas/Error'
          description: Bad Request
      summary: Update certificate v2.0 (v2.0)
      tags:
      - Certificates
  /sdwan/v2.0/api/entities/{element_id}/certificates:
    get:
      description: Retrieve all CICs for a particular element
      operationId: get-sdwan-v2.0-api-entities-element_id-certificates
      parameters:
      - description: Element ID
        in: path
        name: element_id
        required: true
        schema:
          description: Element Id
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Certificate'
          description: Successful Operation
      summary: Retrieve all CICs for a particular element (v2.0)
      tags:
      - Certificates
  /sdwan/v2.0/api/externalcaconfigs:
    get:
      description: Retrieve an existing CertificateAuthorityConfigDO object by tenant
        ID only
      operationId: get-sdwan-v2.0-api-externalcaconfigs
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CertificateAuthorityConfig'
          description: Successful Operation
      summary: Retrieve an existing CertificateAuthorityConfigDO object by tenant
        ID only (v2.0)
      tags:
      - Certificates
    post:
      description: Create a new certificate authority configuration
      operationId: post-sdwan-v2.0-api-externalcaconfigs
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CertificateAuthorityConfig'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CertificateAuthorityConfig'
          description: Successful Operation
        '400':
          content:
            application/json:
              example:
                value:
                  _error:
                  - code: NO_SCEP_CONFIG_SUBMITTED
                  - code: NO_SERVER_CERTIFICATE_SUBMITTED
                  - code: REDUNDANT_SCEP_CONFIG_SUBMITTED
                  - code: INVALID_REQUEST_DUPLICATE_KEY
                  - code: CANNOT_PARSE_SERVER_CERTIFICATE
                  - code: CANNOT_ADD_SERVER_CERTIFICATE_TO_KEYSTORE
                  - code: ERROR_SAVING_CERTIFICATE_AUTHORITY
                  - code: ERROR_SAVING_CERTIFICATE_AUTHORITY_CONFIG
              schema:
                $ref: '#/components/schemas/Error'
          description: Bad Request
      summary: Create a new certificate authority configuration (v2.0)
      tags:
      - Certificates
  /sdwan/v2.0/api/externalcaconfigs/{id}:
    delete:
      description: Delete a existing CertificateAuthorityConfigDO object by tenant
        ID and ID
      operationId: delete-sdwan-v2.0-api-externalcaconfigs-id
      parameters:
      - description: Certificate authority config ID
        in: path
        name: id
        required: true
        schema:
          description: Id
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CertificateAuthorityConfig'
          description: Successful Operation
      summary: Delete a existing CertificateAuthorityConfigDO object by tenant ID
        and ID (v2.0)
      tags:
      - Certificates
    get:
      description: Retrieve an existing CertificateAuthorityConfigDO object by tenant
        ID and ID
      operationId: get-sdwan-v2.0-api-externalcaconfigs-id
      parameters:
      - description: Certificate authority config ID
        in: path
        name: id
        required: true
        schema:
          description: Id
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CertificateAuthorityConfig'
          description: Successful Operation
      summary: Retrieve an existing CertificateAuthorityConfigDO object by tenant
        ID and ID (v2.0)
      tags:
      - Certificates
    put:
      description: Update an existing certificate authority configurationn
      operationId: put-sdwan-v2.0-api-externalcaconfigs-id
      parameters:
      - description: Certificate authority config ID
        in: path
        name: id
        required: true
        schema:
          description: Id
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CertificateAuthorityConfig'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CertificateAuthorityConfig'
          description: Successful Operation
        '400':
          content:
            application/json:
              example:
                value:
                  _error:
                  - code: NO_SCEP_CONFIG_SUBMITTED
                  - code: NO_SERVER_CERTIFICATE_SUBMITTED
                  - code: REDUNDANT_SCEP_CONFIG_SUBMITTED
                  - code: CERTIFICATE_AUTHORITY_CONFIG_NOT_FOUND
                  - code: INVALID_ETAG
                  - code: CANNOT_PARSE_SERVER_CERTIFICATE
                  - code: CANNOT_ADD_SERVER_CERTIFICATE_TO_KEYSTORE
                  - code: ERROR_SAVING_CERTIFICATE_AUTHORITY
                  - code: ERROR_SAVING_CERTIFICATE_AUTHORITY_CONFIG
              schema:
                $ref: '#/components/schemas/Error'
          description: Bad Request
      summary: Update an existing certificate authority configuration (v2.0)
      tags:
      - Certificates
servers:
- url: https://api.sase.paloaltonetworks.com
tags:
- name: Certificates
