components:
  schemas:
    Aggregate:
      properties:
        data:
          description: Data
          items:
            $ref: '#/components/schemas/AggregateData'
          type: array
        field:
          description: Field
          type: string
        name:
          description: Name
          type: string
        operator:
          description: Operator
          enum:
          - max
          - count
          - min
          - avg
          - sum
          type: string
        statistic:
          description: Statistic
          type: string
        unit:
          description: Unit
          type: string
    AggregateData:
      properties:
        value:
          description: 'Value: JsonInclude(content = ALWAYS, contentFilter = classOf[Void],
            value = ALWAYS, valueFilter = classOf[Void]) '
          type: number
        view:
          type: object
    BulkResponse:
      properties:
        count:
          description: 'The total number.

            '
          format: int32
          type: integer
        id:
          description: 'The ID.

            '
          type: string
        type:
          description: "The type. \n"
          type: string
    ESPGroup:
      properties:
        force_encapsulation:
          description: Force Encapsulation
          type: boolean
        lifesize:
          $ref: '#/components/schemas/Lifesize'
          description: Lifesize
        lifetime:
          description: 'Lifetime: Range(max = 72L, error = IPSECCONFIG_INVALID_IKE_LIFETIME:
            Invalid ike lifetime.Should be between 1-72 hours., min = 1L) '
          format: int32
          type: integer
        lifetime_units:
          description: Lifetime Units
          type: string
        mode:
          description: 'Mode: ValidateEnum(enumClass = classOf[ESPTunnelMode], error
            = IPSECCONFIG_INVALID_ESPTUNNEL_MODE: Invalid esp tunnel mode.Allowed
            value is tunnel., nullAllowed = false) '
          enum:
          - TUNNEL
          - TRANSPORT
          type: string
        proposals:
          description: 'Proposals: Valid ListObject(allowDuplicate = false, allowEmpty
            = false, allowNull = false, listMaxSize = 1, IPSECCONFIG_INVALID_PROPOSALS_LIST_LEN,
            required = false) '
          items:
            $ref: '#/components/schemas/Proposals'
          type: array
        responder_sase_proposals:
          $ref: '#/components/schemas/ResponderSaseProposals'
          description: Responder Sase Proposals
      required:
      - mode
      - proposals
    Error:
      properties:
        _error:
          items:
            $ref: '#/components/schemas/ErrorResponse'
          type: array
    ErrorResponse:
      properties:
        code:
          type: string
        message:
          type: string
    ExtendedTunnelCidr:
      properties:
        extended_tunnel_cidr:
          description: 'Extended Tunnel Cidr: IPAddress(allowEmpty = true, allowLinkLocal
            = false, allowNull = true, bcast = DENY, defaultRoute = false, dnsCheck
            = false, error = SERVICE_LINK_INNER_IP_POOL_INVALID: Service link inner
            ip pool invalid, type = SERVICE_LINK_TUNNEL_IP) '
          type: string
        priority:
          description: Priority
          format: int32
          type: integer
    IKEGroup:
      properties:
        aggressive:
          description: Aggressive
          type: boolean
        authentication_multiple:
          description: Authentication Multiple
          type: integer
        key_exchange:
          description: 'Key Exchange: ValidateEnum(enumClass = classOf[IKEKeyExchange],
            error = IPSECCONFIG_INVALID_IKEKEY_EXCHANGE: Invalid ike key algorith.Should
            be either ikev1 or ikev2., nullAllowed = false) '
          enum:
          - IKEV1
          - IKEV2
          type: string
        lifetime:
          description: 'Lifetime: Range(max = 72L, error = IPSECCONFIG_INVALID_IKE_LIFETIME:
            Invalid ike lifetime.Should be between 1-72 hours., min = 1L) '
          format: int32
          type: integer
        lifetime_units:
          description: Lifetime Units
          type: string
        port:
          description: 'Port: Range(max = 65535L, error = IPSECCONFIG_INVALID_IKE_PORT_RANGE:
            Invalid ike port range.Should be between 1-65535., min = 1L) '
          format: int32
          type: integer
        proposals:
          description: 'Proposals: Valid ListObject(allowDuplicate = false, allowEmpty
            = false, allowNull = false, listMaxSize = 1, IPSECCONFIG_INVALID_PROPOSALS_LIST_LEN,
            required = false) '
          items:
            $ref: '#/components/schemas/Proposals'
          type: array
        reauth:
          description: Reauth
          type: boolean
      required:
      - key_exchange
      - proposals
    IPSecProfile:
      properties:
        dpd_delay:
          description: 'Dpd Delay: Range(max = 60L, error = IPSECCONFIG_INVALID_DPD_DELAY:
            Invalid dpd delay.Should be between 1-60 seconds., min = 1L) '
          format: int32
          type: integer
        dpd_enable:
          description: Dpd Enable
          type: boolean
        esp_group:
