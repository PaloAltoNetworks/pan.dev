          description: App Id
          type: string
      - description: application config Id
        in: path
        name: cid
        required: true
        schema:
          description: Cid
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SDWANAppConfigScreen'
        description: SDWAN application config
