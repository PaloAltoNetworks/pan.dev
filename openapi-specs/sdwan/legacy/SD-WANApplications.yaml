      tags:
      - SD-WAN Applications
    get:
      description: Get SD-WAN application configuration
      operationId: get-v2.0-api-tenants-tenant_id-sdwanapps-app_id-configs-cid
      parameters:
      - description: Tenant Id
        in: path
