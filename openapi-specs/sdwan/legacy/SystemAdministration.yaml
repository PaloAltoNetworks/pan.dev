          description: Tenant Id
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApiVersions'
        description: Tenant details
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiVersions'
          description: Successful Operation
        '400':
          content:
            application/json:
              example:
                value:
                  _error:
                  - code: OPERATOR_INVALID_ETAG
              schema:
                $ref: '#/components/schemas/Error'
          description: Bad Request
      summary: Patch api versions (v2.0)
      tags:
      - System Administration
    put:
      description: Update Api Versions
      operationId: put-v2.0-api-tenants-tenant_id-api_versions
      parameters:
      - description: Tenant Id
        in: path
        name: tenant_id
        required: true
        schema:
          description: Tenant Id
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApiVersions'
        description: Tenant details
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiVersions'
          description: Successful Operation
        '400':
          content:
            application/json:
              example:
                value:
                  _error:
                  - code: OPERATOR_INVALID_ETAG
              schema:
                $ref: '#/components/schemas/Error'
          description: Bad Request
      summary: Update Api Versions (v2.0)
      tags:
      - System Administration
  /v2.0/api/tenants/{tenant_id}/auditlog:
    get:
      description: Get audit logs for given tenant
