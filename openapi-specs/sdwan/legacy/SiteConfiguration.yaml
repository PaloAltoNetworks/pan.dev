info:
  contact: {}
  description: List of APIs used to manage your site specific configuration attributes,
    and HA configuration for both branch and data center sites.
  title: Site Configuration
  version: Latest
openapi: 3.0.0
paths:
  /v2.0/api/tenants/{tenant_id}/elements/{element_id}/interface_authentication/status:
    get:
      description: Get all interface authentication status for an element
      operationId: get-v2.0-api-tenants-tenant_id-elements-element_id-interface_authentication-status
      parameters:
      - in: path
        name: tenant_id
        required: true
        schema:
          description: Tenant Id
          type: string
      - in: path
        name: element_id
        required: true
        schema:
          description: Element Id
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/ListResponse'
                - properties:
                    items:
                      items:
                        $ref: '#/components/schemas/InterfaceAuthenticationState'
                      type: array
                  type: object
          description: Successful Operation
        '404':
          content:
            application/json:
              example:
                value:
                  _error:
                  - code: INTERFACE_AUTHENTICATION_STATE_NOT_FOUND
              schema:
                $ref: '#/components/schemas/Error'
          description: Not Found
      summary: Get all interface authentication status for an element (v2.0)
      tags:
      - Site Configuration
