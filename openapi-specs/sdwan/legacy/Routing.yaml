            regex = [^,\\s]+, required = false) '
          items:
            description: Tags
            type: string
          type: array
        vrf_context_id:
          description: 'Vrf Context Id: Digits(fraction = 0, integer = 20, error =
            VRF_CONTEXT_ID_INVALID: VRF Context ID is empty or invalid.) '
          type: string
      required:
      - address_family
      - scope
      - nexthops
      - destination_prefix
    VRFRouterMapping:
      properties:
        router_id:
          description: 'Router Id: IPAddress(allowEmpty = true, allowLinkLocal = false,
            allowNull = true, bcast = DENY, defaultRoute = false, dnsCheck = false,
            error = BGP_CONFIG_INVALID_ROUTER_ID: Invalid IP address for router_id.
