components:
  schemas:
    ASPathRegex:
      properties:
        as_path_regex:
          description: 'As Path Regex: NotNull(ASPATH_ACCESS_LIST_REGEX_MISSING) '
          type: string
        order:
          description: 'Order: Range(max = 65535L, ASPATH_ACCESS_LIST_INVALID_ORDER,
            min = 1L) '
          format: int32
          type: integer
        permit:
          description: Permit
          type: boolean
      required:
      - as_path_regex
    Action:
      properties: {}
    Aggregate:
      properties:
        data:
          description: Data
          items:
            $ref: '#/components/schemas/AggregateData'
          type: array
        field:
          description: Field
          type: string
        name:
          description: Name
          type: string
        operator:
          description: Operator
          enum:
          - max
          - count
          - min
          - avg
          - sum
          type: string
        statistic:
          description: Statistic
          type: string
        unit:
          description: Unit
          type: string
    AggregateData:
      properties:
        value:
          description: 'Value: JsonInclude(content = ALWAYS, contentFilter = classOf[Void],
            value = ALWAYS, valueFilter = classOf[Void]) '
          type: number
        view:
          type: object
    AggregatePrefixes:
      properties:
        ip_prefixes:
          description: Ip Prefixes
          items:
            description: Ip Prefixes
            type: string
          type: array
        type:
          description: Type
          enum:
          - ipv4
          - ipv6
          - ipv4v6
          type: string
    BGPConfig:
      properties:
        adv_interval:
          description: Adv Interval
          format: int32
          type: integer
        hold_time:
          description: Hold Time
          format: int32
          type: integer
        keepalive_time:
          description: Keepalive Time
          format: int32
          type: integer
        local_as_num:
          description: Local As Num
          type: string
        md5_secret:
          description: Md5 Secret
          type: string
        multi_hop_limit:
          description: Multi Hop Limit
          format: int32
          type: integer
        peer_auth_type:
          description: Peer Auth Type
          enum:
          - md5
          - none
          type: string
        peer_retry_time:
          description: Peer Retry Time
          format: int32
          type: integer
    BGPGlobalConfigScreenV2N4:
      properties:
        admin_distance:
          description: 'Admin Distance: Range(max = 255L, error = BGP_CONFIG_INVALID_ADMIN_DISTANCE:
            ADMIN DISTANCE should be in the range 1-255, min = 1L) '
          format: int32
          type: integer
        adv_interval:
          description: 'Adv Interval: Range(max = 600L, error = BGP_CONFIG_INVALID_ADV_INTERVAL:
            ADVERTISE INTERVAL should be in the range 0-600, min = 0L) '
          format: int32
          type: integer
        graceful_restart:
          description: Graceful Restart
          type: boolean
        hold_time:
          description: 'Hold Time: Range(max = 600L, error = BGP_CONFIG_INVALID_HOLD_TIME:
            Hold TIME should be in the range 3-600, min = 3L) '
          format: int32
          type: integer
        id:
          description: Id
          type: string
        ipv6_prefixes_to_adv_to_wan:
          description: 'Ipv6 Prefixes To Adv To Wan: ListIPv6Address(bcast = DENY,
            listMaxSize = 0, error = BGP_CONFIG_INVALID_PREFIX: IP prefix is not valid
            OR is not within the valid prefix range, required = false, type = GATEWAYCIDRV6) '
          items:
            description: Ipv6 Prefixes To Adv To Wan
            type: string
          type: array
        keepalive_time:
          description: 'Keepalive Time: Range(max = 200L, error = BGP_CONFIG_INVALID_KEEPALIVE_TIME:
            KEEPALIVE TIME should be in the range 1-200, min = 1L) '
          format: int32
