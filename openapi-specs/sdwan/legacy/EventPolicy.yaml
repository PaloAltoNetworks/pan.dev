info:
  contact: {}
  description: List of APIs used to manage the event policy rules that inlcude managing
    of event correlation policy rules and sets and querying of the rules and sets.
  title: Event Policy
  version: Latest
openapi: 3.0.0
paths:
  /v2.0/api/tenants/{tenant_id}/elements/correlationevents/query:
    post:
      description: Query Element correlation events.
      operationId: post-v2.0-api-tenants-tenant_id-elements-correlationevents-query
      parameters:
      - description: Tenant Id
        in: path
        name: tenant_id
        required: true
        schema:
          description: Tenant Id
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ElementQuery'
      responses:
        '200':
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/ListQueryResponse'
                - properties:
                    items:
                      items:
                        $ref: '#/components/schemas/ElementQueryFilter'
                      type: array
                  type: object
          description: Successful Operation
        '400':
          content:
            application/json:
              example:
                value:
                  _error:
                  - code: BAD_QUERY_REQUEST
              schema:
                $ref: '#/components/schemas/Error'
          description: Bad Request
      summary: Query Element correlation events. (v2.0)
      tags:
      - Event Policy
  /v2.0/api/tenants/{tenant_id}/eventcodes:
    get:
      description: Get event codes API v2.0
      operationId: get-v2.0-api-tenants-tenant_id-eventcodes
      parameters:
      - description: Tenant ID
        in: path
        name: tenant_id
        required: true
        schema:
          description: Tenant Id
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventCodesData'
          description: Successful Operation
      summary: Get name and description of all event codes (v2.0)
      tags:
      - Event Policy
  /v2.0/api/tenants/{tenant_id}/eventcorrelationpolicyrules/query:
    post:
      description: Queries db for limit number of event correlation policyrules that
        match query params.
      operationId: post-v2.0-api-tenants-tenant_id-eventcorrelationpolicyrules-query
      parameters:
      - description: Tenant Id
        in: path
        name: tenant_id
        required: true
        schema:
          description: Tenant Id
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventCorrelationPolicyRuleQuery'
        description: Details for Event Correlation Policy Rule
      responses:
        '200':
          content:
            application/json:
              schema:
