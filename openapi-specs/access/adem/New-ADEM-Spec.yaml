openapi: 3.0.0
info:
  title: ADEM data API
  version: 2.1.1
  description: "API for ADEM timeseries data. This spec was created on February 12,\
    \ 2026. \xA9 2026 Palo Alto Networks, Inc."
paths:
  /adem/telemetry/v2/agent/properties:
    get:
      x-controller-name: AgentController
      x-operation-name: getAgentProperties
      tags:
      - AgentController
      summary: Get agent properties
      responses:
        '200':
          description: Agent properties
          content:
            application/json:
              schema:
                oneOf:
                - $ref: '#/components/schemas/AgentSummary'
                - $ref: '#/components/schemas/AgentSeries'
        '400':
          description: Invalid Request
        '401':
          description: Invalid Client
        '500':
          description: Server Error
      parameters:
      - name: start
        in: query
        required: false
        schema:
          type: integer
          format: int64
          maximum: 2147483648
          description: sample start time in seconds (unix epoch)
      - name: end
        in: query
        required: false
        schema:
          type: integer
          format: int64
          maximum: 2147483648
          description: sample end time in seconds (unix epoch)
      - name: timerange
        in: query
        required: false
        schema:
          type: string
          description: A time range e.g 'last_3_hours', 'last_7_days'
      - name: truncate-timerange
        in: query
        required: false
        schema:
          type: boolean
          description: round timestamps to nearest sample period
          default: true
      - name: filter
        in: query
        required: true
        schema:
          type: string
          description: filter results e.g. application==zoom-meeting or application==zoom-meeting,
            application==Gmail
      - name: include
        in: query
        required: false
        schema:
          type: string
          description: include agent properties e.g. AgentProperties.disks,AgentProperties.wlans,AgentProperties.computerName
      - name: Prisma-Tenant
        in: header
        schema:
          type: string
          description: Tenant ( tenant_service_group or tenant_service_group:subtenant
            )
        required: true
      - name: Prisma-SubTenant
        in: header
        schema:
          type: string
          description: SubTenant
        required: false
      - name: endpoint-type
        in: query
        required: true
        schema:
          type: string
          description: endpoint type
          enum:
          - muAgent
          - rnAgent
      - name: response-type
        in: query
        required: true
        schema:
          type: string
          enum:
          - timeseries
          - summary
      operationId: AgentController.getAgentProperties
      description: Retrieve the properties details through this endpoint.
  /adem/telemetry/v2/measure/agent/metric:
    get:
      x-controller-name: AgentController
      x-operation-name: getAgentMetric
      tags:
      - AgentController
      summary: Get agent metrics
      responses:
        '200':
          description: Agent metric
          content:
            application/json:
              schema:
                oneOf:
                - $ref: '#/components/schemas/MetricSummaryCollection'
                - $ref: '#/components/schemas/MetricSeries'
        '400':
          description: Invalid Request
        '401':
          description: Invalid Client
        '500':
          description: Server Error
      parameters:
      - name: start
        in: query
        required: false
        schema:
          type: integer
          format: int64
          maximum: 2147483648
          description: sample start time in seconds (unix epoch)
      - name: end
        in: query
        required: false
        schema:
          type: integer
          format: int64
          maximum: 2147483648
          description: sample end time in seconds (unix epoch)
      - name: timerange
        in: query
        required: false
        schema:
          type: string
          description: A time range e.g 'last_3_hours', 'last_7_days'
      - name: truncate-timerange
        in: query
        required: false
        schema:
          type: boolean
          description: round timestamps to nearest sample period
          default: true
      - name: group
        in: query
        required: false
        schema:
          type: string
          description: entity to group results by (e.g. Entity.user or Entity.user,Entity.endpoint)
      - name: filter
        in: query
        required: false
        schema:
          type: string
          description: filter results e.g. application==zoom-meeting or application==zoom-meeting,
            application==Gmail
      - name: Prisma-Tenant
        in: header
        schema:
          type: string
          description: Tenant ( tenant_service_group or tenant_service_group:subtenant
            )
        required: true
      - name: Prisma-SubTenant
        in: header
        schema:
          type: string
          description: SubTenant
        required: false
      - name: endpoint-type
        in: query
        required: true
        schema:
          type: string
          description: endpoint type
          enum:
          - muAgent
          - rnAgent
      - name: response-type
        in: query
        required: true
        schema:
          type: string
          enum:
          - timeseries
          - grouped-summary
      operationId: AgentController.getAgentMetric
      description: Retrieve the metric details through this endpoint.
  /adem/telemetry/v2/measure/agent/score:
    get:
      x-controller-name: AgentController
      x-operation-name: getAgentScore
      tags:
      - AgentController
      summary: Get agent scores
      responses:
        '200':
          description: Summary of agent scores
          content:
            application/json:
              schema:
                oneOf:
                - $ref: '#/components/schemas/ScoreSummary'
                - $ref: '#/components/schemas/ScoreSeries'
                - $ref: '#/components/schemas/ScoreSummaryCollection'
                - $ref: '#/components/schemas/ScoreSeriesCollection'
                - $ref: '#/components/schemas/ScoreDistributionCollection'
        '400':
          description: Invalid Request
        '401':
          description: Invalid Client
        '500':
          description: Server Error
      parameters:
      - name: start
        in: query
        required: false
        schema:
          type: integer
          format: int64
          maximum: 2147483648
          description: sample start time in seconds (unix epoch)
      - name: end
        in: query
        required: false
        schema:
          type: integer
          format: int64
          maximum: 2147483648
          description: sample end time in seconds (unix epoch)
      - name: timerange
        in: query
        required: false
        schema:
          type: string
          description: A time range e.g 'last_3_hours', 'last_7_days'
      - name: truncate-timerange
        in: query
        required: false
        schema:
          type: boolean
          description: round timestamps to nearest sample period
          default: true
      - name: filter
        in: query
        required: false
        schema:
          type: string
          description: filter results e.g. application==zoom-meeting or application==zoom-meeting,
            application==Gmail
      - name: include
        in: query
        required: false
        schema:
          type: string
          description: include agent properties or entity counts e.g. EntityCounts.endpoint,EntityCounts.user,AgentProperties.computername
      - name: group
        in: query
        required: false
        schema:
          type: string
          description: entity to group results by (e.g. Entity.user or Entity.user,Entity.endpoint)
      - name: Prisma-Tenant
        in: header
        schema:
          type: string
          description: Tenant ( tenant_service_group or tenant_service_group:subtenant
            )
        required: true
      - name: Prisma-SubTenant
        in: header
        schema:
          type: string
          description: SubTenant
        required: false
      - name: endpoint-type
        in: query
        required: true
        schema:
          type: string
          description: endpoint type
          enum:
          - muAgent
          - rnAgent
      - name: result-filter
        in: query
        schema:
          type: array
          items:
            type: string
            description: aggregate filter e.g. Score.application==poor,fair or MuAgent.selfServeUserEnabled==false
      - name: response-type
        in: query
        required: true
        schema:
          type: string
          enum:
          - timeseries
          - summary
          - distribution
          - grouped-summary
          - grouped-timeseries
      - name: pagination
        in: query
        required: false
        schema:
          type: string
          description: paginate results (e.g. page==0;limit==10;sortBy==application;sortOrder==asc
      - name: distribution-by
        in: query
        required: false
        schema:
          type: string
          description: distribution entity e.g. Entity.user or Entity.endpoint
      operationId: AgentController.getAgentScore
      description: Retrieve the score details through this endpoint.
