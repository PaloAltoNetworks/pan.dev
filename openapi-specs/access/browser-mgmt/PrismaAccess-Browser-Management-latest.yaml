      responses:
        '200':
          description: A list of requests with pagination info
          content:
            application/json:
              schema:
                type: object
                properties:
                  pageInfo:
                    $ref: '#/components/schemas/PageInfo'
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/UserRequest'
        '400':
          description: Bad request
        '500':
          description: Internal server error
      parameters:
      - name: limit
        in: query
        description: Number of user requests to return
        required: false
        schema:
          type: integer
          format: int32
      - name: request.type
        in: query
        description: Filter by request type
        required: false
        schema:
          type: string
          enum:
          - WebAccess
          - AppLogin
      - name: request.user_id
        in: query
        description: Filter by request user id
        required: false
        schema:
          type: string
      - name: request.device_id
        in: query
        description: Filter by request device id
        required: false
        schema:
          type: string
      - name: request.rule_id
        in: query
        description: Filter by request rule id
        required: false
        schema:
          type: string
      - name: request.url
        in: query
        description: Filter by request url
        required: false
        schema:
          type: string
      - name: request.responded_by
        in: query
        description: Filter by response by user id
        required: false
        schema:
          type: string
      - name: request.status
        in: query
        description: Filter by request status
        required: false
        schema:
          type: string
          enum:
          - Approved
          - Declined
          - Pending
          - Revoked
      - name: cursor
        in: query
        description: An optional opaque string that defines from where to start listing
        required: false
        schema:
          type: string
      - name: sort
        in: query
        description: The field to sort by
        required: false
        schema:
          type: string
          enum:
          - request.created_at
          - request.type
          - request.status
          - request.response_time
          - request.url
      - name: order
        in: query
        description: The sort order
        required: false
        schema:
          $ref: '#/components/schemas/Order'
      tags:
      - User Requests
