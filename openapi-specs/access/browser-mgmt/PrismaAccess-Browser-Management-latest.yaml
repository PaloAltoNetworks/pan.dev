openapi: 3.0.0
info:
  title: Prisma Browser Management Console Public API
  version: 1.0.0
  description: "This Open API spec file was created on May 04, 2026. \xA9 2026 Palo\
    \ Alto Networks, Inc. Palo Alto Networks is a registered trademark of Palo Alto\
    \ Networks. A list of our trademarks can be found at [https://www.paloaltonetworks.com/company/trademarks.html](https://www.paloaltonetworks.com/company/trademarks.html).\
    \ All other marks mentioned herein may be trademarks of their respective companies."
security:
- BearerAuth: []
components:
  schemas:
    ErrorResponse:
      type: object
      required:
      - message
      properties:
        error:
          type: string
        message:
          type: string
        missingDeviceIds:
          type: array
          items:
            type: string
          description: List of device IDs that were not found (only present for device
            not found errors)
        missingUserIds:
          type: array
          items:
            type: string
          description: List of user IDs that were not found (only present for user
            not found errors)
    DeviceStatusChangeRequest:
      type: object
      properties:
        deviceIds:
          type: array
          items:
            type: string
          description: List of device IDs
          minItems: 1
      required:
      - deviceIds
    DeviceArchiveResponse:
      type: object
      properties:
        archivedDeviceIds:
          type: array
          items:
            type: string
          description: List of device IDs that were archived
        message:
          type: string
          example: 3 devices archived successfully
    DeviceRestoreResponse:
      type: object
      properties:
        restoredDeviceIds:
          type: array
          items:
            type: string
          description: List of device IDs that were restored
        message:
          type: string
          example: 3 devices restored successfully
    DeviceSuspendResponse:
      type: object
      properties:
        suspendedDeviceIds:
          type: array
          items:
            type: string
          description: List of device IDs that were suspended
        message:
          type: string
          example: 3 devices suspended successfully
    DeviceResumeResponse:
      type: object
      properties:
        resumedDeviceIds:
          type: array
          items:
            type: string
          description: List of device IDs that were resumed
        message:
          type: string
          example: 3 devices resumed successfully
    DeviceDeleteResponse:
      type: object
      properties:
        deletedDeviceIds:
          type: array
          items:
            type: string
          description: List of device IDs that were deleted
        message:
          type: string
          example: 3 devices deleted successfully
    UserStatusChangeRequest:
      type: object
      properties:
        userIds:
          type: array
          items:
            type: string
          description: List of user IDs
          minItems: 1
      required:
      - userIds
    UserSuspendResponse:
      type: object
      properties:
        message:
          type: string
          example: Users suspended successfully
    UserResumeResponse:
      type: object
      properties:
        message:
          type: string
          example: Users resumed successfully
    UserForceReauthResponse:
      type: object
      properties:
        message:
          type: string
          example: Force re-authentication initiated for 2 users
    DeviceForceReauthResponse:
      type: object
      properties:
        forcedReauthDeviceIds:
          type: array
          items:
            type: string
          description: List of device IDs that were force re-authenticated
        message:
          type: string
          example: Force re-authentication initiated for 2 devices
    Order:
      type: string
      description: The sort order
      enum:
      - asc
      - desc
    EPP:
      type: object
      required:
      - name
      - version
      - state
      properties:
        name:
          type: string
        version:
          type: string
        state:
          type: string
    DeviceEPP:
      type: object
      required:
      - products
      - enabled
      properties:
        products:
          type: array
          items:
            $ref: '#/components/schemas/EPP'
        enabled:
          type: boolean
    DevicePasswordPosturePolicy:
      type: object
      required:
      - complexityReq
      - maxPasswordAge
      - minPasswordLength
      properties:
        complexityReq:
          type: boolean
        maxPasswordAge:
          type: integer
        minPasswordLength:
          type: integer
    DevicePasswordPosture:
      type: object
      required:
      - enabled
      - products
      properties:
        enabled:
          type: boolean
        passwordPolicy:
          $ref: '#/components/schemas/DevicePasswordPosturePolicy'
    CrowdstrikeZTAPosture:
      type: object
      required:
      - score
      - sensorScore
      - osScore
      - CID
      properties:
        score:
          type: integer
        sensorScore:
          type: integer
        osScore:
          type: integer
        CID:
          type: string
    SystemIntegrityPostureServices:
      type: object
      properties:
        driversSigningEnforcement:
          type: boolean
        kernelDebugger:
          type: boolean
        secureBoot:
          type: boolean
        SIP:
          type: boolean
        gatekeeper:
          type: boolean
    SystemIntegrityPostureStatus:
      type: string
      description: System integrity status
      enum:
      - pass
      - fail
      - unknown
    SystemIntegrityPosture:
      type: object
      required:
      - status
      - services
      properties:
        status:
          $ref: '#/components/schemas/SystemIntegrityPostureStatus'
        services:
          $ref: '#/components/schemas/SystemIntegrityPostureServices'
    DeviceManagementSystem:
      type: object
      properties:
        system:
          type: string
          enum:
          - ad
          - azureAd
          - intune
          - jamf
        details:
          type: string
    DeviceManagement:
      type: object
      required:
      - status
      - systems
      properties:
        status:
          type: string
          enum:
          - managed
          - unmanaged
        systems:
          type: array
          description: Device Management
          items:
            $ref: '#/components/schemas/DeviceManagementSystem'
    LocationMethod:
      type: string
      description: Location detection method
      enum:
      - GeoIp
      - Location services
      - Unknown
