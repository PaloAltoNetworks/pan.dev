      type: object
      properties:
        url:
          type: string
          description: URL pattern expression
        strict_mode:
          type: boolean
          default: false
          description: "If `true`, the URL is saved exactly as entered. \nIf `false`\
            \ (default), the system automatically normalizes the URL based on the\
            \ App Type:\n\n**Custom Apps:**\n* **Protocol:** Defaults to `*://` if\
            \ omitted.\n* **Subdomain:** Defaults to `www` logic (hidden).\n* **Path:**\
            \ Appends `/*` if no path is specified.\n\n**Private Apps:**\n* **Protocol:**\
            \ Defaults to `https://`. Wildcards (`*`) are **NOT** allowed.\n* **Subdomain:**\
            \ No automatic `www` handling; `www` is treated as a unique prefix.\n\
            * **Domain:** Supports IPv4 and Port numbers (e.g., `:8080`).\n* **Path:**\
            \ Automatically adds a trailing `*` to all paths.\n"
      required:
      - url
