    FirewallProduct:
      type: object
      description: Firewall product information
      required:
      - vendorName
      - productName
      - enabled
      properties:
        vendorName:
          $ref: '#/components/schemas/FirewallVendorName'
        productName:
          type: string
          description: Product name of the firewall
        enabled:
          type: boolean
          description: Whether the firewall is enabled
    DeviceFirewallDetails:
      type: object
      description: Firewall details for the device
      required:
      - products
      properties:
        products:
          type: array
          description: List of firewall products detected on the device
          items:
            $ref: '#/components/schemas/FirewallProduct'
    DeviceBrowserBrand:
      type: string
      description: Browser brand
      enum:
      - Arc
      - Brave
      - Chrome
      - Edge
      - Opera
      - Dia
      - Comet
      - Prisma Browser
      - Unknown
    DevicePlatform:
      type: string
      description: Device platform
      enum:
      - Desktop Browser
      - Mobile Browser
      - Browser Extension
      - Unknown
    BrowserSelfProtectionWindowsDriverStatus:
      type: string
      description: Windows driver status
      default: Unknown
      enum:
      - Unknown
      - Protected
      - Inactive
      - UnprotectedArmIncompatible
      - UnprotectedUserInstall
      - Unprotected
    BrowserSelfProtectionModule:
      type: object
      description: Browser self-protection module
      properties:
        windows:
          type: object
          description: Windows driver info
          properties:
            status:
              $ref: '#/components/schemas/BrowserSelfProtectionWindowsDriverStatus'
    UserStatus:
      type: string
      description: User status
      enum:
      - active
      - suspended
    User:
      type: object
      properties:
        id:
          type: string
          format: string
          description: Unique identifier
        externalId:
          type: string
          format: string
          description: External identifier
        email:
          type: string
          description: Email
        lastSeen:
          type: string
          format: date-time
          description: Last seen time
        firstSeen:
          type: string
          format: date-time
          description: First seen time
        name:
          type: string
          description: Name
        profilePictureURL:
          type: string
          description: Profile Picture URL
        deletedTime:
          type: string
          format: date-time
          description: Deleted Time
        status:
          $ref: '#/components/schemas/UserStatus'
        provider:
          type: string
          description: Provider
          enum:
          - saml
          - local
          - oidc
        deviceIds:
          type: array
          description: Device IDs
          items:
            type: string
        userGroups:
          type: array
          description: User Groups
          items:
            $ref: '#/components/schemas/UserGroup'
      required:
      - id
      - email
      - lastSeen
      - firstSeen
      - name
      - profilePictureURL
      - deletedTime
      - status
      - provider
      - externalId
    UserGroup:
      type: object
      properties:
        id:
          type: string
          description: Unique identifier
        name:
          type: string
          description: Name
        lastUpdated:
          type: string
          format: date-time
          description: Last updated
        createdAt:
          type: string
          format: date-time
          description: Created at
        provider:
          type: string
          enum:
          - sso
          - local
          description: Provider
      required:
      - id
      - name
    Device:
      type: object
      properties:
        id:
          type: string
          format: string
          description: Unique identifier
        externalId:
          type: string
          format: string
          description: External identifier
        status:
          type: string
          description: Device status
          enum:
          - active
          - archived
          - suspended
        firstSeen:
          type: string
          format: date-time
          description: First seen time
        lastSeen:
          type: string
          format: date-time
          description: Last seen time
        osType:
          type: string
          description: Operating System type
          enum:
          - windows
          - macOS
          - linux
          - ios
          - android
          - unknown
        osVersion:
          type: string
          description: OS Version
        osDisplayName:
          type: string
          description: OS Display Name
        chromeosVersion:
          type: string
          description: ChromeOS version (only for ChromeOS devices)
        locationMethod:
          $ref: '#/components/schemas/LocationMethod'
        arch:
          type: string
          description: Architecture
        nativeArch:
          type: string
          description: Native Architecture
        hostname:
          type: string
          description: Hostname
        model:
          type: string
          description: Device Model
        serialNumber:
          type: string
          description: Serial Number
        mobileVendor:
          type: string
          description: Mobile device vendor/manufacturer (e.g., Samsung, Apple)
        mobileHardware:
          type: string
          description: Mobile device hardware identifier (e.g., iPhone14,2, SM-G998B)
        mobileIsRooted:
          type: boolean
          description: Whether the mobile device is rooted/jailbroken
        macAddresses:
          type: array
          items:
            type: string
          description: MAC Addresses
        screenLockStatus:
          type: string
          description: Screen Lock Status
          enum:
          - ScreenLockStatusUnknown
          - ScreenLockStatusDisabled
          - ScreenLockStatusEnabled
        diskEncryptionStatus:
