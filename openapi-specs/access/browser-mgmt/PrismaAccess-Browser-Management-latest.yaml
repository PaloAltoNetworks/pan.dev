ExternalTags:
  Applications:
    title: Applications
    description: Create, list, update, and delete browser applications and related
      catalog data.
    tags:
    - Applications
  Application Groups:
    title: Application Groups
    description: Create, list, update, and delete application groups and their member
      applications.
    tags:
    - Application Groups
  Plugins:
    title: Plugins
    description: List and manage application plugins.
    tags:
    - Plugins
paths:
  /seb-api/v1/users:
    get:
      summary: Returns a list of users
      description: Retrieve the users details through this Application Programming
        Interface endpoint.
      operationId: GetSeb-apiV1Users
      responses:
        '200':
          description: A list of users with pagination info
          content:
            application/json:
              schema:
                type: object
                properties:
                  pageInfo:
                    $ref: '#/components/schemas/PageInfo'
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
        '400':
          description: Bad request
        '500':
          description: Internal server error
      parameters:
      - name: limit
        in: query
        description: Number of users to return
        required: false
        schema:
          type: integer
          format: int32
      - name: includeDeleted
        in: query
        description: Include deleted users
        required: false
        schema:
          type: boolean
      - name: user.name
        in: query
        description: Filter by user name
        required: false
        schema:
          type: string
      - name: user.email
        in: query
        description: Filter by user email
        required: false
        schema:
          type: string
      - name: user.first_seen_gte
        in: query
        description: Filter by first seen time or after
        required: false
        schema:
          type: string
          format: date-time
      - name: user.last_seen_lte
        in: query
        description: Filter by last seen time or before
        required: false
        schema:
          type: string
          format: date-time
      - name: user.status
        in: query
        description: Filter by user status
        required: false
        schema:
          $ref: '#/components/schemas/UserStatus'
      - name: cursor
        in: query
        description: An optional opaque string that defines from where to start listing
        required: false
        schema:
          type: string
      - name: sort
        in: query
        description: The field to sort by
        required: false
        schema:
          type: string
          enum:
          - user.name
          - user.email
          - user.first_seen
          - user.last_seen
          - user.status
      - name: order
        in: query
        description: The sort order
        required: false
        schema:
