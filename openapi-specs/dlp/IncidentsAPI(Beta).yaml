          type: integer
        id:
          type: string
        language:
          type: string
        low_confidence_frequency:
          format: int32
          type: integer
        medium_confidence_frequency:
          format: int32
          type: integer
        name:
          type: string
        strict_detection_frequency:
          format: int32
          type: integer
        sub_category_score:
          format: int32
          type: integer
        technique:
          type: string
        total_detection_frequency:
          format: int32
          type: integer
        total_strict_detection_frequency:
          format: int32
          type: integer
        type:
          type: string
        version:
          format: int32
          type: integer
        weighted_frequency:
          format: int32
          type: integer
      type: object
    DataProfile:
      properties:
        id:
          type: string
        name:
          type: string
        version:
          type: string
      type: object
    DeviceInfo:
      properties:
