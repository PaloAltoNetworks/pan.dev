info:
  contact: {}
  description: "Cloud NGFW uses certificates to access an intelligent feed and to\
    \ enable outbound decryption. These certificates are stored in the [AWS Secrets\
    \ Manager](https://docs.aws.amazon.com/secretsmanager/latest/userguide/intro.html).\
    \ \n\n### Permission Policies\n\n| Action                        | Local Firewall\
    \ Administrator | Local Rulestack Administrator | Global Rulestack Administrator|\n\
    | ----------------------------- | :--------------------------: | :---------------------------:\
    \ | :---------------------------: |\n| Create a Certificate Object   | &#9744;\
    \                      | **&#9745;**                   | **&#9745;**         \
    \          |\n| Delete a Certificate Object   | &#9744;                      |\
    \ **&#9745;**                   | **&#9745;**                   |            \
    \            \n| Update a Certificate Object   | &#9744;                     \
    \ | **&#9745;**                   | **&#9745;**                   |  \n| Describe\
    \ a Certificate Object | **&#9745;**                  | **&#9745;**          \
    \         | **&#9745;**                   |\n| List Certificate Objects      |\
    \ **&#9745;**                  | **&#9745;**                   | **&#9745;** \
    \                  |\n"
  title: Manage Certificate Objects
  version: 1.0.0
openapi: 3.0.3
paths:
  /v1/config/rulestacks/{rulestackname}/certificates:
    get:
      description: 'Retrieve the list of certificate objects associated with the specified
        rulestack.

        '
      operationId: get-v1-config-rulestacks-rulestackname-certificates
      parameters:
      - description: ''
        in: path
        name: rulestackname
        required: true
        schema:
          type: string
      - description: ''
        in: query
        name: nexttoken
        required: false
        schema:
          maxLength: 2048
          minLength: 1
          pattern: ^[-0-9A-Za-z:\/+=]+$
          title: Nexttoken
          type: string
      - description: ''
        in: query
        name: candidate
        required: false
        schema:
          default: true
          title: Candidate
          type: boolean
      - description: ''
        in: query
        name: running
        required: false
        schema:
          default: false
          title: Running
          type: boolean
      - description: ''
        in: query
        name: uncommitted
        required: false
        schema:
          default: false
          title: Uncommitted
          type: boolean
      - description: ''
        in: query
        name: maxresults
        required: false
        schema:
          default: 1024
          maximum: 1024
          minimum: 1
          title: Maxresults
          type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListCertificateObjectResponse'
          description: OK
      summary: Retrieve certificate objects
      tags:
      - CertificateObjects
    post:
      description: 'Create a server certificate object for the specified rulestack.

        '
      operationId: post-v1-config-rulestacks-rulestackname-certificates
      parameters:
      - description: 'The name of the rulestack.

          '
        in: path
        name: rulestackname
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCertificateObjectRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateCertificateObjectResponse'
          description: OK
      summary: Create certificate object
      tags:
      - CertificateObjects
  /v1/config/rulestacks/{rulestackname}/certificates/{name}:
    delete:
      description: 'Delete a certificate object associated with the specified rulestack.

        '
      operationId: delete-v1-config-rulestacks-rulestackname-certificates-name
      parameters:
      - description: 'The name of the rulestack.

          '
        in: path
        name: rulestackname
        required: true
        schema:
          type: string
      - description: 'The name of the certificate.

          '
        in: path
        name: name
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteCertificateObjectRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteCertificateObjectResponse'
          description: OK
      summary: Delete certificate object
      tags:
      - CertificateObjects
    get:
      description: 'Retrieve the certificate object metadata associated with the specified
        rulestack.

        '
      operationId: get-v1-config-rulestacks-rulestackname-certificates-name
      parameters:
      - description: 'The name of the rulestack.

          '
        in: path
        name: rulestackname
        required: true
        schema:
          type: string
      - description: 'The name of the certificate.

          '
        in: path
        name: name
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DescribeCertificateObjectRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DescribeCertificateObjectResponse'
          description: OK
      summary: Retrieve certificate metadata
      tags:
      - CertificateObjects
    put:
      description: 'Update the certificate object associated with the specified rulestack.

        '
      operationId: put-v1-config-rulestacks-rulestackname-certificates-name
      parameters:
      - description: 'The name of the rulestack.

          '
        in: path
        name: rulestackname
        required: true
        schema:
          type: string
      - description: 'The name of the certificate.

          '
        in: path
        name: name
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCertificateObjectRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateCertificateObjectResponse'
          description: OK
      summary: Update certificate object
      tags:
      - CertificateObjects
servers:
- url: https://api.us-east-1.aws.cloudngfw.paloaltonetworks.com
tags:
- name: CertificateObjects
