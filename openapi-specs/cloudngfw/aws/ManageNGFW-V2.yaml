info:
  contact: {}
  description: "The V2 API provides enhanced operations for managing Cloud NGFW resources.\
    \ This version introduces new features and improvements for firewall management,\
    \ including support for managing firewalls by ID and name, content version updates,\
    \ and feature management.\n\n### Key Features\n\n- Manage firewalls by firewall\
    \ ID or firewall name\n- Update firewall content versions\n- Configure firewall\
    \ features  \n- Link firewalls across accounts\n- Enhanced log profile and rulestack\
    \ management\n\n### Permission Policies\n\n| Action                          \
    \       | Local Firewall Administrator  | Local Rulestack Administrator | Global\
    \ Rulestack Administrator |\n| -------------------------------------- | :---------------------------:\
    \ | :---------------------------: | :----------------------------: |\n| Create/Delete\
    \ Firewall                 | **&#9745;**                   | &#9744;         \
    \              | &#9744;                        |\n| Update Firewall         \
    \               | **&#9745;**                   | &#9744;                    \
    \   | &#9744;                        |\n| Manage Firewall Features           \
    \    | **&#9745;**                   | &#9744;                       | &#9744;\
    \                        |\n| Link Accounts                          | **&#9745;**\
    \                   | &#9744;                       | &#9744;                \
    \        |\n"
  title: Manage Cloud NGFW (V2)
  version: 1.0.0
openapi: 3.0.3
