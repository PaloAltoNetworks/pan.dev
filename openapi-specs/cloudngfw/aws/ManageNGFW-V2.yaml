components:
  schemas:
    model.CloudwatchMetrics:
      properties:
        AccountId:
          maxLength: 12
          minLength: 12
          type: string
        CloudWatchMetricNamespace:
          type: string
        CloudWatchMetricsFields:
          items:
            type: string
          type: array
      required:
      - AccountId
      - CloudWatchMetricNamespace
      type: object
    model.EgressNATConfig:
      properties:
        Enabled:
          type: boolean
        Settings:
          $ref: '#/components/schemas/model.EgressNATSettings'
      type: object
    model.EgressNATSettings:
      properties:
        IPAMPoolId:
          type: string
        IPPoolType:
          enum:
          - AWSService
          - BYOIP
          type: string
      type: object
    model.EndpointConfig:
      properties:
        AccountId:
          maxLength: 12
          minLength: 12
          type: string
        EgressNATEnabled:
          type: boolean
        EndpointId:
          type: string
        Mode:
          enum:
          - ServiceManaged
          - CustomerManaged
          type: string
        Prefixes:
          $ref: '#/components/schemas/model.PrefixInfo'
        RejectedReason:
          type: string
        Status:
          enum:
          - Pending
          - Accepted
          - Rejected
          - Created
          - Creating
          - Deleting
          type: string
        SubnetId:
          type: string
        VpcId:
          type: string
        ZoneId:
          type: string
      required:
      - Mode
      type: object
    model.FirewallRoles:
      properties:
        EndpointRole:
          type: string
        LoggingRole:
          type: string
      type: object
    model.GWLBConfig:
      properties:
        DeregistrationDelay:
          default: 300
          type: integer
        RejectedFlowCountAlertThreshold:
          default: 10
          type: integer
        RejectedFlowCountTCPAlertThreshold:
          default: 10
          type: integer
        SessionRebalanceEnabled:
          default: false
          description: Omitempty skips creation of the field when false
          type: boolean
        TCPIdleTimeout:
          default: 350
          type: integer
      type: object
    model.Ipv6Config:
      properties:
        Enabled:
          type: boolean
      type: object
    model.LogConfig:
      properties:
        AccountId:
          maxLength: 12
          minLength: 12
          type: string
        LogDestination:
          type: string
        LogDestinationType:
          enum:
          - S3
          - CloudWatchLogs
          - KinesisDataFirehose
          type: string
        LogType:
          items:
            enum:
            - TRAFFIC
            - DECRYPTION
            - THREAT
            - USER_ID
            type: string
          type: array
        RoleType:
          enum:
          - ResourceBased
          - IamBased
          type: string
      required:
      - LogDestination
      - LogDestinationType
      - LogType
      - RoleType
      type: object
    model.Notification:
      properties:
        ExpiryTime:
          type: integer
        Id:
          type: string
        Link:
          $ref: '#/components/schemas/model.NotificationLink'
        Msg:
          type: string
      type: object
    model.NotificationLink:
      properties:
        Target:
          type: string
        Text:
          type: string
      type: object
    model.PrefixConfig:
      properties:
        Cidrs:
          items:
            type: string
          type: array
      type: object
    model.PrefixInfo:
      properties:
        PrivatePrefix:
          $ref: '#/components/schemas/model.PrefixConfig'
        PublicPrefix:
          $ref: '#/components/schemas/model.PrefixConfig'
      type: object
    model.PrivateAccessConfig:
      properties:
        ResourceID:
          type: string
        Type:
          enum:
          - NetworkLoadBalancer
          type: string
      type: object
    model.PublicIP:
      properties:
        IPAddress:
          type: string
        IPSource:
          type: string
        IPStatus:
          type: string
      type: object
    model.ResourceStatus:
      properties:
        DeviceRuleStackCommitInfo:
          $ref: '#/components/schemas/model.RuleStackCommitData'
        DeviceRuleStackCommitState:
          enum:
          - Submitted
          - None
          type: string
        DeviceRuleStackCommitStatus:
          enum:
          - Running
          - Uncommitted
          - Precommit
          - PrecommitDone
          - PrevalidateDone
          - Committing
          - Failed
          - Success
          type: string
        FailureReason:
          type: string
        FirewallStatus:
          enum:
          - CREATING
          - UPDATING
          - DELETING
          - CREATE_COMPLETE
          - UPDATE_COMPLETE
          - CREATE_FAIL
          - UPDATE_FAIL
          - DELETE_FAIL
          - DELETE_COMPLETE
          type: string
        GlobalRuleStackCommitInfo:
          $ref: '#/components/schemas/model.RuleStackCommitData'
        GlobalRuleStackStatus:
          enum:
          - Running
          - Uncommitted
          - Precommit
          - PrecommitDone
          - PrevalidateDone
          - Committing
          - Failed
          - Success
          type: string
        PublicIPs:
          items:
            $ref: '#/components/schemas/model.PublicIP'
          type: array
        RuleStackCommitInfo:
          $ref: '#/components/schemas/model.RuleStackCommitData'
        RuleStackStatus:
          enum:
          - Running
          - Uncommitted
          - Precommit
          - PrecommitDone
          - PrevalidateDone
          - Committing
          - Failed
          - Success
          type: string
        SCMAssocStatus:
          type: boolean
      type: object
    model.RuleStackCommitData:
      properties:
        CommitMessages:
          items:
            type: string
          type: array
        CommitTS:
          type: string
      type: object
    model.RuleStackRoles:
      properties:
        DecryptionRole:
          type: string
        NetworkMonitoringRole:
          type: string
      type: object
    model.SubnetMapping:
      properties:
        AvailabilityZone:
          type: string
        AvailabilityZoneId:
          type: string
        SubnetId:
          type: string
      type: object
    model.TagEntry:
      properties:
        Key:
          maxLength: 128
          minLength: 1
          type: string
        Value:
          maxLength: 256
          minLength: 1
          type: string
      type: object
    model.UserIDConfig:
      properties:
        AgentName:
          type: string
        CFTURLLink:
          type: string
        CollectorName:
          type: string
        CustomIncludeExcludeNetwork:
          items:
            $ref: '#/components/schemas/model.UserIDCustomSubnetFilter'
          type: array
        Enabled:
          type: boolean
        EndpointDNS:
          type: string
        Port:
          type: integer
        SecretKeyARN:
          type: string
        UserIDStatus:
          enum:
          - EndpointPending
          - EndpointFail
          - CommitFail
          - Enabled
          - Disabled
          - DisablePending
          - UpdatePending
          - UpdateFail
          type: string
      type: object
    model.UserIDCustomSubnetFilter:
      properties:
        DiscoveryInclude:
          type: boolean
        Enabled:
          type: boolean
        Name:
          type: string
        NetworkAddress:
          type: string
      type: object
    response.ResponseStatus:
