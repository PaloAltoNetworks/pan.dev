      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteCustomURLCategoryRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteCustomURLCategoryResponse'
          description: OK
      summary: Delete a custom URL category for a specified rulestack.
      tags:
      - ManageCustomURLCategories
    get:
      description: 'Return the custom URL category of a specified rule group. This
        command describes custom categories and the default predefined ones.

        '
      operationId: get-v1-config-rulestacks-rulestackname-urlcustomcategories-name
      parameters:
      - description: 'The name of the rulestack.

          '
        in: path
        name: rulestackname
        required: true
        schema:
          type: string
      - description: 'URL Category.

          '
        in: path
        name: name
        required: true
        schema:
          type: string
      - description: ''
        in: query
        name: running
        required: false
        schema:
          default: true
          title: Running
          type: boolean
      - description: ''
        in: query
        name: candidate
        required: false
        schema:
          default: false
          title: Candidate
          type: boolean
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DescribeCustomURLCategoryResponse'
          description: OK
      summary: Return the custom URL category of a specified rule group. This command
        describes custom categorie...
      tags:
      - ManageCustomURLCategories
    put:
      description: 'Modify the custom URL category of a specified rulestack.

        '
      operationId: put-v1-config-rulestacks-rulestackname-urlcustomcategories-name
      parameters:
      - description: 'The name of the rulestack.

          '
        in: path
        name: rulestackname
        required: true
        schema:
          type: string
      - description: 'URL Category.

          '
        in: path
        name: name
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCustomURLCategoryRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateCustomURLCategoryResponse'
          description: OK
      summary: Modify the custom URL category of a specified rulestack.
      tags:
      - ManageCustomURLCategories
