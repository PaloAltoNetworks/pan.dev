info:
  contact: {}
  description: "Apply tags to help search and filter your Cloud NGFW resources.\n\n\
    ### Permission Policies\n\n| Action                         | Local Firewall Administrator\
    \  | Local Rulestack Administrator | Global Rulestack Administrator |\n| ------------------------------\
    \ | :---------------------------: | :---------------------------: | :----------------------------:\
    \ |\n| Tag Resource                   | **&#9745;**                   | &#9744;\
    \                       | &#9744;                        | \n| Untag Resource\
    \                 | **&#9745;**                   | &#9744;                  \
    \     | &#9744;                        |                      \n| List Firewall\
    \ Tags             | **&#9745;**                   | **&#9745;**             \
    \      | &#9744;                        |\n"
  title: Manage Cloud NGFW Tags
  version: 1.0.0
openapi: 3.0.3
paths:
  /v1/config/ngfirewalls/{ngfirewallname}/tags:
    delete:
      description: 'Remove the tags associated with a resource.

        '
      operationId: delete-v1-config-ngfirewalls-ngfirewallname-tags
      parameters:
      - description: ''
        in: path
        name: ngfirewallname
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FirewallUntagResourceRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FirewallUntagResourceResponse'
          description: OK
      summary: Firewall Untag Resource
      tags:
      - ManageNGFWTags
    get:
      description: 'Retrieve the tags associated with a resource.

        '
      operationId: get-v1-config-ngfirewalls-ngfirewallname-tags
      parameters:
      - description: ''
        in: path
        name: ngfirewallname
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FirewallListTagsForResourceRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FirewallListTagsForResourceResponse'
          description: OK
      summary: List Firewall Tags
      tags:
      - ManageNGFWTags
    post:
      description: 'Add tags to a resource. You can tag the resources that you manage
        through NGFW firewalls and policies.

        '
      operationId: post-v1-config-ngfirewalls-ngfirewallname-tags
      parameters:
      - description: 'The name of the NGFW.

          '
        in: path
        name: ngfirewallname
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FirewallTagResourceRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FirewallTagResourceResponse'
          description: OK
      summary: Firewall Tag Resource
      tags:
      - ManageNGFWTags
servers:
- url: https://api.us-east-1.aws.cloudngfw.paloaltonetworks.com
tags:
- name: ManageNGFWTags
