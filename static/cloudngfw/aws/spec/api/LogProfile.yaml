info:
  contact: {}
  description: "Log entries contain properties, activities, or behaviors associated\
    \ with the logged event, such as the application type or the IP address of an\
    \ attacker.  \n\nCloud NGFW can captures threat, traffic, and decryption profiles.\
    \ For more information, see [Configure logging for Cloud NGFW on AWS](https://docs.paloaltonetworks.com/cloud-ngfw/aws/cloud-ngfw-on-aws/create-cloud-ngfw-instances-and-endpoints/configure-logging-for-the-cloud-ngfw-on-aws).\n\
    \n### Permission Policies\n\n| Action                         | Local Firewall\
    \ Administrator  | Local Rulestack Administrator | Global Rulestack Administrator\
    \ |\n| ------------------------------ | :---------------------------: | :---------------------------:\
    \ | :----------------------------: |\n| Update Log Profile             | **&#9745;**\
    \                   | &#9744;                       | &#9744;                \
    \        |\n| Read Log Profile               | **&#9745;**                   |\
    \ **&#9745;**                   | **&#9745;**                    | \n"
  title: Manage Log Profiles
  version: 1.0.0
openapi: 3.0.3
paths:
  /v1/config/ngfirewalls/{ngfirewallname}/logprofile:
    get:
      description: 'Return the log destination of a specific NGFW.

        '
      operationId: get-v1-config-ngfirewalls-ngfirewallname-logprofile
      parameters:
      - description: 'The name of the NGFW.

          '
        in: path
        name: ngfirewallname
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReadFWResourceLogProfileRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadFWResourceLogProfileResponse'
          description: OK
      summary: Return the log destination of a specific NGFW.
      tags:
      - LogProfile
    put:
      description: "Update the log destination of a specific NGFW.  \n\n>The destination\
        \ is Fluentd, hence commit is not needed.\n"
      operationId: put-v1-config-ngfirewalls-ngfirewallname-logprofile
      parameters:
      - description: 'The name of the NGFW.

          '
        in: path
        name: ngfirewallname
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateFWResourceLogProfileRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateFWResourceLogProfileResponse'
          description: OK
      summary: Update the log destination of a specific NGFW.
      tags:
      - LogProfile
servers:
- url: https://api.us-east-1.aws.cloudngfw.paloaltonetworks.com
tags:
- name: LogProfile
