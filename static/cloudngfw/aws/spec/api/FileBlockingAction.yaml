info:
  contact: {}
  description: "Allows you to identify specific file types that you want to block.\
    \ \n\n### Permission Policies\n\n| Action                          | Local Firewall\
    \ Administrator | Local Rulestack Administrator | Global Rulestack Administrator|\n\
    | ------------------------------- | :--------------------------: | :---------------------------:\
    \ | :---------------------------: |\n| Create a File Blocking Action   | &#9744;\
    \                      | **&#9745;**                   | **&#9745;**         \
    \          | \n| Update a File Blocking Action   | &#9744;                   \
    \   | **&#9745;**                   | **&#9745;**                   |        \
    \               \n| Delete a File Blocking Action   | &#9744;                \
    \      | **&#9745;**                   | **&#9745;**                   |  \n|\
    \ Describe a File Blocking Action | **&#9745;**                  | **&#9745;**\
    \                   | **&#9745;**                   |\n"
  title: Manage File Blocking Action
  version: 1.0.0
openapi: 3.0.3
paths:
  /v1/config/rulestacks/{rulestackname}/fileblockingprofiles/custom/filetypes:
    get:
      description: 'Retrieves the metadata for the file blocking profile defined for
        a specified rulestack.

        '
      operationId: get-v1-config-rulestacks-rulestackname-fileblockingprofiles-custom-filetypes
      parameters:
      - description: 'The name of the rulestack.

          '
        in: path
        name: rulestackname
        required: true
        schema:
          type: string
      - description: ''
        in: query
        name: nexttoken
        required: false
        schema:
          title: Nexttoken
          type: string
      - description: ''
        in: query
        name: candidate
        required: false
        schema:
          default: true
          title: Candidate
          type: boolean
      - description: ''
        in: query
        name: running
        required: false
        schema:
          default: false
          title: Running
          type: boolean
      - description: ''
        in: query
        name: uncommitted
        required: false
        schema:
          default: false
          title: Uncommitted
          type: boolean
      - description: ''
        in: query
        name: maxresults
        required: false
        schema:
          default: 1024
          maximum: 1024
          minimum: 1
          title: Maxresults
          type: integer
      - description: ''
        in: query
        name: describe
        required: false
        schema:
          default: false
          title: Describe
          type: boolean
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListFileBlockingActionResponse'
          description: OK
      summary: Retrieves the metadata for the file blocking profile defined for a
        specified rulestack.
      tags:
      - FileBlockingAction
  /v1/config/rulestacks/{rulestackname}/fileblockingprofiles/custom/filetypes/{type}:
    get:
      description: 'Use this command to return the data related to the file blocking
        profile attached to a specified rulestack.

        '
      operationId: get-v1-config-rulestacks-rulestackname-fileblockingprofiles-custom-filetypes-type
      parameters:
      - description: 'The name of the rulestack.

          '
        in: path
        name: rulestackname
        required: true
        schema:
          type: string
      - description: 'The type of file blocking action.

          '
        in: path
        name: type
        required: true
        schema:
          type: string
      - description: ''
        in: query
        name: running
        required: false
        schema:
          default: false
          title: Running
          type: boolean
      - description: ''
        in: query
        name: candidate
        required: false
        schema:
          default: true
          title: Candidate
          type: boolean
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DescribeFileBlockingActionResponse'
          description: OK
      summary: Use this command to return the data related to the file blocking profile
        attached to a specified ...
      tags:
      - FileBlockingAction
    put:
      description: 'Update the file blocking profile to a specified rulestack.

        '
      operationId: put-v1-config-rulestacks-rulestackname-fileblockingprofiles-custom-filetypes-type
      parameters:
      - description: 'The name of the rulestack.

          '
        in: path
        name: rulestackname
        required: true
        schema:
          type: string
      - description: 'The type of file blocking action.

          '
        in: path
        name: type
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateFileBlockingActionRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateFileBlockingActionResponse'
          description: OK
      summary: Update the file blocking profile to a specified rulestack.
      tags:
      - FileBlockingAction
servers:
- url: https://api.us-east-1.aws.cloudngfw.paloaltonetworks.com
tags:
- name: FileBlockingAction
