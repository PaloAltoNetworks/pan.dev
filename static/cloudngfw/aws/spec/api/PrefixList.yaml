info:
  contact: {}
  description: "A prefix list allows you to group specific IP addresses that require\
    \ the same policy enforcement. A prefix list can contain one or more IP addresses\
    \ or IP netmask in CIDR notation.\n\n### Permission Policies\n\n| Action     \
    \                  | Local Firewall Administrator  | Local Rulestack Administrator\
    \ | Global Rulestack Administrator |\n| ---------------------------- | :---------------------------:\
    \ | :---------------------------: | :----------------------------: |\n| Create\
    \ Prefix List           | &#9744;                       | **&#9745;**        \
    \           | **&#9745;**                    | \n| Delete Prefix List        \
    \   | &#9744;                       | **&#9745;**                   | **&#9745;**\
    \                    |                        \n| Update Prefix List         \
    \  | &#9744;                       | **&#9745;**                   | **&#9745;**\
    \                    |   \n| Describe Prefix List         | **&#9745;**      \
    \             | **&#9745;**                   | **&#9745;**                  \
    \  |\n| List Prefix Lists            | **&#9745;**                   | **&#9745;**\
    \                   | **&#9745;**                    |\n"
  title: Manage Prefix List
  version: 1.0.0
openapi: 3.0.3
paths:
  /v1/config/rulestacks/{rulestackname}/prefixlists:
    get:
      description: "Retrieve the information about the prefix lists for the specified\
        \ rulestack.   \n"
      operationId: get-v1-config-rulestacks-rulestackname-prefixlists
      parameters:
      - description: ''
        in: path
        name: rulestackname
        required: true
        schema:
          type: string
      - description: ''
        in: query
        name: nexttoken
        required: false
        schema:
          maxLength: 2048
          minLength: 1
          pattern: ^[-0-9A-Za-z:\/+=]+$
          title: Nexttoken
          type: string
      - description: ''
        in: query
        name: candidate
        required: false
        schema:
          default: true
          title: Candidate
          type: boolean
      - description: ''
        in: query
        name: running
        required: false
        schema:
          default: false
          title: Running
          type: boolean
      - description: ''
        in: query
        name: uncommitted
        required: false
        schema:
          default: false
          title: Uncommitted
          type: boolean
      - description: ''
        in: query
        name: maxresults
        required: false
        schema:
          default: 1024
          maximum: 1024
          minimum: 1
          title: Maxresults
          type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListPrefixListResponse'
          description: OK
      summary: Retrieve the information about the prefix lists for the specified rulestack.
      tags:
      - PrefixList
    post:
      description: 'Create a prefix list to configure and maintain security groups
        and route tables.

        '
      operationId: post-v1-config-rulestacks-rulestackname-prefixlists
      parameters:
      - description: 'The name of the rulestack.

          '
        in: path
        name: rulestackname
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePrefixListRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreatePrefixListResponse'
          description: OK
      summary: Create a prefix list to configure and maintain security groups and
        route tables.
      tags:
      - PrefixList
  /v1/config/rulestacks/{rulestackname}/prefixlists/{name}:
    delete:
      description: "Delete the prefix list associated with the specified rulestack.\
        \  \n"
      operationId: delete-v1-config-rulestacks-rulestackname-prefixlists-name
      parameters:
      - description: 'The name of the rulestack.

          '
        in: path
        name: rulestackname
        required: true
        schema:
          type: string
      - description: 'The name of the prefix list.

          '
        in: path
        name: name
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeletePrefixListRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeletePrefixListResponse'
          description: OK
      summary: Delete the prefix list associated with the specified rulestack.
      tags:
      - PrefixList
    get:
      description: "Return the prefix list associated with a rulestack.  \n"
      operationId: get-v1-config-rulestacks-rulestackname-prefixlists-name
      parameters:
      - description: 'The name of the rulestack.

          '
        in: path
        name: rulestackname
        required: true
        schema:
          type: string
      - description: 'The name of the prefix list.

          '
        in: path
        name: name
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DescribePrefixListRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DescribePrefixListResponse'
          description: OK
      summary: Return the prefix list associated with a rulestack.
      tags:
      - PrefixList
    put:
      description: 'Update the prefix list associated with a rulestack.

        '
      operationId: put-v1-config-rulestacks-rulestackname-prefixlists-name
      parameters:
      - description: 'The name of the rulestack.

          '
        in: path
        name: rulestackname
        required: true
        schema:
          type: string
      - description: 'The name of the prefix list.

          '
        in: path
        name: name
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePrefixListRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdatePrefixListResponse'
          description: OK
      summary: Update the prefix list associated with a rulestack.
      tags:
      - PrefixList
servers:
- url: https://api.us-east-1.aws.cloudngfw.paloaltonetworks.com
tags:
- name: PrefixList
