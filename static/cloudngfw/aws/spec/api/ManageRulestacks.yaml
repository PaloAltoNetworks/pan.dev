info:
  contact: {}
  description: "Rulestacks defines access control (App-ID, URL Filtering) and threat\
    \ prevention behavior of Cloud NGFW resources. \n\nA Cloud NGFW resource uses\
    \ your rulestack definitions to protect the traffic by a two-step process. First,\
    \ it enforces your rules on the to allow or deny your traffic. Second, it performs\
    \ content inspection on the allowed traffic based on what you specify on the Security\
    \ Profiles. \n\nA rulestack includes a set of security rules, associated objects,\
    \ and profiles. \n\n### Permission Policies\n\n| Action                      \
    \   | Local Firewall Administrator  | Local Rulestack Administrator | Global Rulestack\
    \ Administrator |\n| ------------------------------ | :---------------------------:\
    \ | :---------------------------: | :----------------------------: |\n| Create\
    \ a Rulestack             | &#9744;                       | **&#9745;**      \
    \             | **&#9745;**                    | \n| Delete a Rulestack      \
    \       | &#9744;                       | **&#9745;**                   | **&#9745;**\
    \                    |                        \n| Describe a Rulestack       \
    \    | **&#9745;**                   | **&#9745;**                   | **&#9745;**\
    \                    |  \n| List Rulestacks                | **&#9745;**     \
    \              | **&#9745;**                   | **&#9745;**                 \
    \   |\n| Update a Rulestack             | &#9744;                       | **&#9745;**\
    \                   | **&#9745;**                    |\n| List Security Rule Lists\
    \       | **&#9745;**                   | **&#9745;**                   | **&#9745;**\
    \                    |\n"
  title: Manage Rulestacks
  version: 1.0.0
openapi: 3.0.3
paths:
  /v1/config/rulestacks:
    get:
      description: "Retrieve the metadata of the specified rulestack.  \n\nYou can\
        \ also query rulestacks based on the tags using this command, */v1/config/rulestacks?tags=<string>*.\
        \   \nThis command lists the rulestacks where the tag name starts with the\
        \ string.  \n\n>DynamoDB supports this command, and should be implemented\
        \ as a library.\n"
      operationId: get-v1-config-rulestacks
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ListRuleStacksRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListRuleStacksResponse'
          description: OK
      summary: Retrieve the metadata of the specified rulestack.
      tags:
      - ManageRulestacks
    post:
      description: 'Create a global or local rulestack. Global role affects only Global
        rulestacks and Local role affects only local rulestacks.

        '
      operationId: post-v1-config-rulestacks
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRuleStackRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateRuleStackResponse'
          description: OK
      summary: Create a global or local rulestack. Global role affects only Global
        rulestacks and Local role aff...
      tags:
      - ManageRulestacks
  /v1/config/rulestacks/{rulestackname}:
    delete:
      description: 'Delete a specific rulestack.

        '
      operationId: delete-v1-config-rulestacks-rulestackname
      parameters:
      - description: 'The name of the rulestack.

          '
        in: path
        name: rulestackname
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteRuleStackRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteRuleStackResponse'
          description: OK
      summary: Delete a specific rulestack.
      tags:
      - ManageRulestacks
    get:
      description: 'Returns the data of the specific rulestack.

        '
      operationId: get-v1-config-rulestacks-rulestackname
      parameters:
      - description: 'The name of the rulestack.

          '
        in: path
        name: rulestackname
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DescribeRuleStackRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DescribeRuleStackResponse'
          description: OK
      summary: Returns the data of the specific rulestack.
      tags:
      - ManageRulestacks
    put:
      description: "Modify the rulestack.  \n\n>**Note:** You cannot update the scope\
        \ of the rulestack.\n"
      operationId: put-v1-config-rulestacks-rulestackname
      parameters:
      - description: 'The name of the rulestack.

          '
        in: path
        name: rulestackname
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRuleStackRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateRuleStackResponse'
          description: OK
      summary: Modify the rulestack.
      tags:
      - ManageRulestacks
  /v1/config/rulestacks/{rulestackname}/commit:
    get:
      description: 'View the commit status of the specified rulestack.

        '
      operationId: get-v1-config-rulestacks-rulestackname-commit
      parameters:
      - description: ''
        in: path
        name: rulestackname
