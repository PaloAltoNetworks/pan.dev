name: Deploy Live

on:
  push:
    branches: [ master ]
  workflow_dispatch:
  
jobs:
   build:
      if: github.repository_owner == 'PaloAltoNetworks'
      name: Build
      runs-on: pan-dev-runner-xl
      permissions:
        contents: read

      steps:
        - name: Checkout repository
          uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

        - name: Setup node
          uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v4
          with:
            node-version: '20'
            cache: 'yarn'

        - name: Get yarn cache
          id: yarn-cache
          run: echo "YARN_CACHE_DIR=$(yarn cache dir)" >> "${GITHUB_OUTPUT}"

        # - name: Cache dependencies
        #   uses: actions/cache@v4
        #   with:
        #     path: ${{ steps.yarn-cache.outputs.YARN_CACHE_DIR }}
        #     key: ${{ runner.os }}-pandev-${{ hashFiles('**/yarn.lock') }}
        #     restore-keys: |
        #       ${{ runner.os }}-pandev-

        # - name: Cache docusaurus build
        #   uses: actions/cache@v4
        #   with:
        #     path: node_modules/.cache/webpack
        #     key: pandev-live-${{ github.run_id }}
        #     restore-keys: |
        #       pandev-live

        - name: Install dependencies
          run: yarn --prefer-offline

        # needed for fetching Hashicorp blog feed
        - name: Cache Playwright
          id: playwright-cache
          uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
          with:
            path: |
              ~/.cache/ms-playwright
            key: ${{ runner.os }}-playwright-${{ hashFiles('package.json') }}
            restore-keys: |
              ${{ runner.os }}-playwright-

        - name: Install Playwright
          if: steps.playwright-cache.outputs.cache-hit != 'true'
          run: |
            npx playwright install chromium
            npx playwright install-deps chromium

        - name: Build site
          run: REACT_APP_ERROR_REPORTER_APIKEY=${{ secrets.ERROR_REPORTER_APIKEY }} REACT_APP_FIREBASE_APIKEY=${{ secrets.FIREBASE_APIKEY }} REACT_APP_RECAPTCHA_APIKEY=${{ secrets.RECAPTCHA_APIKEY }} FEED_SOFT_FAIL=1 FEED_DEBUG=1 yarn build-github && zip -r build.zip build

        - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
          with:
            name: build
            path: build.zip

   deploy:
      name: Deploy
      needs: build
      runs-on: pan-dev-runner-lg
      permissions:
        id-token: write

      steps:
        - name: Checkout repository
          uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        
        - name: Setup node
          uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v4
          with:
            node-version: '20'
            cache: 'yarn'

        - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v4
          with:
            name: build

        - name: Unzip build artifact
          run: unzip build.zip

        - name: Authenticate to Google Cloud
          id: auth
          uses: google-github-actions/auth@b7593ed2efd1c1617e1b0254da33b86225adb2a5
          with:
            workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
            service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

        - name: Read GCP credentials
          id: creds
          run: |
            creds=$(cat "${{ steps.auth.outputs.credentials_file_path }}")
            echo "::add-mask::$creds"
            echo "sa_key=$creds" >> "$GITHUB_OUTPUT"

        - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v4
          with:
            name: build

        - name: Deploy to Firebase
          id: deploy_live
          uses: FirebaseExtended/action-hosting-deploy@e2eda2e106cfa35cdbcf4ac9ddaf6c4756df2c8c # v0.10.0
          with:
            repoToken: '${{ secrets.GITHUB_TOKEN }}'
            firebaseServiceAccount: "${{ steps.creds.outputs.sa_key }}"
            projectId: pan-dev-f1b58
            channelId: live
          env:
            FIREBASE_CLI_PREVIEWS: hostingchannels
